<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Player Hub | GCTTA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <div class="bg-black border-b border-white/10 px-6 py-4 flex justify-between items-center z-50 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-table-tennis-paddle-ball text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-white font-black text-xl tracking-tight leading-none">PLAYER HUB</h1>
                <p id="nav-player-name" class="text-[9px] text-emerald-400 font-mono tracking-widest uppercase">Verified Player</p>
            </div>
        </div>
        <button onclick="window.location.href='/'" class="text-xs text-sky-400 font-bold px-3 py-2 border border-sky-500/30 bg-sky-900/30 rounded transition hover:bg-sky-900/50">
            <i class="fa-solid fa-house mr-1"></i> Return Home
        </button>
    </div>

    <div class="bg-slate-900 border-t border-white/10 flex justify-around p-2 pb-6 fixed bottom-0 w-full z-50 md:relative md:border-b md:border-t-0 md:pb-2">
        <button onclick="switchTab('profile')" id="nav-profile" class="flex flex-col items-center text-indigo-400 w-1/3 py-2 transition">
            <i class="fa-solid fa-user text-xl mb-1"></i><span class="text-[10px] font-bold tracking-widest uppercase">My Stats</span>
        </button>
        <button onclick="switchTab('forum')" id="nav-forum" class="flex flex-col items-center text-slate-500 hover:text-white transition w-1/3 py-2">
            <i class="fa-solid fa-comments text-xl mb-1"></i><span class="text-[10px] font-bold tracking-widest uppercase">Community</span>
        </button>
        <button onclick="switchTab('tournaments')" id="nav-tournaments" class="flex flex-col items-center text-slate-500 hover:text-white transition w-1/3 py-2">
            <i class="fa-solid fa-trophy text-xl mb-1"></i><span class="text-[10px] font-bold tracking-widest uppercase">Events</span>
        </button>
    </div>

    <div class="flex-1 overflow-y-auto p-4 md:p-8 pb-32">
        
        <div id="tab-profile" class="w-full max-w-3xl mx-auto animate-fade-in space-y-6">
            <div id="hub-stats-container">
                <div class="text-center py-10"><i class="fa-solid fa-spinner fa-spin text-3xl text-indigo-500"></i></div>
            </div>

            <div class="bg-black/30 p-6 rounded-xl border border-white/5">
                <h3 class="text-white font-bold uppercase tracking-widest text-xs mb-4"><i class="fa-solid fa-calendar-days text-sky-400 mr-2"></i> Upcoming Fixtures</h3>
                <div id="hub-schedule-list" class="space-y-3">
                    <div class="text-slate-500 text-sm italic">Loading schedule...</div>
                </div>
            </div>
        </div>

        <div id="tab-forum" class="hidden w-full max-w-2xl mx-auto animate-fade-in">
            <div class="bg-slate-800 p-4 rounded-xl border border-white/10 mb-6 shadow-lg">
                <textarea id="forum-input" placeholder="What's on your mind? (Lost & Found, Banter, Gear Questions...)" class="w-full bg-black/30 border border-white/5 rounded-lg p-3 text-white text-sm resize-none focus:outline-none focus:border-indigo-500 transition-colors" rows="3"></textarea>
                
                <div id="image-preview-container" class="hidden mt-3 relative inline-block">
                    <img id="image-preview" src="" class="h-32 rounded-lg border border-white/10 object-cover">
                    <button onclick="removeImage()" class="absolute -top-2 -right-2 bg-red-600 hover:bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs shadow-lg transition-transform hover:scale-110"><i class="fa-solid fa-xmark"></i></button>
                </div>

                <div id="poll-builder" class="hidden mt-3 p-4 bg-black/40 rounded-xl border border-sky-500/30 space-y-2 relative">
                    <button onclick="document.getElementById('poll-builder').classList.add('hidden')" class="absolute top-2 right-2 text-slate-500 hover:text-red-400"><i class="fa-solid fa-xmark"></i></button>
                    <div class="text-[10px] uppercase font-bold text-sky-400 mb-2 tracking-widest"><i class="fa-solid fa-chart-bar mr-1"></i> Create a Poll</div>
                    <input type="text" placeholder="Option 1 (e.g. Blue Shirt)" class="poll-opt w-full bg-slate-800 text-sm p-2.5 rounded border border-white/10 outline-none focus:border-sky-500 transition-colors">
                    <input type="text" placeholder="Option 2 (e.g. Black Shirt)" class="poll-opt w-full bg-slate-800 text-sm p-2.5 rounded border border-white/10 outline-none focus:border-sky-500 transition-colors">
                    <input type="text" placeholder="Option 3 (Optional)" class="poll-opt w-full bg-slate-800 text-sm p-2.5 rounded border border-white/10 outline-none focus:border-sky-500 transition-colors">
                </div>

                <div class="flex justify-between items-center mt-3 pt-3 border-t border-white/5">
                    <div class="flex gap-4">
                        <button onclick="document.getElementById('poll-builder').classList.toggle('hidden')" class="text-sky-400 hover:text-sky-300 text-sm font-bold transition-colors"><i class="fa-solid fa-chart-bar mr-1"></i> Poll</button>
                        <label class="text-pink-400 hover:text-pink-300 text-sm font-bold cursor-pointer transition-colors">
                            <i class="fa-solid fa-image mr-1"></i> Photo
                            <input type="file" id="image-upload" accept="image/*" class="hidden" onchange="previewImage(event)">
                        </label>
                    </div>
                    <button onclick="submitForumPost()" id="btn-post" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 px-6 rounded-lg shadow-lg text-sm transition-transform hover:scale-105">Post</button>
                </div>
            </div>

            <div id="forum-feed" class="space-y-6">
                <div class="text-center py-10 text-slate-500"><i class="fa-solid fa-spinner fa-spin text-2xl"></i></div>
            </div>
        </div>

        <div id="tab-tournaments" class="hidden w-full max-w-3xl mx-auto animate-fade-in">
            <div class="bg-gradient-to-br from-amber-900/40 to-slate-900 border border-amber-500/30 rounded-2xl p-6 shadow-xl">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <span class="bg-red-600 text-white text-[10px] font-black tracking-widest px-2 py-0.5 rounded uppercase mb-2 inline-block">Registrations Open</span>
                        <h2 class="text-2xl font-black text-white">Gold Coast Open</h2>
                        <p class="text-slate-400 text-sm">Upcoming Tournament</p>
                    </div>
                    <div class="text-right">
                        <div class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Cart Total</div>
                        <div id="cart-total" class="text-3xl font-black text-amber-400 font-mono">$0</div>
                    </div>
                </div>

                <div class="space-y-3 mb-8">
                    <label class="flex items-center justify-between bg-black/40 p-4 rounded-xl border border-white/5 cursor-pointer hover:bg-black/60 transition">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" class="tourney-checkbox w-5 h-5 rounded border-slate-600 text-amber-500 bg-slate-800" value="Open Singles" data-price="20" onchange="calculateCart()">
                            <div>
                                <div class="font-bold text-white">Open Singles</div>
                                <div class="text-xs text-slate-400">Saturday 9:00 AM</div>
                            </div>
                        </div>
                        <div class="font-mono text-amber-400 font-bold">$20</div>
                    </label>
                    <label class="flex items-center justify-between bg-black/40 p-4 rounded-xl border border-white/5 cursor-pointer hover:bg-black/60 transition">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" class="tourney-checkbox w-5 h-5 rounded border-slate-600 text-amber-500 bg-slate-800" value="U1500 Singles" data-price="15" onchange="calculateCart()">
                            <div>
                                <div class="font-bold text-white">Under 1500 Singles</div>
                                <div class="text-xs text-slate-400">Saturday 1:00 PM</div>
                            </div>
                        </div>
                        <div class="font-mono text-amber-400 font-bold">$15</div>
                    </label>
                </div>

                <div id="cart-action-box" class="bg-black/50 p-4 rounded-xl border border-white/5 text-center">
                    <p class="text-xs text-slate-400 mb-3">You have currently paid <strong class="text-white">$0.00</strong> toward this event.</p>
                    <button onclick="submitCart()" class="w-full bg-amber-500 hover:bg-amber-400 text-black font-black py-3 rounded-xl shadow-[0_0_15px_rgba(245,158,11,0.4)] transition">PROCEED TO CHECKOUT</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // GLOBALS
        const PLAYER_UID = localStorage.getItem('player_uid') || 'guest_' + Math.floor(Math.random()*1000);
        const PLAYER_NAME = localStorage.getItem('player_name') || 'Guest Player';
        let base64Image = null;

        document.getElementById('nav-player-name').innerText = PLAYER_NAME;

        function switchTab(tabId) {
            ['profile', 'forum', 'tournaments'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.add('hidden');
                document.getElementById(`nav-${t}`).classList.remove('text-indigo-400');
                document.getElementById(`nav-${t}`).classList.add('text-slate-500');
            });
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.getElementById(`nav-${tabId}`).classList.remove('text-slate-500');
            document.getElementById(`nav-${tabId}`).classList.add('text-indigo-400');

            if(tabId === 'profile') loadProfileStats();
            if(tabId === 'forum') loadForum();
        }

        // ==============================================
        // PROFILE & STATS ENGINE
        // ==============================================
        async function loadProfileStats() {
            const container = document.getElementById('hub-stats-container');
            const scheduleList = document.getElementById('hub-schedule-list');
            
            try {
                // Fetch stats
                const res = await fetch(`/api/stats/${encodeURIComponent(PLAYER_NAME)}`);
                if(res.ok) {
                    const stats = await res.json();
                    
                    // RENDER THE STANDARD DEVIATION (RD) NEXT TO THE RATING
                    container.innerHTML = `
                    <div class="grid grid-cols-2 gap-6 w-full">
                        <div class="bg-indigo-900/20 p-5 rounded-xl border border-indigo-500/30 text-center">
                            <div class="text-[10px] text-indigo-400 font-bold uppercase tracking-widest mb-1">Glicko Rating</div>
                            <div class="text-4xl font-black text-white font-mono">${stats.rating}</div>
                            <div class="text-xs text-slate-400 font-mono mt-1" title="Rating Deviation (System Confidence)">± ${stats.rd} Std Dev</div>
                        </div>
                        <div class="bg-black/30 p-5 rounded-xl border border-white/5 text-center flex flex-col justify-center">
                            <div class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">Win Rate</div>
                            <div class="text-2xl font-black text-emerald-400 font-mono">${stats.combined.win_rate}</div>
                            <div class="text-xs text-slate-400 mt-1">${stats.combined.matches} Matches Played</div>
                        </div>
                    </div>`;
                } else {
                    container.innerHTML = `<div class="text-center w-full py-6"><p class="text-slate-400 text-sm">No official stats linked to this name yet.</p></div>`;
                }

                // Fetch Schedule
                const schedRes = await fetch(`/api/hub/schedule/${encodeURIComponent(PLAYER_NAME)}`);
                if (schedRes.ok) {
                    const matches = await schedRes.json();
                    if (matches.length > 0) {
                        scheduleList.innerHTML = matches.map(m => `
                            <div class="bg-black/40 p-3 rounded-lg border border-white/5 flex justify-between items-center">
                                <div>
                                    <div class="text-[10px] text-sky-400 font-bold uppercase tracking-widest mb-1">${m.division} • ${m.date_text}</div>
                                    <div class="text-sm font-bold text-white">${m.home_team} vs ${m.away_team}</div>
                                </div>
                            </div>
                        `).join('');
                    } else {
                        scheduleList.innerHTML = `<div class="text-slate-500 text-sm italic">No upcoming matches scheduled.</div>`;
                    }
                }
            } catch(e) { console.error("Error loading stats", e); }
        }

        // ==============================================
        // TOURNAMENT CART ENGINE
        // ==============================================
        let previouslyPaid = 0; 
        function calculateCart() {
            let total = 0;
            document.querySelectorAll('.tourney-checkbox:checked').forEach(cb => { total += parseFloat(cb.dataset.price); });
            document.getElementById('cart-total').innerText = `$${total}`;

            const diff = total - previouslyPaid;
            const btn = document.querySelector('#cart-action-box button');
            
            if (diff > 0) { 
                btn.innerText = `PAY DIFFERENCE: $${diff}`; 
                btn.className = "w-full bg-amber-500 hover:bg-amber-400 text-black font-black py-3 rounded-xl transition"; 
            } else if (diff < 0) { 
                btn.innerText = `UPDATE (REFUND DUE: $${Math.abs(diff)})`; 
                btn.className = "w-full bg-sky-600 hover:bg-sky-500 text-white font-black py-3 rounded-xl transition"; 
            } else if (total > 0) { 
                btn.innerText = `SAVE REGISTRATION`; 
                btn.className = "w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-3 rounded-xl transition"; 
            } else { 
                btn.innerText = `SELECT EVENTS`; 
                btn.className = "w-full bg-slate-700 text-slate-400 font-black py-3 rounded-xl transition cursor-not-allowed"; 
            }
        }

        async function submitCart() {
            let events = []; let total = 0;
            document.querySelectorAll('.tourney-checkbox:checked').forEach(cb => { events.push(cb.value); total += parseFloat(cb.dataset.price); });
            if(total === 0) return;
            alert(`Stripe Checkout simulated for $${total}.\nEvents: ${events.join(', ')}`);
        }

        // ==============================================
        // COMMUNITY FORUM ENGINE
        // ==============================================
        function previewImage(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                base64Image = e.target.result;
                document.getElementById('image-preview').src = base64Image;
                document.getElementById('image-preview-container').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        function removeImage() {
            base64Image = null;
            document.getElementById('image-upload').value = '';
            document.getElementById('image-preview-container').classList.add('hidden');
        }

        async function submitForumPost() {
            const val = document.getElementById('forum-input').value.trim();
            const pollOpts = Array.from(document.querySelectorAll('.poll-opt')).map(i => i.value.trim()).filter(v => v);
            
            if(!val && !base64Image && pollOpts.length === 0) return;

            const btn = document.getElementById('btn-post');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            btn.disabled = true;

            let postType = 'General';
            if (pollOpts.length > 0) postType = 'Poll';

            try {
                await fetch('/api/hub/post', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ 
                        uid: PLAYER_UID, 
                        name: PLAYER_NAME, 
                        content: val, 
                        type: postType,
                        image_url: base64Image,
                        poll_options: pollOpts.length > 0 ? pollOpts : null
                    }) 
                });
                
                // Reset inputs
                document.getElementById('forum-input').value = ''; 
                removeImage();
                document.querySelectorAll('.poll-opt').forEach(i => i.value = '');
                document.getElementById('poll-builder').classList.add('hidden');
                
                loadForum();
            } catch(e) {
                alert("Failed to post.");
            } finally {
                btn.innerHTML = 'Post';
                btn.disabled = false;
            }
        }

        async function loadForum() {
            const feed = document.getElementById('forum-feed');
            try {
                const res = await fetch('/api/hub/forum'); 
                const posts = await res.json();
                
                if(posts.length === 0) { 
                    feed.innerHTML = '<div class="text-center text-slate-500 italic py-10">No posts yet. Start the conversation!</div>'; 
                    return; 
                }
                
                feed.innerHTML = posts.map(p => {
                    // Render Image if exists
                    const imgHtml = p.image_url ? `<img src="${p.image_url}" class="mt-3 rounded-lg border border-white/10 max-h-64 object-cover w-full">` : '';
                    
                    // Render Poll if exists
                    let pollHtml = '';
                    if (p.type === 'Poll' && p.poll) {
                        let totalVotes = 0;
                        for(const [opt, voters] of Object.entries(p.poll)) totalVotes += voters.length;
                        
                        pollHtml = `<div class="mt-4 space-y-2">`;
                        for(const [opt, voters] of Object.entries(p.poll)) {
                            const pct = totalVotes > 0 ? Math.round((voters.length / totalVotes) * 100) : 0;
                            const hasVoted = voters.includes(PLAYER_UID);
                            const activeClass = hasVoted ? "border-sky-500 bg-sky-900/30 text-sky-400" : "border-white/10 bg-black/40 hover:bg-slate-700 text-white";
                            
                            pollHtml += `
                            <div onclick="votePoll('${p.id}', '${opt.replace(/'/g, "\\'")}')" class="relative overflow-hidden border rounded-lg p-3 cursor-pointer transition-colors ${activeClass}">
                                <div class="absolute top-0 left-0 h-full bg-sky-500/20" style="width: ${pct}%"></div>
                                <div class="relative flex justify-between items-center text-sm font-bold z-10">
                                    <span>${opt}</span>
                                    <span>${pct}%</span>
                                </div>
                            </div>`;
                        }
                        pollHtml += `<div class="text-[10px] text-slate-500 text-right mt-1">${totalVotes} total votes</div></div>`;
                    }

                    // Render Likes & Comments bar
                    const upvotes = p.upvotes || [];
                    const isLiked = upvotes.includes(PLAYER_UID);
                    const comments = p.comments || [];
                    
                    let commentsHtml = '';
                    if (comments.length > 0) {
                        commentsHtml = `<div class="mt-4 pt-3 border-t border-white/5 space-y-3">` + 
                            comments.map(c => `
                                <div class="bg-black/20 p-3 rounded border border-white/5">
                                    <div class="flex items-center gap-1 text-[10px] text-slate-400 mb-1"><span class="font-bold text-slate-300">${c.author}</span> • Just now</div>
                                    <div class="text-xs text-slate-300">${c.content}</div>
                                </div>
                            `).join('') + `</div>`;
                    }

                    return `
                    <div class="bg-slate-800 p-5 rounded-xl border border-white/5 shadow-lg">
                        <div class="flex justify-between items-center mb-3 border-b border-white/5 pb-3">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-indigo-900 text-indigo-400 rounded-full flex items-center justify-center font-black text-sm border border-indigo-500/30">${p.author_name.charAt(0)}</div>
                                <div>
                                    <div class="text-sm font-bold text-white flex items-center gap-1">${p.author_name} <i class="fa-solid fa-circle-check text-sky-400 text-[10px]" title="Verified Profile"></i></div>
                                    <div class="text-[10px] text-slate-500 font-mono">${p.time_str}</div>
                                </div>
                            </div>
                            ${p.type === 'Poll' ? '<span class="bg-sky-900/30 text-sky-400 border border-sky-500/30 text-[9px] px-2 py-0.5 rounded font-bold uppercase tracking-widest">Poll</span>' : ''}
                        </div>
                        
                        <p class="text-sm text-slate-200 whitespace-pre-wrap leading-relaxed">${p.content}</p>
                        ${imgHtml}
                        ${pollHtml}

                        <div class="mt-4 flex items-center gap-6">
                            <button onclick="toggleLike('${p.id}')" class="flex items-center gap-2 text-sm font-bold transition-colors ${isLiked ? 'text-pink-500' : 'text-slate-400 hover:text-pink-400'}">
                                <i class="fa-solid fa-heart"></i> ${upvotes.length}
                            </button>
                            <button onclick="document.getElementById('comment-box-${p.id}').classList.toggle('hidden')" class="flex items-center gap-2 text-sm font-bold text-slate-400 hover:text-indigo-400 transition-colors">
                                <i class="fa-solid fa-comment"></i> ${comments.length}
                            </button>
                        </div>

                        ${commentsHtml}

                        <div id="comment-box-${p.id}" class="hidden mt-3 flex gap-2">
                            <input type="text" id="comment-input-${p.id}" placeholder="Write a reply..." class="flex-1 bg-black/40 border border-white/10 rounded px-3 py-2 text-xs text-white outline-none focus:border-indigo-500">
                            <button onclick="submitComment('${p.id}')" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-4 rounded text-xs transition">Reply</button>
                        </div>
                    </div>`;
                }).join('');
            } catch(e) { 
                feed.innerHTML = '<div class="text-red-400 text-center py-10">Error loading forum.</div>'; 
            }
        }
        
        async function votePoll(postId, option) {
            try {
                await fetch('/api/hub/vote', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ post_id: postId, option: option, uid: PLAYER_UID }) });
                loadForum();
            } catch(e) {}
        }

        async function toggleLike(postId) {
            try {
                await fetch('/api/hub/upvote', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ post_id: postId, uid: PLAYER_UID }) });
                loadForum();
            } catch(e) {}
        }

        async function submitComment(postId) {
            const input = document.getElementById(`comment-input-${postId}`);
            if(!input.value.trim()) return;
            try {
                await fetch('/api/hub/comment', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ post_id: postId, name: PLAYER_NAME, content: input.value.trim() }) });
                loadForum();
            } catch(e) {}
        }
        
        // Auto-Load Profile on start
        document.addEventListener('DOMContentLoaded', () => { switchTab('profile'); });
    </script>
</body>
</html>
