<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thunder Control v4.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { background-color: #020617; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass-panel { background-color: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-btn { padding: 10px 20px; font-weight: 700; color: #64748b; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .tab-btn:hover { color: #cbd5e1; }
        .tab-btn.active { color: #facc15; border-bottom-color: #facc15; }
        .input-dark { background: #0f172a; border: 1px solid #334155; color: white; padding: 8px; rounded: 6px; width: 100%; }
        .input-dark:focus { border-color: #facc15; outline: none; }
        /* Modal Animation */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-animate { animation: fadeIn 0.2s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div class="w-full bg-slate-900 border-b border-white/10 p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-bolt text-yellow-500 text-2xl"></i>
            <h1 class="text-xl font-black italic tracking-wider text-white">THUNDER <span class="text-yellow-500">CONTROL</span></h1>
        </div>
        <div class="flex gap-3">
            <button onclick="reloadData()" id="reloadBtn" class="bg-purple-600 hover:bg-purple-500 text-white px-4 py-2 rounded-lg font-bold text-sm transition-colors flex items-center gap-2">
                <i class="fa-solid fa-database"></i> Reload Data
            </button>
            
            <button onclick="syncToSheets()" id="syncBtn" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg font-bold text-sm transition-colors flex items-center gap-2">
                <i class="fa-solid fa-rotate"></i> Sync to Sheets
            </button>
            
            <a href="/" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold text-sm transition-colors">Exit</a>
        </div>
    </div>

    <div class="w-full bg-slate-900/50 border-b border-white/5">
        <div class="max-w-6xl mx-auto flex">
            <button onclick="switchTab('live')" id="tab-live" class="tab-btn active">Live Control</button>
            <button onclick="switchTab('pending')" id="tab-pending" class="tab-btn">Pending Approval <span id="pendingCount" class="bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded-full ml-1 hidden">0</span></button>
            <button onclick="switchTab('approved')" id="tab-approved" class="tab-btn">Recently Approved</button>
        </div>
    </div>
    <div class="flex-1 p-6 max-w-6xl mx-auto w-full">
        
        <div id="view-live" class="space-y-6">
            <h2 class="text-slate-500 font-bold uppercase tracking-widest text-sm mb-4">Active Table Matches</h2>
            <div id="liveList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="text-slate-600 text-center col-span-full py-10">No matches currently in progress.</div>
            </div>
        </div>

        <div id="view-pending" class="hidden space-y-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-slate-500 font-bold uppercase tracking-widest text-sm">Waiting for Verification</h2>
                <button onclick="approveAll()" class="text-xs text-green-400 font-bold hover:text-green-300 hidden" id="approveAllBtn">APPROVE ALL</button>
            </div>
            <div id="pendingList" class="space-y-3">
                <div class="text-slate-600 text-center py-10">No completed matches waiting for approval.</div>
            </div>
        </div>

        <div id="view-approved" class="hidden space-y-6">
            <h2 class="text-slate-500 font-bold uppercase tracking-widest text-sm mb-4">Approved Session History</h2>
            <div id="approvedList" class="space-y-3 opacity-75">
                <div class="text-slate-600 text-center py-10">You haven't approved any matches this session.</div>
            </div>
        </div>

    </div>

    <div id="editModal" class="fixed inset-0 bg-black/80 hidden z-[100] flex items-center justify-center p-4 modal-animate">
        <div class="glass-panel w-full max-w-lg rounded-2xl p-6 relative bg-slate-900">
            <button onclick="closeEditModal()" class="absolute top-4 right-4 text-slate-500 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            
            <h3 class="text-xl font-bold text-white mb-6">Edit Result</h3>
            <input type="hidden" id="editMatchId">

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Home Player(s)</label>
                    <input type="text" id="editHomeName" class="input-dark text-lg font-bold text-white">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Away Player(s)</label>
                    <input type="text" id="editAwayName" class="input-dark text-lg font-bold text-white">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Home Sets</label>
                    <input type="number" id="editHomeScore" class="input-dark text-3xl font-black text-center text-yellow-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Away Sets</label>
                    <input type="number" id="editAwayScore" class="input-dark text-3xl font-black text-center text-sky-500">
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Game Scores (Points)</label>
                <input type="text" id="editGamePoints" placeholder="e.g. 11-9, 5-11, 11-8..." class="input-dark text-sm font-mono text-slate-300">
                <div class="text-[10px] text-slate-600 mt-1">Edit the specific points for record keeping.</div>
            </div>

            <div class="flex gap-3">
                <button onclick="saveEdit()" class="flex-1 bg-green-600 hover:bg-green-500 text-white py-3 rounded-xl font-bold transition-colors">Save Changes</button>
                <button onclick="closeEditModal()" class="px-6 py-3 rounded-xl font-bold text-slate-400 hover:text-white border border-slate-700 hover:bg-slate-800 transition-colors">Cancel</button>
            </div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, onSnapshot, doc, updateDoc, deleteDoc } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIG MUST MATCH IPAD
        const firebaseConfig = { apiKey: "AIzaSyDq05wFsKLHtt8G0Z5yLOG9pIk9UX24S4o", authDomain: "gctta-stats-live.firebaseapp.com", projectId: "gctta-stats-live", storageBucket: "gctta-stats-live.firebasestorage.app", messagingSenderId: "1070856258556", appId: "1:1070856258556:web:be438e04c1941abc3c6879" };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // STATE
        let allMatches = [];
        let recentlyApproved = [];

        // LISTEN TO FIREBASE
        const q = query(collection(db, "fixtures"));
        onSnapshot(q, (snapshot) => {
            allMatches = [];
            snapshot.forEach((doc) => {
                let d = doc.data();
                d.id = doc.id;
                allMatches.push(d);
            });
            renderAll();
        });

        // RENDER LOGIC
        function renderAll() {
            const liveContainer = document.getElementById('liveList');
            const pendingContainer = document.getElementById('pendingList');
            const pendingCount = document.getElementById('pendingCount');
            
            let liveHTML = "";
            let pendingHTML = "";
            let pCount = 0;

            allMatches.forEach(m => {
                // NAME LOGIC: Prefer explicit player names over Team Names
                let home = (m.current_home_players && m.current_home_players.length > 0) ? m.current_home_players.join(" / ") : m.home_team;
                let away = (m.current_away_players && m.current_away_players.length > 0) ? m.current_away_players.join(" / ") : m.away_team;

                // 1. LIVE MATCHES (Score exists, Status is NOT Finished/Verified)
                if (m.live_home_score !== undefined && m.match_status !== "Finished" && m.match_status !== "Verified" && m.match_status !== "Archived") {
                    let setScore = `${m.live_home_sets || 0}-${m.live_away_sets || 0}`;
                    liveHTML += `
                    <div class="glass-panel p-4 rounded-xl flex justify-between items-center relative overflow-hidden group">
                        <div class="absolute left-0 top-0 bottom-0 w-1 bg-yellow-500"></div>
                        <div class="flex-1">
                            <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Table ${m.table} • ${m.division}</div>
                            <div class="text-white font-bold text-lg leading-tight">${home} <span class="text-slate-500 mx-1">vs</span> ${away}</div>
                            <div class="text-2xl font-black text-white mt-1 font-mono">${m.live_home_score} - ${m.live_away_score} <span class="text-sm text-yellow-500 ml-2 font-bold">(Sets: ${setScore})</span></div>
                        </div>
                        <button onclick="forceFinish('${m.id}')" class="bg-slate-800 hover:bg-red-900/50 hover:text-red-400 text-slate-400 px-3 py-2 rounded-lg text-xs font-bold transition-all border border-slate-700">Force Finish</button>
                    </div>`;
                }

                // 2. PENDING (Status IS "Finished" but NOT "Verified" or "Archived")
                else if (m.match_status === "Finished") {
                    pCount++;
                    pendingHTML += `
                    <div class="glass-panel p-4 rounded-xl flex justify-between items-center border-l-4 border-l-blue-500">
                        <div>
                            <div class="text-xl font-black text-white mb-1">${m.live_home_sets} - ${m.live_away_sets}</div>
                            <div class="text-sm font-bold text-slate-300">${home} <span class="text-slate-500 text-xs">vs</span> ${away}</div>
                            <div class="text-[10px] text-slate-500 font-mono mt-1">${m.division} • Table ${m.table}</div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="openEdit('${m.id}')" class="bg-slate-700 hover:bg-slate-600 text-white px-3 py-2 rounded-lg text-xs font-bold uppercase tracking-wider">Edit</button>
                            <button onclick="approveMatch('${m.id}')" class="bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider shadow-lg shadow-green-900/20">Approve</button>
                        </div>
                    </div>`;
                }
            });

            liveContainer.innerHTML = liveHTML || '<div class="text-slate-600 text-center col-span-full py-10">No matches currently in progress.</div>';
            pendingContainer.innerHTML = pendingHTML || '<div class="text-slate-600 text-center py-10">No completed matches waiting for approval.</div>';
            
            if (pCount > 0) {
                pendingCount.innerText = pCount;
                pendingCount.classList.remove('hidden');
                document.getElementById('approveAllBtn').classList.remove('hidden');
            } else {
                pendingCount.classList.add('hidden');
                document.getElementById('approveAllBtn').classList.add('hidden');
            }
        }

        // --- ACTIONS ---

        window.approveMatch = async (id) => {
            const m = allMatches.find(x => x.id === id);
            if (!m) return;

            // 1. Update Firebase
            const ref = doc(db, "fixtures", id);
            await updateDoc(ref, { match_status: "Verified" });

            // 2. Move to Local "Recently Approved" List
            let home = (m.current_home_players && m.current_home_players.length > 0) ? m.current_home_players.join(" / ") : m.home_team;
            let away = (m.current_away_players && m.current_away_players.length > 0) ? m.current_away_players.join(" / ") : m.away_team;
            
            recentlyApproved.unshift({
                home: home,
                away: away,
                score: `${m.live_home_sets}-${m.live_away_sets}`,
                time: new Date().toLocaleTimeString()
            });
            renderApproved();
        };

        window.forceFinish = async (id) => {
            if(!confirm("Are you sure? This will end the match immediately.")) return;
            const ref = doc(db, "fixtures", id);
            await updateDoc(ref, { match_status: "Finished" }); 
        };

        window.openEdit = (id) => {
            const m = allMatches.find(x => x.id === id);
            if (!m) return;
            
            document.getElementById('editMatchId').value = id;
            
            // Populate Names
            let home = (m.current_home_players && m.current_home_players.length > 0) ? m.current_home_players.join(" / ") : m.home_team;
            let away = (m.current_away_players && m.current_away_players.length > 0) ? m.current_away_players.join(" / ") : m.away_team;
            
            document.getElementById('editHomeName').value = home;
            document.getElementById('editAwayName').value = away;
            document.getElementById('editHomeScore').value = m.live_home_sets;
            document.getElementById('editAwayScore').value = m.live_away_sets;
            
            // Populate Game Points (if they exist)
            document.getElementById('editGamePoints').value = m.game_scores_history || "";

            document.getElementById('editModal').classList.remove('hidden');
        };

        window.saveEdit = async () => {
            const id = document.getElementById('editMatchId').value;
            const homeName = document.getElementById('editHomeName').value;
            const awayName = document.getElementById('editAwayName').value;
            const hScore = parseInt(document.getElementById('editHomeScore').value);
            const aScore = parseInt(document.getElementById('editAwayScore').value);
            const points = document.getElementById('editGamePoints').value;

            // Split names back into array if user used slashes
            const hPlayers = homeName.includes('/') ? homeName.split('/').map(s => s.trim()) : [homeName];
            const aPlayers = awayName.includes('/') ? awayName.split('/').map(s => s.trim()) : [awayName];

            const ref = doc(db, "fixtures", id);
            await updateDoc(ref, {
                current_home_players: hPlayers,
                current_away_players: aPlayers,
                live_home_sets: hScore,
                live_away_sets: aScore,
                game_scores_history: points 
            });

            closeEditModal();
        };

        window.closeEditModal = () => document.getElementById('editModal').classList.add('hidden');

        function renderApproved() {
            const container = document.getElementById('approvedList');
            if (recentlyApproved.length === 0) return;
            
            container.innerHTML = recentlyApproved.map(m => `
                <div class="bg-slate-800 p-3 rounded-lg flex justify-between items-center border border-white/5">
                    <div>
                        <div class="text-white font-bold">${m.home} vs ${m.away}</div>
                        <div class="text-xs text-slate-500">Approved at ${m.time}</div>
                    </div>
                    <div class="text-xl font-black text-green-500">${m.score}</div>
                </div>
            `).join('');
        }

        // TABS
        window.switchTab = (tab) => {
            ['live', 'pending', 'approved'].forEach(t => {
                document.getElementById(`view-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('active');
            });
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('active');
        };

        // --- NEW REFRESH & SYNC LOGIC ---

        window.syncToSheets = async () => {
            const btn = document.getElementById('syncBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Syncing...';
            
            try {
                // Calls the Python bridge to move data from Firebase -> Sheets
                const res = await fetch('/api/admin/sync_firebase', { method: 'POST' });
                const data = await res.json();
                
                if (data.success) {
                    alert(`Sync Complete! ${data.count} matches moved to Google Sheets.`);
                } else {
                    alert("Sync Error: " + data.error);
                }
            } catch(e) {
                alert("Network/Server Error: " + e);
            }
            btn.innerHTML = originalText;
        }

        window.reloadData = async () => {
            const btn = document.getElementById('reloadBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Loading...';
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            
            try {
                // Calls Python to re-read the entire Google Sheet immediately
                const res = await fetch('/api/admin/refresh_data', { method: 'POST' });
                const data = await res.json();
                if(data.success) {
                    btn.classList.remove('bg-purple-600', 'hover:bg-purple-500');
                    btn.classList.add('bg-green-600', 'hover:bg-green-500');
                    btn.innerHTML = '<i class="fa-solid fa-check"></i> Updated!';
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.classList.remove('bg-green-600', 'hover:bg-green-500');
                        btn.classList.add('bg-purple-600', 'hover:bg-purple-500');
                        btn.classList.remove('opacity-50', 'cursor-not-allowed');
                    }, 2000);
                } else {
                    alert("Error refreshing: " + data.error);
                    btn.innerHTML = originalText;
                }
            } catch(e) {
                alert("Network Error");
                btn.innerHTML = originalText;
            }
        };
    </script>
</body>
</html>
