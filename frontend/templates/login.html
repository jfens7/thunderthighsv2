<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - GCTTA Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; overflow: hidden; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        /* Stars Background */
        #starContainer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: twinkle var(--duration) ease-in-out infinite; animation-delay: var(--delay); }
        .s-small { width: 1px; height: 1px; } .s-medium { width: 2px; height: 2px; } .s-large { width: 3px; height: 3px; box-shadow: 0 0 4px rgba(255, 255, 255, 0.8); }
        @keyframes twinkle { 0%, 100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 0.8; transform: scale(1.2); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative px-4">
    <div id="starContainer"></div>

    <div class="glass-panel p-8 md:p-10 rounded-2xl w-full max-w-md relative shadow-2xl animate-[fadeIn_0.5s_ease-out]">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-600/20 rounded-full flex items-center justify-center mx-auto mb-4 border border-blue-500/30 shadow-[0_0_15px_rgba(37,99,235,0.5)]">
                <i class="fa-solid fa-lock text-2xl text-blue-400"></i>
            </div>
            <h2 class="text-3xl font-black text-white tracking-tight">Admin Access</h2>
            <p class="text-slate-400 mt-2 text-sm">Enter the master password to continue.</p>
        </div>

        {% if error %}
        <div class="bg-red-500/20 border border-red-500/50 text-red-400 px-4 py-3 rounded-lg mb-6 text-sm font-bold text-center flex items-center justify-center gap-2 animate-pulse">
            <i class="fa-solid fa-triangle-exclamation"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-6">
            <div>
                <div class="relative">
                    <input type="password" name="password" id="password" placeholder="Password..." required autofocus
                        class="w-full bg-black/40 border border-white/10 text-white rounded-xl px-5 py-4 pl-12 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all placeholder-slate-500 text-lg tracking-widest">
                    <i class="fa-solid fa-key absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                </div>
            </div>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl transition shadow-lg flex items-center justify-center gap-2 text-lg">
                Unlock <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="/" class="text-slate-500 hover:text-white text-sm font-bold transition flex items-center justify-center gap-2">
                <i class="fa-solid fa-house text-xs"></i> Return to Main Site
            </a>
        </div>
    </div>

    <script>
        function generateStars() { 
            const container = document.getElementById('starContainer'); 
            const starCount = 50; 
            for (let i = 0; i < starCount; i++) { 
                const star = document.createElement('div'); 
                const sizeClass = Math.random() < 0.6 ? 's-small' : (Math.random() < 0.9 ? 's-medium' : 's-large'); 
                star.className = `star ${sizeClass}`; 
                star.style.top = `${Math.random() * 100}%`; 
                star.style.left = `${Math.random() * 100}%`; 
                star.style.setProperty('--duration', `${2 + Math.random() * 3}s`); 
                star.style.setProperty('--delay', `${Math.random() * 2}s`); 
                container.appendChild(star); 
            } 
        }
        window.onload = generateStars;
    </script>
</body>
</html>
