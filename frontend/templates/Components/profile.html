<div id="statsContainer" class="hidden w-full max-w-5xl mx-auto pt-24 px-4 pb-20 animate-fade-in">
    
    <button onclick="closeProfile()" class="mb-6 flex items-center text-slate-400 hover:text-white transition-colors group">
        <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center mr-3 group-hover:bg-slate-700">
            <i class="fa-solid fa-arrow-left"></i>
        </div>
        <span class="font-bold uppercase tracking-wider text-sm">Back to Dashboard</span>
    </button>

    <div class="bg-slate-800/80 backdrop-blur-md rounded-2xl p-6 md:p-8 shadow-2xl border border-white/5 relative overflow-hidden mb-8">
        <div class="absolute top-0 right-0 w-64 h-64 bg-yellow-500/5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2 pointer-events-none"></div>

        <div class="relative z-10 flex flex-col md:flex-row items-center md:items-start gap-8">
            <div class="w-24 h-24 md:w-32 md:h-32 rounded-full bg-gradient-to-br from-slate-700 to-slate-900 flex items-end justify-center shadow-xl border-4 border-slate-700/50 overflow-hidden shrink-0">
                <i class="fa-solid fa-user text-5xl md:text-6xl text-slate-500 translate-y-1"></i>
            </div>

            <div class="flex-1 text-center md:text-left w-full">
                <h1 id="playerName" class="text-3xl md:text-5xl font-black text-white mb-2 tracking-tight truncate">Loading...</h1>
                <div id="playerRatingBadge" class="inline-block bg-yellow-500/20 text-yellow-400 font-mono font-bold px-3 py-1 rounded text-sm mb-4 border border-yellow-500/20">
                    Rating: ...
                </div>
                
                <div class="flex flex-wrap justify-center md:justify-start gap-3">
                    <div class="relative">
                        <i class="fa-solid fa-calendar absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                        <select id="seasonSelect" class="bg-black/40 border border-white/10 text-white text-sm rounded-lg pl-9 pr-8 py-2 focus:ring-2 focus:ring-yellow-500 focus:outline-none appearance-none cursor-pointer hover:bg-black/60 transition-colors">
                            <option value="Career">Career</option>
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs pointer-events-none"></i>
                    </div>

                    <div class="relative">
                        <i class="fa-solid fa-layer-group absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                        <select id="profileDivisionSelect" class="bg-black/40 border border-white/10 text-white text-sm rounded-lg pl-9 pr-8 py-2 focus:ring-2 focus:ring-yellow-500 focus:outline-none appearance-none cursor-pointer hover:bg-black/60 transition-colors">
                            <option value="All">All Divisions</option>
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs pointer-events-none"></i>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 w-full md:w-auto">
                <div class="bg-black/20 p-4 rounded-xl border border-white/5 text-center min-w-[100px]">
                    <div id="winRate" class="text-2xl font-black text-green-400">0%</div>
                    <div class="text-[10px] uppercase text-slate-500 font-bold tracking-wider">Win Rate</div>
                </div>
                <div class="bg-black/20 p-4 rounded-xl border border-white/5 text-center min-w-[100px]">
                    <div id="matchesPlayed" class="text-2xl font-black text-white">0</div>
                    <div class="text-[10px] uppercase text-slate-500 font-bold tracking-wider">Matches</div>
                </div>
                <div class="bg-black/20 p-4 rounded-xl border border-white/5 text-center min-w-[100px]">
                    <div id="wins" class="text-2xl font-black text-blue-400">0</div>
                    <div class="text-[10px] uppercase text-slate-500 font-bold tracking-wider">Wins</div>
                </div>
                <div class="bg-black/20 p-4 rounded-xl border border-white/5 text-center min-w-[100px]">
                    <div id="losses" class="text-2xl font-black text-red-400">0</div>
                    <div class="text-[10px] uppercase text-slate-500 font-bold tracking-wider">Losses</div>
                </div>
            </div>
        </div>
    </div>

    <h3 class="text-xl font-bold text-white mb-4 flex items-center gap-2">
        <i class="fa-solid fa-clock-rotate-left text-yellow-500"></i> Match History
    </h3>
    <div id="matchHistory" class="bg-slate-800/50 backdrop-blur-sm rounded-xl border border-white/5 overflow-hidden min-h-[200px]">
        <div class="p-8 text-center text-slate-500">
            <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i><br>Loading history...
        </div>
    </div>
</div>
