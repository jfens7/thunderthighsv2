<div id="tab-sheets" class="hidden w-full max-w-7xl mx-auto pt-24 px-4 pb-20 animate-fade-in">
    
    <div class="flex flex-col md:flex-row justify-between items-end mb-8 border-b border-white/10 pb-6 gap-6">
        <div>
            <h1 class="text-4xl md:text-5xl font-black text-white tracking-tight mb-2">MATCH <span class="text-yellow-500">CENTRE</span></h1>
            <p class="text-slate-400 font-medium">Detailed breakdown of every match, set, and rally.</p>
        </div>

        <div class="flex flex-wrap gap-3 bg-black/20 p-2 rounded-xl border border-white/5 w-full md:w-auto">
            
            <div class="relative flex-1 md:flex-none">
                <i class="fa-solid fa-calendar absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                <select id="resultsSeason" class="w-full md:w-40 bg-slate-800 border border-white/10 text-white text-sm rounded-lg pl-9 pr-8 py-2.5 focus:ring-2 focus:ring-yellow-500 focus:outline-none appearance-none font-bold hover:bg-slate-700 transition-colors cursor-pointer" onchange="loadResults()">
                    </select>
                <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs pointer-events-none"></i>
            </div>

            <div class="relative flex-1 md:flex-none">
                <i class="fa-solid fa-clock absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                <select id="resultsWeek" class="w-full md:w-32 bg-slate-800 border border-white/10 text-white text-sm rounded-lg pl-9 pr-8 py-2.5 focus:ring-2 focus:ring-yellow-500 focus:outline-none appearance-none font-bold hover:bg-slate-700 transition-colors cursor-pointer" onchange="loadResults()">
                    <option value="1">Week 1</option>
                    <option value="2">Week 2</option>
                    <option value="3">Week 3</option>
                    <option value="4">Week 4</option>
                    <option value="5">Week 5</option>
                    <option value="6">Week 6</option>
                    <option value="7">Week 7</option>
                    <option value="8">Week 8</option>
                    <option value="9">Week 9</option>
                    <option value="10">Week 10</option>
                    <option value="11">Week 11</option>
                    <option value="12">Week 12</option>
                    <option value="13">Week 13</option>
                    <option value="14">Week 14</option>
                    <option value="15">Week 15</option>
                </select>
                <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs pointer-events-none"></i>
            </div>

            <div class="relative flex-1 md:flex-none w-full md:w-64">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                <input type="text" id="resultsSearch" placeholder="Filter by player..." class="w-full bg-slate-800 border border-white/10 text-white text-sm rounded-lg pl-9 pr-4 py-2.5 focus:ring-2 focus:ring-yellow-500 focus:outline-none font-medium hover:bg-slate-700 transition-colors placeholder-slate-500" oninput="loadResults()">
            </div>
        </div>
    </div>

    <div id="resultsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="col-span-1 md:col-span-2 text-center py-20">
            <i class="fa-solid fa-spinner fa-spin text-4xl text-slate-600 mb-4"></i>
            <p class="text-slate-500 animate-pulse">Loading match data...</p>
        </div>
    </div>
</div>
