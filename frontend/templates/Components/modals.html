<div id="donateModal" class="fixed inset-0 flex items-center justify-center hidden z-[120] bg-black/90 backdrop-blur-sm px-4">
    <div class="bg-slate-900 border border-white/10 rounded-2xl p-6 md:p-8 w-full max-w-md relative shadow-2xl">
        <button onclick="closeDonateModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
        <h3 class="text-2xl font-black text-white mb-2"><i class="fa-solid fa-burger text-yellow-500 mr-2"></i> Support the Project</h3>
        
        <p class="text-sm text-slate-400 mb-6">For the price of a Maccas cheeseburger, you can help support the upgrades, updates, and maintenance of this project! (Server costs are $10/mo and maintenance is $12/mo).</p>
        
        <div id="donate-step-1">
            <div class="grid grid-cols-3 gap-3 mb-4">
                <button onclick="setDonationAmount(5)" class="donate-amt-btn bg-black/40 border border-white/10 p-3 rounded-lg text-white font-bold hover:border-yellow-500 transition focus:outline-none">$5</button>
                <button onclick="setDonationAmount(10)" class="donate-amt-btn bg-black/40 border border-white/10 p-3 rounded-lg text-white font-bold hover:border-yellow-500 transition focus:outline-none">$10</button>
                <button onclick="setDonationAmount(20)" class="donate-amt-btn bg-black/40 border border-white/10 p-3 rounded-lg text-white font-bold hover:border-yellow-500 transition focus:outline-none">$20</button>
            </div>
            <div class="relative mb-6">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">$</span>
                <input type="number" id="custom-donate-amount" placeholder="Custom Amount (Min $5)" class="w-full bg-black/40 border border-white/10 p-3 pl-8 rounded-lg text-white font-bold outline-none focus:border-yellow-500 transition" oninput="clearDonateButtons()">
            </div>
            <button onclick="proceedToPayment()" id="proceed-pay-btn" class="w-full py-4 bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-black rounded-xl transition-colors flex justify-center items-center gap-2">
                Continue to Checkout <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>

        <div id="donate-step-2" class="hidden">
            <div id="payment-element" class="bg-white p-4 rounded-xl mb-4"></div>
            <button onclick="submitStripePayment()" id="final-pay-btn" class="w-full py-4 bg-green-500 hover:bg-green-400 text-slate-900 font-black rounded-xl transition-colors flex justify-center items-center gap-2"><i class="fa-solid fa-lock"></i> Pay Now</button>
            <div id="payment-message" class="text-center mt-3 text-sm hidden font-bold"></div>
            <button onclick="resetDonateModal()" class="w-full text-center text-slate-500 mt-4 text-sm hover:text-white">Back</button>
        </div>
    </div>
</div>

<div id="reportModal" class="fixed inset-0 flex items-center justify-center hidden z-[110] bg-black/90 backdrop-blur-sm px-4">
    <div class="bg-slate-900 border border-white/10 rounded-2xl p-6 md:p-8 w-full max-w-lg relative shadow-2xl">
        <button onclick="closeReportModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
        <h3 class="text-2xl font-bold text-white mb-2 text-red-400"><i class="fa-solid fa-triangle-exclamation mr-2"></i> Report Issue</h3>
        <p class="text-xs text-slate-400 mb-6" id="report-match-desc"></p>

        <input type="hidden" id="rep-p1">
        <input type="hidden" id="rep-p2">
        <input type="hidden" id="rep-date">

        <div class="space-y-4">
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase">Your Name (Reporter)</label>
                <input type="text" id="repName" placeholder="e.g. John Doe" class="w-full mt-1 bg-black/40 border border-white/10 rounded p-3 text-white outline-none focus:border-red-500 transition">
            </div>
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase">What's wrong?</label>
                <textarea id="repDesc" class="w-full mt-1 bg-black/40 border border-white/10 rounded p-3 text-white outline-none resize-none h-32 focus:border-red-500 transition" placeholder="e.g., Score should be 3-1, not 3-0"></textarea>
            </div>
            <div class="flex gap-4">
                <div class="flex-1">
                    <label class="text-xs font-bold text-slate-500 uppercase truncate block" id="lbl-rep-p1">P1 Sets</label>
                    <input type="number" id="rep-s1" class="w-full mt-1 bg-black/40 border border-white/10 rounded p-3 text-white text-center font-mono outline-none focus:border-red-500">
                </div>
                <div class="flex-1">
                    <label class="text-xs font-bold text-slate-500 uppercase truncate block" id="lbl-rep-p2">P2 Sets</label>
                    <input type="number" id="rep-s2" class="w-full mt-1 bg-black/40 border border-white/10 rounded p-3 text-white text-center font-mono outline-none focus:border-red-500">
                </div>
            </div>
            <button onclick="submitReport()" class="w-full bg-red-600 hover:bg-red-500 py-3 rounded-lg font-bold text-white transition shadow-lg mt-2">Submit Correction</button>
        </div>
    </div>
</div>

<div id="feedbackModal" class="hidden fixed inset-0 z-[120] bg-black/90 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-slate-900 p-6 md:p-8 rounded-2xl max-w-md w-full relative border border-white/10 shadow-2xl">
        <button onclick="document.getElementById('feedbackModal').classList.add('hidden')" class="absolute top-4 right-4 text-slate-500 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
        <h3 class="text-xl font-bold text-white mb-4"><i class="fa-solid fa-bullhorn text-sky-400 mr-2"></i> Submit Feedback</h3>
        <div class="space-y-4">
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase">Your Name</label>
                <input type="text" id="fb-name" placeholder="e.g. John Doe" class="w-full mt-1 bg-black/40 border border-white/10 rounded-lg p-3 text-white outline-none focus:border-sky-500 transition">
            </div>
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase">Nature of Request</label>
                <select id="fb-type" class="w-full mt-1 bg-black/40 border border-white/10 rounded-lg p-3 text-white outline-none focus:border-sky-500 transition">
                    <option value="Bug">Report a Bug / Issue</option>
                    <option value="Suggestion">Request a Feature</option>
                    <option value="Complaint">Complaint</option>
                </select>
            </div>
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase">What were you doing?</label>
                <input type="text" id="fb-context" placeholder="e.g. Searching for stats, checking standings..." class="w-full mt-1 bg-black/40 border border-white/10 rounded-lg p-3 text-white outline-none focus:border-sky-500 transition">
            </div>
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase">Description</label>
                <textarea id="fb-msg" placeholder="Tell us exactly what happened or what you want..." class="w-full mt-1 bg-black/40 border border-white/10 rounded-lg p-3 h-24 text-white outline-none resize-none focus:border-sky-500 transition"></textarea>
            </div>
            <button onclick="submitFeedback()" class="w-full bg-sky-600 hover:bg-sky-500 py-3 rounded-lg font-bold text-white transition shadow-lg mt-2">Send Report</button>
        </div>
    </div>
</div>

<div id="compareModal" class="fixed inset-0 flex items-center justify-center hidden z-50 modal-bg px-4">
    <div class="glass-panel rounded-2xl p-6 md:p-8 w-full max-w-md relative">
        <button onclick="closeCompareModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
        <h3 class="text-2xl font-bold text-white mb-6">Head-to-Head</h3>
        <div class="relative mb-8">
            <input type="text" id="compareInput" class="input-premium w-full p-4 rounded-xl text-lg" placeholder="VS Opponent Name..." autocomplete="off">
            <div id="compare-suggestions-list" class="absolute w-full mt-2 bg-slate-800 rounded-xl shadow-2xl z-50"></div>
        </div>
        <div id="compareResults" class="hidden">
            <div class="flex justify-between items-center mb-8">
                <div class="text-center w-1/3">
                    <div class="text-yellow-500 font-bold text-lg truncate" id="comp-p1-name"></div>
                    <div class="text-5xl font-black text-white my-2" id="comp-p1-wins">0</div>
                    <div class="text-[10px] font-bold text-slate-500 tracking-widest">WINS</div>
                </div>
                <div class="text-slate-600 font-black text-2xl">VS</div>
                <div class="text-center w-1/3">
                    <div class="text-sky-500 font-bold text-lg truncate" id="comp-p2-name"></div>
                    <div class="text-5xl font-black text-white my-2" id="comp-p2-wins">0</div>
                    <div class="text-[10px] font-bold text-slate-500 tracking-widest">WINS</div>
                </div>
            </div>
            <div id="compareLog" class="max-h-48 overflow-y-auto text-sm space-y-1"></div>
        </div>
    </div>
</div>
