<script>
    // ==========================================
    // MAIN SEARCH LOGIC 
    // ==========================================
    window.allPlayersRaw = []; 

    window.setupMainSearch = function() {
        const topNavSearch = document.getElementById('playerSearch');
        const bigSearch = document.getElementById('bigPlayerSearch');
        
        if (topNavSearch) bindSearchLogic(topNavSearch, 'suggestions-list');
        if (bigSearch) bindSearchLogic(bigSearch, 'big-suggestions-list');
    };

    function bindSearchLogic(inputElement, suggestionsContainerId) {
        const suggContainer = document.getElementById(suggestionsContainerId);
        if (!suggContainer) return;

        inputElement.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            
            if (query.length < 2) {
                suggContainer.classList.add('hidden');
                return;
            }

            const matches = window.allPlayersRaw.filter(p => p.toLowerCase().includes(query));
            
            if (matches.length === 0) {
                suggContainer.innerHTML = '<div class="p-4 text-center text-slate-500 italic text-sm">No players found.</div>';
                suggContainer.classList.remove('hidden');
                return;
            }

            suggContainer.innerHTML = matches.slice(0, 10).map(p => `
                <div onclick="window.loadStats('${p.replace(/'/g, "\\'")}')" class="px-4 py-3 hover:bg-sky-900/30 cursor-pointer text-white font-bold border-b border-white/5 transition-colors flex justify-between items-center group">
                    <span class="group-hover:text-sky-400 transition-colors">${p}</span>
                    <i class="fa-solid fa-chevron-right text-slate-600 group-hover:text-sky-500 transition-colors text-xs"></i>
                </div>
            `).join('');
            
            suggContainer.classList.remove('hidden');
        });

        document.addEventListener('click', (e) => {
            if (e.target !== inputElement && e.target !== suggContainer && !suggContainer.contains(e.target)) {
                suggContainer.classList.add('hidden');
            }
        });
    }

    // ==========================================
    // AUTH DROPDOWN & SMART INTERCEPTOR
    // ==========================================
    window.toggleAuthDropdown = function() {
        const menu = document.getElementById('authDropdownMenu');
        if (menu) menu.classList.toggle('hidden');
    };

    document.addEventListener('click', (e) => {
        // 1. Close dropdown if clicking outside of it
        const container = document.getElementById('authDropdownContainer');
        const menu = document.getElementById('authDropdownMenu');
        if (container && menu && !container.contains(e.target)) {
            menu.classList.add('hidden');
        }

        // 2. Intercept ANY links trying to go to the old portal or login pages
        const targetLink = e.target.closest('a');
        if (targetLink) {
            const href = targetLink.getAttribute('href');
            if (href === '/player_auth' || href === '/dashboard' || href === '#player-portal') {
                e.preventDefault();
                const isLoggedIn = !document.querySelector('.auth-logged-in').classList.contains('hidden');
                if(isLoggedIn) {
                    window.switchTab('player-hub');
                } else {
                    window.switchTab('home'); 
                    if (menu) menu.classList.remove('hidden'); 
                }
            }
        }
        
        // 3. Intercept ANY buttons anywhere that say "PLAYER PORTAL"
        const targetBtn = e.target.closest('button');
        if (targetBtn && targetBtn.innerText && targetBtn.innerText.toUpperCase().includes('PLAYER PORTAL')) {
            e.preventDefault();
            const isLoggedIn = !document.querySelector('.auth-logged-in').classList.contains('hidden');
            if(isLoggedIn) {
                window.switchTab('player-hub');
            } else {
                window.switchTab('home');
                if (menu) menu.classList.remove('hidden'); 
            }
        }
    });

    // ==========================================
    // UI ENGINE & NAVIGATION
    // ==========================================
    window.switchTab = function(tabId) {
        const tabs = ['home', 'search', 'standings', 'results', 'profile', 'community', 'live', 'player-hub'];
        tabs.forEach(t => {
            const el = document.getElementById(t + 'Container');
            if(el) el.classList.add('hidden');
            
            const navBtn = document.getElementById('nav-' + t);
            if(navBtn) {
                navBtn.classList.remove('text-yellow-400', 'scale-110');
                navBtn.classList.add('text-slate-500');
            }
        });
        
        const targetEl = document.getElementById(tabId + 'Container');
        if(targetEl) targetEl.classList.remove('hidden');
        
        const targetNavBtn = document.getElementById('nav-' + (tabId === 'profile' ? 'search' : tabId));
        if(targetNavBtn) {
            targetNavBtn.classList.remove('text-slate-500');
            targetNavBtn.classList.add('text-yellow-400', 'scale-110');
        }

        if(tabId === 'results') window.loadResults();
        if(tabId === 'community') window.loadCommunityFeed();
    };

    window.closeProfile = function() {
        document.getElementById('statsContainer').classList.add('hidden');
        document.getElementById('searchContainer').classList.remove('hidden');
    };

    // ==========================================
    // STATS PROFILES & TOGGLE LOGIC
    // ==========================================
    window.currentProfileName = "";
    window.currentProfileData = null;

    window.loadStats = async function(playerName, pushHistory = true) {
        window.currentProfileName = playerName;
        if (pushHistory) { history.pushState({ page: 'profile', name: playerName }, "", "#profile/" + encodeURIComponent(playerName)); }
        
        ['home', 'week', 'sheets', 'search', 'notices', 'community', 'live-center', 'rules', 'player-hub'].forEach(t => { 
            const el = document.getElementById(`tab-${t}`); 
            if(el) el.classList.add('hidden'); 
        });
        
        const statsContainer = document.getElementById('statsContainer');
        if (statsContainer) {
            statsContainer.classList.remove('hidden');
            statsContainer.classList.add('animate-fade-in');
        }

        document.getElementById('playerName').innerText = playerName;
        document.getElementById('playerRatingBadge').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
        
        const season = document.getElementById('seasonSelect')?.value || 'Career';
        const division = document.getElementById('profileDivisionSelect')?.value || 'All';
        
        try {
            const res = await fetch(`/api/stats/${encodeURIComponent(playerName)}?season=${encodeURIComponent(season)}&division=${encodeURIComponent(division)}`);
            if (!res.ok) throw new Error("Player not found");
            const d = await res.json();
            window.currentProfileData = d;
            
            window.renderProfile();
            
        } catch(e) {
            window.currentProfileData = null;
            document.getElementById('playerRatingBadge').innerHTML = "N/A";
            document.getElementById('matchHistory').innerHTML = '<div class="text-center py-10 text-red-500">Error loading profile data.</div>';
        }
    };

    window.renderProfile = function() {
        if (!window.currentProfileData) return;
        const d = window.currentProfileData;
        
        const toggleEl = document.getElementById('profileFillinToggle');
        const isCombined = toggleEl ? toggleEl.checked : true; 
        
        const toggleBg = document.getElementById('toggleBg');
        const toggleDot = document.getElementById('toggleDot');
        
        if (toggleBg && toggleDot) {
            if (isCombined) {
                toggleBg.classList.remove('bg-slate-600');
                toggleBg.classList.add('bg-sky-500');
                toggleDot.classList.add('translate-x-5');
            } else {
                toggleBg.classList.remove('bg-sky-500');
                toggleBg.classList.add('bg-slate-600');
                toggleDot.classList.remove('translate-x-5');
            }
        }
        
        const displayStats = isCombined ? d.combined : d.regular; 
        
        document.getElementById('playerRatingBadge').innerHTML = `
            ${d.rating} <span class="text-[10px] text-sky-400 font-bold ml-1">±${d.rd}</span>
        `;
        
        document.getElementById('matchesPlayed').innerText = displayStats.matches || 0;
        document.getElementById('wins').innerText = displayStats.wins || 0;
        document.getElementById('losses').innerText = displayStats.losses || 0;
        document.getElementById('winRate').innerText = displayStats.win_rate || "0%";
        
        // Always render insights since data might have changed
        window.renderInsights();

        const histContainer = document.getElementById('matchHistory');
        if (!displayStats.match_history || displayStats.match_history.length === 0) {
            histContainer.innerHTML = '<div class="p-10 text-center text-slate-500 italic border border-white/5 rounded-xl bg-slate-800/30 text-sm">No match history available for this filter.</div>';
            return;
        }

        histContainer.innerHTML = displayStats.match_history.map(m => {
            const won = m.result === 'Win';
            const bgColor = won ? 'bg-green-500/10' : 'bg-red-500/10';
            const borderColor = won ? 'border-green-500/20' : 'border-red-500/20';
            const textColor = won ? 'text-green-400' : 'text-red-400';
            const icon = won ? 'fa-check' : 'fa-xmark';
            
            const delta = m.delta || 0;
            const deltaStr = (delta > 0 ? '+' : '') + delta.toFixed(1);
            const deltaColor = delta > 0 ? 'text-emerald-400' : (delta < 0 ? 'text-red-400' : 'text-slate-500');
            const deltaBadge = `<span class="${deltaColor} text-[10px] font-mono font-black ml-2 bg-black/40 px-1.5 py-0.5 rounded border border-white/5 shadow-inner">${deltaStr} <i class="fa-solid ${delta > 0 ? 'fa-arrow-trend-up' : (delta < 0 ? 'fa-arrow-trend-down' : 'fa-minus')} ml-1"></i></span>`;
            
            const fillBadge = m.type === 'Fill-in' ? `<span class="text-[9px] bg-yellow-500/20 text-yellow-500 border border-yellow-500/30 px-2 py-0.5 rounded font-black uppercase tracking-widest ml-2">Fill-in</span>` : '';
            
            let detailsHtml = m.details ? `<div class="mt-3 text-xs font-mono text-slate-400 bg-black/20 p-2.5 rounded-lg border border-white/5 tracking-wider">${m.details}</div>` : '';
            
            return `
            <div class="p-4 md:p-5 border-b border-white/5 last:border-0 hover:bg-white/5 transition-colors ${bgColor}">
                <div class="flex justify-between items-start mb-2">
                    <div class="flex items-center gap-2 md:gap-3 flex-wrap">
                        <span class="${textColor} font-black text-sm md:text-base flex items-center"><i class="fa-solid ${icon} mr-1.5 md:mr-2"></i>${m.result}</span>
                        <div class="flex items-center">
                            <span class="text-[10px] md:text-xs text-slate-400 font-mono tracking-widest bg-black/40 px-2 py-0.5 rounded border ${borderColor}">${m.date}</span>
                            ${fillBadge}
                        </div>
                    </div>
                    <div class="flex items-center">
                        <span class="font-black text-base md:text-lg ${textColor} font-mono tracking-tighter bg-black/40 px-3 py-0.5 rounded-lg border ${borderColor} shadow-inner">${m.score}</span>
                        ${deltaBadge}
                    </div>
                </div>
                <div class="text-sm md:text-base text-slate-200"><span class="text-slate-500 text-xs mr-2 uppercase font-bold tracking-widest">vs</span> <span class="font-bold hover:text-sky-400 cursor-pointer transition-colors" onclick="window.loadStats('${m.opponent.replace(/'/g, "\\'")}')">${m.opponent}</span></div>
                ${detailsHtml}
            </div>`;
        }).join('');
    }

    window.switchProfileTab = function(tabId) {
        document.getElementById('profile-tab-history').classList.add('hidden');
        document.getElementById('profile-tab-insights').classList.add('hidden');
        
        document.getElementById('tab-btn-history').classList.remove('text-yellow-500', 'border-yellow-500');
        document.getElementById('tab-btn-history').classList.add('text-slate-500', 'border-transparent');
        document.getElementById('tab-btn-insights').classList.remove('text-yellow-500', 'border-yellow-500');
        document.getElementById('tab-btn-insights').classList.add('text-slate-500', 'border-transparent');
        
        document.getElementById('profile-tab-' + tabId).classList.remove('hidden');
        document.getElementById('tab-btn-' + tabId).classList.add('text-yellow-500', 'border-yellow-500');
        document.getElementById('tab-btn-' + tabId).classList.remove('text-slate-500', 'border-transparent');

        if (tabId === 'insights') window.renderInsights();
    };

    window.openCompareModal = function() {
        if (!window.currentProfileName) return;
        document.getElementById('h2h-p1-name').innerText = window.currentProfileName;
        document.getElementById('h2h-p1-hidden').value = window.currentProfileName;
        
        const h2hSearch = document.getElementById('h2h-search');
        const h2hSugg = document.getElementById('h2h-suggestions');
        
        // Clone to remove any old listeners
        const newSearch = h2hSearch.cloneNode(true);
        h2hSearch.parentNode.replaceChild(newSearch, h2hSearch);
        
        newSearch.value = '';
        document.getElementById('h2h-results-area').innerHTML = '<div class="text-center py-16 text-slate-500"><div class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-4 border border-white/5"><i class="fa-solid fa-magnifying-glass text-2xl"></i></div><p class="font-bold text-sm">Search for an opponent to compare stats.</p></div>';
        
        newSearch.addEventListener('input', (e) => {
            const v = e.target.value.toLowerCase().trim();
            h2hSugg.innerHTML = '';
            if (v.length < 2) { h2hSugg.classList.add('hidden'); return; }
            
            const matches = window.allPlayersRaw.filter(p => p.toLowerCase().includes(v) && p !== window.currentProfileName).slice(0, 5);
            if (matches.length > 0) {
                h2hSugg.classList.remove('hidden');
                matches.forEach(m => {
                    let div = document.createElement('div');
                    div.className = "px-4 py-3 hover:bg-sky-900/30 cursor-pointer text-white font-bold border-b border-white/5 transition-colors";
                    div.innerText = m;
                    div.onclick = () => {
                        newSearch.value = m;
                        h2hSugg.classList.add('hidden');
                        runCompare(window.currentProfileName, m);
                    };
                    h2hSugg.appendChild(div);
                });
            } else {
                h2hSugg.classList.add('hidden');
            }
        });
        
        document.addEventListener('click', (e) => {
            if (!newSearch.contains(e.target) && !h2hSugg.contains(e.target)) {
                h2hSugg.classList.add('hidden');
            }
        });
        
        document.getElementById('compareModal').classList.remove('hidden');
        setTimeout(() => newSearch.focus(), 100);
    };
    window.closeCompareModal = () => document.getElementById('compareModal').classList.add('hidden');

    async function runCompare(p1, p2) {
        const resultsArea = document.getElementById('h2h-results-area');
        resultsArea.innerHTML = '<div class="text-center py-16 text-sky-500"><i class="fa-solid fa-spinner fa-spin text-3xl mb-3"></i><p class="font-bold text-sm">Simulating match up...</p></div>';
        
        try {
            const res = await fetch(`/api/h2h?p1=${encodeURIComponent(p1)}&p2=${encodeURIComponent(p2)}`);
            const data = await res.json();
            
            if (data.error) throw new Error(data.error);
            
            const p1Lower = p1.toLowerCase();
            const p2Lower = p2.toLowerCase();
            
            const historyHtml = data.history && data.history.length > 0 
                ? data.history.map(m => {
                    const p1IsMatchP1 = m.p1.toLowerCase() === p1Lower;
                    const ourP1Score = p1IsMatchP1 ? m.s1 : m.s2;
                    const ourP2Score = p1IsMatchP1 ? m.s2 : m.s1;
                    const isP1Win = ourP1Score > ourP2Score;
                    return `
                    <div class="bg-black/30 p-3 rounded-xl border ${isP1Win ? 'border-sky-500/20' : 'border-red-500/20'} mb-2 flex justify-between items-center">
                        <div>
                            <div class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">${m.date}</div>
                            <div class="text-white font-bold text-sm mt-0.5">${isP1Win ? `<span class="text-sky-400">${p1}</span> won` : `<span class="text-red-400">${p2}</span> won`}</div>
                        </div>
                        <div class="font-mono font-black ${isP1Win ? 'text-sky-400' : 'text-red-400'} text-lg bg-black/50 px-2 py-0.5 rounded shadow-inner border border-white/5">${ourP1Score}-${ourP2Score}</div>
                    </div>`
                }).join('')
                : '<div class="text-center py-6 text-slate-500 italic text-sm border border-white/5 bg-black/20 rounded-xl">No previous matches recorded between these two players.</div>';

            resultsArea.innerHTML = `
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div class="bg-black/40 border border-white/5 rounded-2xl p-4 text-center">
                        <div class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">${p1} Wins</div>
                        <div class="text-4xl font-black text-sky-400">${data.p1_wins}</div>
                    </div>
                    <div class="bg-black/40 border border-white/5 rounded-2xl p-4 text-center">
                        <div class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">${p2} Wins</div>
                        <div class="text-4xl font-black text-red-400">${data.p2_wins}</div>
                    </div>
                </div>
                
                <div class="bg-slate-800/80 rounded-2xl border border-white/10 p-4 mb-6">
                    <div class="text-xs text-center text-slate-400 font-bold uppercase tracking-widest mb-4">Matchup Analysis & Simulated Odds</div>
                    <div class="flex justify-between items-center mb-4">
                        <div class="text-center w-1/3">
                            <div class="text-white font-bold">${data.p1_rating} <span class="text-xs text-slate-400 font-normal">±${data.p1_rd}</span></div>
                            <div class="text-[10px] text-slate-400 mt-1 uppercase tracking-wider">Current Rating</div>
                        </div>
                        <div class="w-1/3 flex justify-center">
                            <div class="bg-slate-900 px-3 py-1 rounded-full border border-white/10 text-[10px] font-bold text-slate-300 tracking-widest">VS</div>
                        </div>
                        <div class="text-center w-1/3">
                            <div class="text-white font-bold">${data.p2_rating} <span class="text-xs text-slate-400 font-normal">±${data.p2_rd}</span></div>
                            <div class="text-[10px] text-slate-400 mt-1 uppercase tracking-wider">Current Rating</div>
                        </div>
                    </div>
                    
                    <div class="bg-black/40 rounded-xl p-3 border border-white/5">
                        <div class="flex justify-between text-xs font-bold mb-2 uppercase tracking-wide">
                            <span class="text-sky-400">${data.p1_prob}% Win Prob</span>
                            <span class="text-red-400">${data.p2_prob}% Win Prob</span>
                        </div>
                        <div class="w-full bg-slate-700 h-2 rounded-full overflow-hidden flex">
                            <div class="bg-sky-500 h-full transition-all duration-1000" style="width: ${data.p1_prob}%"></div>
                            <div class="bg-red-500 h-full transition-all duration-1000" style="width: ${data.p2_prob}%"></div>
                        </div>
                        <div class="flex justify-between mt-3">
                            <div class="bg-slate-900 px-3 py-1.5 rounded-lg border border-white/10 flex flex-col items-start">
                                <span class="text-slate-500 uppercase font-bold tracking-widest text-[8px] block mb-0.5">Simulated Odds</span>
                                <span class="text-sky-300 font-mono font-bold text-sm">$${data.p1_odds}</span>
                            </div>
                            <div class="bg-slate-900 px-3 py-1.5 rounded-lg border border-white/10 flex flex-col items-end">
                                <span class="text-slate-500 uppercase font-bold tracking-widest text-[8px] block mb-0.5">Simulated Odds</span>
                                <span class="text-red-300 font-mono font-bold text-sm">$${data.p2_odds}</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <h3 class="text-white font-black text-sm uppercase tracking-widest mb-3 flex items-center gap-2"><i class="fa-solid fa-clock-rotate-left text-slate-500"></i> Match History</h3>
                <div class="space-y-1">
                    ${historyHtml}
                </div>
            `;
        } catch(e) {
            resultsArea.innerHTML = `<div class="text-center py-16 text-red-500"><i class="fa-solid fa-circle-exclamation text-3xl mb-3"></i><p class="font-bold text-sm">Could not load comparison data.</p></div>`;
        }
    }

    window.renderInsights = function() {
        const loading = document.getElementById('insightsLoading');
        const content = document.getElementById('insightsContent');
        
        if (!window.currentProfileData) return;
        const d = window.currentProfileData;
        
        // Use insights data from the backend
        const insights = d.insights || {};
        const totalMatches = d.career_matches || 0;
        
        if (totalMatches === 0) {
            loading.classList.add('hidden');
            content.classList.remove('hidden');
            content.innerHTML = '<div class="col-span-1 text-center text-slate-500 italic py-10 bg-slate-800/30 rounded-xl">Not enough matches for insights.</div>';
            return;
        }

        loading.classList.add('hidden');
        content.classList.remove('hidden');
        
        // Remove grid classes for stacked layout
        content.className = "flex flex-col gap-6";

        function renderInsightSection(title, dataArray, descriptionTemplate) {
            dataArray = dataArray || [];
            const count = dataArray.length;
            const percentage = totalMatches > 0 ? ((count / totalMatches) * 100).toFixed(1) + '%' : '0%';
            
            // Calculate win rate for this specific subset
            let sectionWins = 0;
            dataArray.forEach(m => {
                if (m.result && m.result.includes('Win')) sectionWins++;
            });
            let winPercentage = count > 0 ? Math.round((sectionWins / count) * 100) + '%' : '0%';
            
            let desc = descriptionTemplate
                .replace('{percentage}', `<span class="font-bold text-white">${percentage}</span>`)
                .replace('{winPercentage}', `<span class="font-bold text-emerald-400">${winPercentage}</span>`);
            
            // Generate rows for the first 3 matches
            const topMatches = dataArray.slice(0, 3);
            const extraMatches = dataArray.slice(3);
            
            let renderMatchRow = (m) => {
                let resText = m.result;
                let resClass = m.result.includes('Win') ? 'text-slate-300' : 'text-slate-300';
                
                // Add delta string if present
                if (m.delta) {
                    let deltaStr = '';
                    if (m.delta > 0) deltaStr = `<span class="text-emerald-500 ml-1">(▲${Math.round(m.delta)})</span>`;
                    else if (m.delta < 0) deltaStr = `<span class="text-red-500 ml-1">(▼${Math.abs(Math.round(m.delta))})</span>`;
                    resText += ` ${deltaStr}`;
                }
                
                return `
                    <div class="flex justify-between items-center py-2 border-b border-white/5 last:border-0 text-sm">
                        <div class="font-bold text-white">${m.opponent} <span class="text-xs text-slate-500 font-normal">(${m.season})</span></div>
                        <div class="${resClass}">${resText}</div>
                    </div>
                `;
            };
            
            let topRowsHtml = topMatches.map(renderMatchRow).join('');
            let extraRowsHtml = extraMatches.map(renderMatchRow).join('');
            
            let moreMatchesHtml = '';
            if (extraMatches.length > 0) {
                const safeTitle = title.replace(/\s+/g, '-').toLowerCase();
                moreMatchesHtml = `
                    <div id="extra-${safeTitle}" class="hidden flex-col">
                        ${extraRowsHtml}
                    </div>
                    <div class="mt-2 text-xs text-orange-400 cursor-pointer flex items-center justify-between hover:text-orange-300 transition-colors" onclick="document.getElementById('extra-${safeTitle}').classList.toggle('hidden'); this.querySelector('i').classList.toggle('fa-chevron-down'); this.querySelector('i').classList.toggle('fa-chevron-up');">
                        <span>More Matches</span>
                        <i class="fa-solid fa-chevron-down"></i>
                    </div>
                `;
            }
            
            let matchesTableHtml = '';
            if (count > 0) {
                matchesTableHtml = `
                    <div class="w-full">
                        <div class="flex justify-between items-center text-emerald-500 text-sm font-semibold border-b border-emerald-500/30 pb-2 mb-2">
                            <div>Opponent</div>
                            <div>Result</div>
                        </div>
                        <div class="flex flex-col">
                            ${topRowsHtml}
                        </div>
                        ${moreMatchesHtml}
                    </div>
                `;
            }

            return `
                <div class="mb-8">
                    <div class="flex items-center justify-between mb-2">
                        <h4 class="text-orange-500 font-semibold text-2xl">${title}</h4>
                        <span class="text-white text-2xl font-medium">${count}</span>
                    </div>
                    <p class="text-sm text-slate-400 mb-4 leading-relaxed">${desc}</p>
                    ${matchesTableHtml}
                </div>
            `;
        }
        
        let wins = d.career_wins || 0;
        let losses = d.career_losses || 0;
        let winRate = totalMatches > 0 ? Math.round((wins / totalMatches) * 100) : 0;
        let rating = d.rating || 1500;
        let name = d.name || 'Player';
        let firstYear = d.first_year || "unknown";
        
        let html = `
            <div class="mb-8 text-center pt-2">

    window.loadDivisionLeaderboard = async function() {
        const season = document.getElementById('boardSeason')?.value;
        const division = document.getElementById('boardDiv')?.value;
        const list = document.getElementById('leaderboardContent');
        
        if (!list || !season || !division) return;
        
        list.innerHTML = '<div class="text-center py-20 text-sky-500"><i class="fa-solid fa-spinner fa-spin text-4xl mb-4"></i><p class="text-slate-500 animate-pulse">Loading standings...</p></div>';
        
        try {
            const res = await fetch(`/api/rankings/${encodeURIComponent(season)}/${encodeURIComponent(division)}`);
            let rankings = await res.json();
            
            rankings = rankings.filter(r => r.regular && r.regular.matches > 0);
            
            rankings.sort((a, b) => {
                const winRateA = a.regular.matches > 0 ? (a.regular.wins / a.regular.matches) : 0;
                const winRateB = b.regular.matches > 0 ? (b.regular.wins / b.regular.matches) : 0;
                if (winRateB !== winRateA) return winRateB - winRateA;
                return b.regular.wins - a.regular.wins;
            });
            
            if (rankings.length === 0) {
                list.innerHTML = '<div class="text-center text-slate-500 italic mt-8 bg-slate-800/30 p-8 rounded-xl border border-white/5 text-sm">No regular season data available.</div>';
                return;
            }
            
            list.innerHTML = rankings.map((r, index) => {
                const winRate = Math.round((r.regular.wins / r.regular.matches) * 100);
                const isTop3 = index < 3;
                
                let rankBadge = `<div class="w-8 h-8 rounded-full bg-slate-800 text-slate-400 flex items-center justify-center font-black text-sm border border-white/10 shrink-0 shadow-inner">${index + 1}</div>`;
                if(index === 0) rankBadge = `<div class="w-9 h-9 rounded-full bg-gradient-to-br from-yellow-300 to-yellow-600 text-black flex items-center justify-center font-black text-lg shrink-0 shadow-[0_0_15px_rgba(250,204,21,0.5)] border border-yellow-200"><i class="fa-solid fa-trophy"></i></div>`;
                if(index === 1) rankBadge = `<div class="w-8 h-8 rounded-full bg-gradient-to-br from-slate-300 to-slate-500 text-black flex items-center justify-center font-black text-base shrink-0 shadow-[0_0_15px_rgba(148,163,184,0.4)] border border-slate-200">2</div>`;
                if(index === 2) rankBadge = `<div class="w-8 h-8 rounded-full bg-gradient-to-br from-orange-400 to-orange-700 text-black flex items-center justify-center font-black text-base shrink-0 shadow-[0_0_15px_rgba(249,115,22,0.4)] border border-orange-300">3</div>`;
                
                return `
                <div onclick="window.loadStats('${r.name.replace(/'/g, "\\'")}')" class="bg-slate-800/80 p-3 md:p-4 rounded-xl border ${isTop3 ? 'border-sky-500/30' : 'border-white/5'} mb-2 md:mb-3 flex items-center justify-between cursor-pointer hover:bg-slate-700 transition shadow-lg group">
                    <div class="flex items-center gap-3 md:gap-4 flex-1 min-w-0">
                        ${rankBadge}
                        <div class="min-w-0 pr-3">
                            <div class="font-black text-white text-sm md:text-base group-hover:text-sky-400 transition-colors truncate">${r.name}</div>
                            <div class="text-[10px] md:text-xs text-slate-500 font-mono mt-0.5 flex items-center gap-2">
                                <span>R: ${r.rating_val} <span class="text-slate-600">±${r.sigma}</span></span>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4 md:gap-6 shrink-0">
                        <div class="text-center hidden sm:block">
                            <div class="text-white font-black text-sm">${r.regular.wins}-${r.regular.losses}</div>
                            <div class="text-[9px] uppercase tracking-widest text-slate-500 font-bold">W-L</div>
                        </div>
                        <div class="text-right w-16">
                            <div class="text-lg md:text-xl font-black ${winRate >= 50 ? 'text-green-400' : 'text-red-400'} font-mono">${winRate}%</div>
                        </div>
                        <i class="fa-solid fa-chevron-right text-slate-600 text-xs hidden md:block"></i>
                    </div>
                </div>`;
            }).join('');
        } catch(e) {
            list.innerHTML = '<div class="text-center py-10 text-red-500 text-sm border border-red-500/20 bg-red-900/10 rounded-xl">Error loading standings.</div>';
        }
    };

    window.loadResults = async function() {

        const list = document.getElementById('resultsContainer');
        
        if (!list || !season) return;
        
        list.innerHTML = '<div class="col-span-1 md:col-span-2 text-center py-20 text-sky-500"><i class="fa-solid fa-spinner fa-spin text-4xl mb-4"></i><p class="text-slate-500 animate-pulse">Loading match data...</p></div>';
        
        try {
            const res = await fetch(`/api/week/${encodeURIComponent(season)}/${encodeURIComponent(week)}`);
            const matches = await res.json();
            
            if (matches.length === 0) {
                list.innerHTML = `<div class="col-span-1 md:col-span-2 text-center text-slate-500 italic mt-8 bg-slate-800/30 p-8 rounded-xl border border-white/5 text-sm">No matches found for Week ${week}.</div>`;

            }
            
            let html = '';
            matches.forEach(m => {
                let s1 = 0, s2 = 0;
                if (m.score && m.score.includes('-')) {
                    const parts = m.score.split('-');
                    s1 = parseInt(parts[0]) || 0;
                    s2 = parseInt(parts[1]) || 0;
                }
                
                const p1Won = s1 > s2;
                const p2Won = s2 > s1;
                
                const p1FillBadge = m.p1_fill ? `<span class="text-[8px] bg-yellow-500/20 text-yellow-500 border border-yellow-500/30 px-1.5 py-0.5 rounded ml-2 uppercase font-black tracking-widest align-middle shadow-inner">Fill-in</span>` : '';

                html += `
                <div class="bg-slate-800 p-4 rounded-xl border border-white/5 mb-3 shadow-lg hover:border-white/10 transition-colors">
                    <div class="flex justify-between items-center mb-3 border-b border-white/5 pb-2">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-sky-400 bg-sky-900/20 px-2 py-0.5 rounded border border-sky-500/20">${m.division || 'Unknown Div'}</span>
                        <span class="text-[10px] font-mono text-slate-500">${m.date || 'No Date'}</span>

                        <div class="text-right cursor-pointer group" onclick="window.loadStats('${m.p1.replace(/'/g, "\\'")}')">
                            <div class="text-sm md:text-base font-black ${p1Won ? 'text-white' : 'text-slate-400'} group-hover:text-sky-400 transition-colors">${m.p1}${p1FillBadge}</div>
                        </div>
                        
                        <div class="flex items-center justify-center bg-black/40 px-3 py-1.5 rounded-lg border border-white/5">
                            <span class="font-mono font-black text-lg ${p1Won ? 'text-green-400' : 'text-white'}">${s1}</span>
                            <span class="text-slate-600 mx-2">-</span>
                            <span class="font-mono font-black text-lg ${p2Won ? 'text-green-400' : 'text-white'}">${s2}</span>
                        </div>
                        
                        <div class="text-left cursor-pointer group" onclick="window.loadStats('${m.p2.replace(/'/g, "\\'")}')">
                            <div class="text-sm md:text-base font-black ${p2Won ? 'text-white' : 'text-slate-400'} group-hover:text-sky-400 transition-colors">${p2FillBadge}${m.p2}</div>
                        </div>
                    </div>
                </div>`;
            });
            list.innerHTML = html;
        } catch(e) {
            list.innerHTML = '<div class="col-span-1 md:col-span-2 text-center py-10 text-red-500 text-sm border border-red-500/20 bg-red-900/10 rounded-xl">Error loading match results.</div>';
        }

    window.openDonateModal = function() {

    window.setDonationAmount = function(amt) {
        const input = document.getElementById('custom-donate-amount');

    };

    window.proceedToPayment = async function() {
        const amt = document.getElementById('custom-donate-amount').value;
        if (!amt || amt < 5) {
            alert("Minimum donation is $5. Thank you for your support!");
            return;
        }

        const btn = document.getElementById('proceed-pay-btn');
        const origText = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
        btn.disabled = true;

        try {
            const res = await fetch('/api/create-payment-intent', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount: amt })
            });
            const data = await res.json();

            if (data.clientSecret) {
                document.getElementById('donate-step-1').classList.add('hidden');
                document.getElementById('donate-step-2').classList.remove('hidden');

                if (typeof Stripe !== 'undefined') {
                    if (!stripeInstance) {
                        const configRes = await fetch('/api/stripe-config');
                        const configData = await configRes.json();
                        stripeInstance = Stripe(configData.publicKey);
                    }
                    stripeElements = stripeInstance.elements({ 
                        clientSecret: data.clientSecret, 
                        appearance: { theme: 'night' } 
                    });
                    const paymentElement = stripeElements.create('payment');
                    paymentElement.mount('#payment-element');
                } else {
                    alert("Stripe library failed to load. Please refresh the page.");
                }
            } else {
                alert("Error setting up payment: " + (data.error || 'Unknown Error'));
            }
        } catch (e) {
            alert("Network Error while connecting to Stripe.");
        } finally {
            btn.innerHTML = origText;
            btn.disabled = false;
        }
    };

    window.submitStripePayment = async function() {
        if (!stripeInstance || !stripeElements) return;
        
        const btn = document.getElementById('final-pay-btn');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
        btn.disabled = true;

        const donorName = document.getElementById('donate-name').value || 'Anonymous';
        const donationAmount = document.getElementById('custom-donate-amount').value;

        const { error, paymentIntent } = await stripeInstance.confirmPayment({
            elements: stripeElements,
            confirmParams: {
                return_url: window.location.href, 
            },
            redirect: 'if_required' 
        });

        if (error) {
            const msg = document.getElementById('payment-message');
            msg.innerText = error.message;
            msg.classList.remove('hidden');
            btn.innerHTML = '<i class="fa-solid fa-lock"></i> Pay Securely Now';
            btn.disabled = false;
        } else if (paymentIntent && paymentIntent.status === 'succeeded') {
            await fetch('/api/record_donation', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    intent_id: paymentIntent.id, 
                    name: donorName, 
                    amount: donationAmount 
                })
            });
            
            document.getElementById('donate-step-2').innerHTML = `
                <div class="text-center py-10">
                    <div class="text-emerald-500 text-5xl mb-4"><i class="fa-solid fa-circle-check"></i></div>
                    <h3 class="text-2xl font-black text-white mb-2">Thank You!</h3>

                </div>
            `;
        }
    };

    window.runSandboxSimulation = async function() {
        const p1 = document.getElementById('sim-p1').value;
        const p2 = document.getElementById('sim-p2-search').value;
        const s1 = document.getElementById('sim-s1').value;
        const s2 = document.getElementById('sim-s2').value;
        const kw = document.getElementById('sim-k-win').value;
        const kl = document.getElementById('sim-k-loss').value;

        if (!p1 || !p2) return alert("Select two valid players.");
        
        const btn = document.getElementById('sim-run-btn');
        const origText = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Calculating...';
        btn.disabled = true;

        try {
            const res = await fetch('/api/simulate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ p1: p1, p2: p2, s1: s1, s2: s2, k_win: kw, k_loss: kl })
            });
            const data = await res.json();
            
            const resultsBox = document.getElementById('sim-results');
            resultsBox.classList.remove('hidden');

            if (!data.success) {
                resultsBox.innerHTML = `<div class="text-red-500 text-center font-bold">${data.error}</div>`;
                return;
            }

            const r = data.data;
            const p1Col = r.p1.delta > 0 ? 'text-emerald-400' : 'text-red-400';
            const p1Sign = r.p1.delta > 0 ? '+' : '';
            const p2Col = r.p2.delta > 0 ? 'text-emerald-400' : 'text-red-400';
            const p2Sign = r.p2.delta > 0 ? '+' : '';

            resultsBox.innerHTML = `
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-black/30 p-4 rounded-xl border border-white/5 text-center">
                        <div class="text-xs text-slate-400 font-bold mb-1 truncate">${r.p1.name}</div>
                        <div class="text-3xl font-black text-white font-mono">${Math.round(r.p1.new_rating)}</div>
                        <div class="${p1Col} font-black text-sm mt-1">${p1Sign}${r.p1.delta.toFixed(1)} pts</div>
                        <div class="text-[9px] text-slate-500 mt-2">SD: ±${r.p1.new_rd.toFixed(1)}</div>
                    </div>
                    <div class="bg-black/30 p-4 rounded-xl border border-white/5 text-center">
                        <div class="text-xs text-slate-400 font-bold mb-1 truncate">${r.p2.name}</div>
                        <div class="text-3xl font-black text-white font-mono">${Math.round(r.p2.new_rating)}</div>
                        <div class="${p2Col} font-black text-sm mt-1">${p2Sign}${r.p2.delta.toFixed(1)} pts</div>
                        <div class="text-[9px] text-slate-500 mt-2">SD: ±${r.p2.new_rd.toFixed(1)}</div>
                    </div>
                </div>
            `;

        } catch (e) {
            alert("Error running simulation.");
        } finally {
            btn.innerHTML = origText;
            btn.disabled = false;
        }
    };
</script>
