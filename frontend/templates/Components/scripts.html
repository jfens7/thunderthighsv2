<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDq05wFsKLHtt8G0Z5yLOG9pIk9UX24S4o", 
        authDomain: "gctta-stats-live.firebaseapp.com", 
        projectId: "gctta-stats-live", 
        storageBucket: "gctta-stats-live.firebasestorage.app", 
        messagingSenderId: "1070856258556", 
        appId: "1:1070856258556:web:be438e04c1941abc3c6879" 
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const today = new Date();
    const dateString = String(today.getDate()).padStart(2, '0') + '/' + String(today.getMonth() + 1).padStart(2, '0') + '/' + today.getFullYear();
    
    window.liveMatchesRaw = [];
    let knownLiveMatches = new Set();
    
    let statsIndex = 0;
    setInterval(() => { statsIndex++; renderLiveMatches(); }, 10000); 

    const q = query(collection(db, "fixture_schedule"), where("date", "==", dateString));

    try {
        onSnapshot(q, (snapshot) => {
            window.liveMatchesRaw = [];
            snapshot.forEach(doc => {
                let m = doc.data(); m.id = doc.id;
                if (m.match_status !== "Finished") window.liveMatchesRaw.push(m);
            });
            renderLiveMatches();
        }, (error) => {
            console.error("Firebase Live Error:", error);
            const container = document.getElementById("liveMatchesContainer");
            if(container) container.innerHTML = "<div class='text-center text-slate-500 py-10'>Live matches disconnected. Check Firebase Rules.</div>";
        });
    } catch(e) {
        console.error("Firebase Listener Failed:", e);
    }

    function renderLiveMatches() {
        const navLive = document.getElementById("nav-live-center");
        const navMobileLive = document.getElementById("b-nav-live-center");
        const matchesContainer = document.getElementById("liveMatchesContainer");
        const scheduledContainer = document.getElementById("scheduledContainer");
        const scheduledList = document.getElementById("scheduledList");
        
        if(!matchesContainer) return;

        let liveHTML = ""; let scheduledHTML = ""; let hasLive = false; let hasScheduled = false;

        window.liveMatchesRaw.forEach(m => {
            let homeDisplay = (m.home_players && m.home_players.length > 0) ? m.home_players.join(" / ") : m.home_team;
            let awayDisplay = (m.away_players && m.away_players.length > 0) ? m.away_players.join(" / ") : m.away_team;
            
            const isLive = m.match_status === "Live" || m.match_status === "Paused";

            if (isLive) {
                hasLive = true;
                if (!knownLiveMatches.has(m.id)) { knownLiveMatches.add(m.id); showNotification(homeDisplay, awayDisplay); }

                let timerBadge = "";
                if (m.match_status === "Paused") {
                    timerBadge = `<div class="absolute top-0 left-1/2 -translate-x-1/2 bg-red-600 text-white font-black uppercase text-xs px-4 py-1 rounded-b-lg shadow-lg z-20 flex items-center gap-2 animate-pulse"><i class="fa-solid fa-pause"></i> MATCH PAUSED</div>`;
                }

                let statsContent = `<span class="text-slate-500 italic text-sm">Collecting match data...</span>`;
                if (m.momentum || (m.serve_stats && m.serve_stats.home)) {
                    let momText = m.momentum ? `<div class="text-yellow-400 font-bold text-[10px] md:text-xs uppercase tracking-widest bg-black/30 px-3 py-1 rounded-full border border-yellow-500/20"><i class="fa-solid fa-fire mr-1"></i> ${m.momentum}</div>` : "";
                    
                    let sStats = m.serve_stats || {home:{won:0,total:0}, away:{won:0,total:0}};
                    let hPct = sStats.home.total > 0 ? Math.round((sStats.home.won / sStats.home.total)*100) : 0;
                    let aPct = sStats.away.total > 0 ? Math.round((sStats.away.won / sStats.away.total)*100) : 0;
                    
                    statsContent = `
                    <div class="flex items-center justify-between w-full px-2 md:px-4">
                        <div class="text-[10px] md:text-xs font-bold text-slate-400"><i class="fa-solid fa-chart-pie text-slate-500 mr-1 hidden md:inline"></i> Serve Win: <span class="text-white">${hPct}%</span></div>
                        ${momText}
                        <div class="text-[10px] md:text-xs font-bold text-slate-400"><span class="text-white">${aPct}%</span> :Serve Win <i class="fa-solid fa-chart-pie text-slate-500 ml-1 hidden md:inline"></i></div>
                    </div>`;
                }
                
                let homeServerName = ""; let awayServerName = "";
                if (m.current_server) {
                    if ((m.home_players || []).includes(m.current_server) || m.home_team === m.current_server) homeServerName = m.current_server;
                    else if ((m.away_players || []).includes(m.current_server) || m.away_team === m.current_server) awayServerName = m.current_server;
                }

                let historyHTML = "";
                if (m.game_scores_history) {
                    let scores = m.game_scores_history.split(',').filter(s => s.trim().length > 0);
                    let rows = "";
                    scores.forEach((s) => { 
                        let parts = s.split('-'); let h = parts[0] || 0; let a = parts[1] || 0;
                        let hClass = parseInt(h) > parseInt(a) ? "text-white font-bold" : "text-slate-500";
                        let aClass = parseInt(a) > parseInt(h) ? "text-white font-bold" : "text-slate-500";
                        rows += `<div class="flex justify-between items-center w-full border-b border-white/5 last:border-0 py-1 text-sm font-mono"><span class="${hClass}">${h}</span><span class="text-slate-700 text-xs">-</span><span class="${aClass}">${a}</span></div>`; 
                    });
                    historyHTML = `<div class="bg-slate-800/50 rounded-lg p-2 mt-2 w-full max-w-[120px] shadow-inner border border-white/5"><div class="flex justify-between text-[10px] text-slate-500 font-bold mb-1 border-b border-white/10 pb-1"><span>H</span><span>A</span></div><div class="flex flex-col gap-0.5">${rows}</div></div>`;
                } else {
                    historyHTML = `<div class="text-slate-600 text-[10px] italic mt-2">Set 1</div>`;
                }

                liveHTML += `
                <div class="relative bg-slate-800/90 backdrop-blur-md border border-white/10 rounded-2xl p-6 mb-6 shadow-2xl mx-auto max-w-4xl overflow-hidden mt-6">
                    ${timerBadge}
                    <div class="flex justify-between items-center mb-6 border-b border-white/5 pb-2 mt-2">
                        <div class="text-xs font-black text-slate-500 uppercase tracking-[0.2em]">TABLE ${m.table}</div>
                        <div class="text-xs font-bold text-yellow-500 uppercase tracking-widest">${m.division}</div>
                    </div>
                    
                    <div class="flex justify-between items-end mb-4 px-1">
                        <div class="text-left w-2/5 relative">
                            <div class="text-lg md:text-2xl font-black text-white leading-tight break-words">${homeDisplay}</div>
                            ${homeServerName ? `<div class="text-yellow-400 text-[10px] font-bold uppercase tracking-widest mt-1 animate-pulse"><i class="fa-solid fa-table-tennis-paddle-ball"></i> SERVING: ${homeServerName}</div>` : ''}
                        </div>
                        <div class="text-center w-1/5 text-xs text-slate-600 font-bold uppercase pb-1">VS</div>
                        <div class="text-right w-2/5 relative">
                            <div class="text-lg md:text-2xl font-black text-white leading-tight break-words">${awayDisplay}</div>
                            ${awayServerName ? `<div class="text-yellow-400 text-[10px] font-bold uppercase tracking-widest mt-1 animate-pulse text-right">SERVING: ${awayServerName} <i class="fa-solid fa-table-tennis-paddle-ball"></i></div>` : ''}
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-center gap-4 md:gap-8 bg-black/20 rounded-2xl p-4 border border-white/5 mb-4">
                        <div class="text-6xl md:text-8xl font-black text-white font-mono tracking-tighter drop-shadow-2xl min-w-[60px] text-center">${m.live_home_score || 0}</div>
                        <div class="flex flex-col items-center justify-center px-4 min-w-[120px]">
                            <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">SETS</div>
                            <div class="text-3xl md:text-4xl font-black text-yellow-500 font-mono whitespace-nowrap mb-1">${m.live_home_sets || 0}-${m.live_away_sets || 0}</div>
                            ${historyHTML}
                        </div>
                        <div class="text-6xl md:text-8xl font-black text-white font-mono tracking-tighter drop-shadow-2xl min-w-[60px] text-center">${m.live_away_score || 0}</div>
                    </div>
                    
                    <div class="h-14 flex items-center justify-center border-t border-white/5 pt-2">${statsContent}</div>
                </div>`;
            } else {
                hasScheduled = true;
                scheduledHTML += `<div class="bg-slate-800/40 p-4 rounded-xl border border-white/5 flex justify-between items-center mb-3 hover:bg-slate-800/60 transition-colors"><div class="flex flex-col gap-1"><div class="flex items-center gap-2"><span class="text-xs font-bold bg-slate-700 text-slate-300 px-2 py-0.5 rounded">T${m.table}</span><span class="text-xs text-slate-500 font-bold uppercase tracking-wider">${m.division}</span></div><div class="text-lg font-bold text-white">${homeDisplay} <span class="text-slate-500 text-sm mx-1">vs</span> ${awayDisplay}</div></div><div class="text-xs font-bold text-slate-400 bg-black/30 px-3 py-1.5 rounded-full border border-white/5">UPCOMING</div></div>`;
            }
        });

        if (hasLive) { 
            if(navLive) navLive.style.display = "block"; 
            if(navMobileLive) navMobileLive.style.display = "flex"; 
            if(matchesContainer) matchesContainer.innerHTML = liveHTML; 
            if(scheduledContainer) scheduledContainer.style.display = "none"; 
        } 
        else { 
            if(navLive) navLive.style.display = "none"; 
            if(navMobileLive) navMobileLive.style.display = "none"; 
            if(matchesContainer) matchesContainer.innerHTML = "<div class='text-center text-slate-500 py-20 text-lg'>No matches live right now.</div>"; 
            if(hasScheduled) { 
                if(scheduledContainer) scheduledContainer.style.display = "block"; 
                if(scheduledList) scheduledList.innerHTML = scheduledHTML; 
            } else {
                if(scheduledContainer) scheduledContainer.style.display = "none"; 
            }
        }
    }

    function showNotification(p1, p2) { const banner = document.getElementById("matchNotification"); const text = document.getElementById("notifText"); if(banner && text) { text.innerHTML = `<span class="text-white font-bold">${p1}</span> vs <span class="text-white font-bold">${p2}</span>`; banner.style.top = "0"; setTimeout(() => { banner.style.top = "-100px"; }, 6000); } }
</script>

<script>
    window.addEventListener('popstate', function(event) {
        const reportModal = document.getElementById('reportModal');
        const donateModal = document.getElementById('donateModal');
        const feedbackModal = document.getElementById('feedbackModal');
        const compareModal = document.getElementById('compareModal');
        const matchDetailsModal = document.getElementById('matchDetailsModal');

        if (reportModal && !reportModal.classList.contains('hidden')) { closeReportModal(); return; }
        if (donateModal && !donateModal.classList.contains('hidden')) { closeDonateModal(); return; }
        if (feedbackModal && !feedbackModal.classList.contains('hidden')) { document.getElementById('feedbackModal').classList.add('hidden'); return; }
        if (compareModal && !compareModal.classList.contains('hidden')) { closeCompareModal(); return; }
        if (matchDetailsModal && !matchDetailsModal.classList.contains('hidden')) { closeMatchDetails(); return; }
        
        if (event.state && event.state.tab) { switchTab(event.state.tab, false); }
    });

    const stripe = Stripe('pk_live_51Rhn5VG4Ru5FkAsRleeExo35C9xNnvZbComyNHWRzTGZltHbNLLpbCuylszKl5ZCvpQOR3SHfSsQrwJUKbm6BnjS00y4HINZj8');
    let elements;

    window.openDonateModal = function() {
        history.pushState({ modal: 'donate' }, "", "#donate");
        document.getElementById('donateModal').classList.remove('hidden');
        resetDonateModal();
    }
    window.closeDonateModal = function() { document.getElementById('donateModal').classList.add('hidden'); }
    
    window.setDonationAmount = function(amt) {
        document.getElementById('custom-donate-amount').value = amt;
        document.querySelectorAll('.donate-amt-btn').forEach(btn => {
            if(btn.innerText === `$${amt}`) btn.classList.add('border-yellow-500', 'bg-yellow-500/20');
            else btn.classList.remove('border-yellow-500', 'bg-yellow-500/20');
        });
    }
    window.clearDonateButtons = function() { document.querySelectorAll('.donate-amt-btn').forEach(btn => btn.classList.remove('border-yellow-500', 'bg-yellow-500/20')); }
    
    window.resetDonateModal = function() {
        document.getElementById('donate-step-1').classList.remove('hidden'); document.getElementById('donate-step-2').classList.add('hidden');
        document.getElementById('payment-message').classList.add('hidden'); document.getElementById('custom-donate-amount').value = ''; 
        document.getElementById('donate-name').value = '';
        clearDonateButtons();
    }

    window.proceedToPayment = async function() {
        const amt = document.getElementById('custom-donate-amount').value;
        const donorName = document.getElementById('donate-name').value || "Anonymous";
        
        if(!amt || amt < 5) return alert("Please enter a valid amount (Minimum $5).");
        
        localStorage.setItem('pending_donation_name', donorName);
        localStorage.setItem('pending_donation_amount', amt);

        const btn = document.getElementById('proceed-pay-btn'); btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Loading...'; btn.disabled = true;
        try {
            const response = await fetch('/api/create-payment-intent', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ amount: amt }) });
            const { clientSecret, error } = await response.json();
            if (error) throw new Error(error);
            const appearance = { theme: 'night', variables: { colorPrimary: '#eab308' } };
            elements = stripe.elements({ appearance, clientSecret });
            const paymentElement = elements.create('payment'); paymentElement.mount('#payment-element');
            document.getElementById('donate-step-1').classList.add('hidden'); document.getElementById('donate-step-2').classList.remove('hidden');
        } catch (e) { alert("Payment error. Please try again."); } finally { btn.innerHTML = 'Continue to Checkout <i class="fa-solid fa-arrow-right"></i>'; btn.disabled = false; }
    }

    window.submitStripePayment = async function() {
        const btn = document.getElementById('final-pay-btn'); btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...'; btn.disabled = true;
        const { error } = await stripe.confirmPayment({ elements, confirmParams: { return_url: window.location.href } });
        if (error) { const msg = document.getElementById('payment-message'); msg.classList.remove('hidden'); msg.innerText = error.message; msg.classList.add('text-red-500'); btn.innerHTML = '<i class="fa-solid fa-lock"></i> Pay Now'; btn.disabled = false; }
    }

    window.checkTournamentStatus = async function() {
        try {
            const res = await fetch('/api/config');
            const config = await res.json();
            if(config.tournament_mode_active) {
                alert("Routing to Stripe..."); 
            } else {
                document.getElementById('coming-soon-modal').classList.remove('hidden');
            }
        } catch(e) { console.error("Error fetching config."); }
    }
    
    window.enterFixturesMode = function() {
        const overlay = document.getElementById('landing-overlay');
        overlay.style.opacity = '0';
        history.pushState({ page: 'fixtures', tab: 'home' }, "", "#fixtures");
        setTimeout(() => {
            overlay.classList.add('hidden');
            document.body.style.overflow = 'auto'; 
        }, 500);
    }

    window.switchTab = function(tabId, pushHistory = true) {
        if(pushHistory) { history.pushState({ page: 'fixtures', tab: tabId }, "", "#" + tabId); }
        
        ['home', 'week', 'sheets', 'global', 'live-center', 'rules'].forEach(t => { 
            const el = document.getElementById(`tab-${t}`); 
            if(el) el.classList.add('hidden'); 
            const nav = document.getElementById(`nav-${t}`); 
            if(nav) nav.classList.remove('active'); 
            const bnav = document.getElementById(`b-nav-${t}`); 
            if(bnav) bnav.classList.remove('active'); 
        }); 
        
        const stats = document.getElementById('statsContainer'); 
        if(stats) stats.classList.add('hidden'); 
        
        if (tabId === 'statsContainer') { 
            if(stats) { stats.classList.remove('hidden'); stats.classList.add('animate-fade-in'); }
        } else { 
            const target = document.getElementById(`tab-${tabId}`); 
            if(target) { target.classList.remove('hidden'); target.classList.add('animate-fade-in'); } 
            const targetNav = document.getElementById(`nav-${tabId}`); 
            if(targetNav) targetNav.classList.add('active'); 
            const targetBNav = document.getElementById(`b-nav-${tabId}`); 
            if(targetBNav) targetBNav.classList.add('active'); 
        } 
        window.scrollTo({ top: 0, behavior: 'smooth' }); 
    };

    window.allPlayersRaw = []; let currentSeason = "Career", currentDivision = "All";
    
    function generateStars() { const container = document.getElementById('starContainer'); if(!container) return; container.innerHTML = ''; const starCount = 60; for (let i = 0; i < starCount; i++) { const star = document.createElement('div'); const sizeClass = Math.random() < 0.6 ? 's-small' : (Math.random() < 0.9 ? 's-medium' : 's-large'); star.className = `star ${sizeClass}`; star.style.top = `${Math.random() * 100}%`; star.style.left = `${Math.random() * 100}%`; star.style.setProperty('--duration', `${2 + Math.random() * 3}s`); star.style.setProperty('--delay', `${Math.random() * 2}s`); container.appendChild(star); } }
    
    const loadTopDonors = async () => {
        try {
            const res = await fetch('/api/top_donors');
            const data = await res.json();
            const container = document.getElementById('top-donor-display');
            
            if (!container || !data || data.length === 0) return;

            const top = data[0];
            let actionBtn = "";
            
            if (window.allPlayersRaw && window.allPlayersRaw.includes(top.name)) {
                actionBtn = `<button onclick="loadStats('${top.name}')" class="ml-auto bg-black/30 hover:bg-black/50 border border-white/10 text-white text-[10px] font-bold px-3 py-1.5 rounded-lg transition"><i class="fa-solid fa-user text-yellow-500 mr-1"></i> View Profile</button>`;
            } else {
                actionBtn = `<div class="ml-auto bg-yellow-900/30 border border-yellow-500/30 text-yellow-500 text-[9px] font-bold px-3 py-1.5 rounded-lg uppercase tracking-widest flex items-center gap-1"><i class="fa-solid fa-medal"></i> Supporter</div>`;
            }

            let html = `
            <div class="bg-gradient-to-r from-yellow-600/20 to-yellow-900/20 border border-yellow-500/30 p-4 rounded-xl flex flex-col mb-4 shadow-lg animate-fade-in w-full">
                <div class="flex items-center gap-4 w-full">
                    <div class="bg-yellow-500 text-black w-12 h-12 flex flex-shrink-0 items-center justify-center rounded-full text-xl shadow-[0_0_15px_rgba(234,179,8,0.5)]">
                        <i class="fa-solid fa-crown"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-[9px] font-bold text-yellow-500 uppercase tracking-widest whitespace-nowrap">#1 Monthly Supporter</div>
                        <div class="text-white font-black text-lg md:text-xl truncate">${top.name}</div>
                        <div class="text-yellow-400 text-sm font-mono font-bold mt-0.5">$${top.amount.toFixed(2)}</div>
                    </div>
                    ${actionBtn}
                </div>
            `;

            if (data.length > 1) {
                html += `<div class="mt-4 pt-3 border-t border-yellow-500/20 grid grid-cols-2 md:grid-cols-4 gap-2">`;
                for(let i=1; i<data.length; i++) {
                    let runner = data[i];
                    html += `
                    <div class="bg-black/30 border border-white/5 rounded-lg p-2 flex items-center justify-between">
                        <div class="truncate text-xs font-bold text-slate-300 w-full pr-2"><span class="text-slate-500 mr-1 text-[10px]">#${i+1}</span>${runner.name}</div>
                        <div class="text-xs font-mono text-yellow-500/80 font-bold">$${runner.amount.toFixed(2)}</div>
                    </div>
                    `;
                }
                html += `</div>`;
            }

            html += `</div>`;
            container.innerHTML = html;
        } catch(e) { console.error("Honor board error:", e); }
    };

    window.onload = async () => {
        generateStars(); 
        
        const clientSecret = new URLSearchParams(window.location.search).get('payment_intent_client_secret');
        const paymentIntent = new URLSearchParams(window.location.search).get('payment_intent');
        
        if (clientSecret && paymentIntent) {
            const dName = localStorage.getItem('pending_donation_name') || 'Anonymous';
            const dAmt = localStorage.getItem('pending_donation_amount') || 0;
            
            fetch('/api/record_donation', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({intent_id: paymentIntent, name: dName, amount: dAmt})
            }).then(() => {
                localStorage.removeItem('pending_donation_name');
                localStorage.removeItem('pending_donation_amount');
                alert(`Thank you ${dName} for your support! Payment successful. You are on the Honor Board!`);
                window.history.replaceState({}, document.title, window.location.pathname);
                enterFixturesMode();
            });
        }

        // --- UPDATED: SMARTER, BULLETPROOF LOAD CONDITION ---
        const loadInitialData = async () => {
            try {
                const pRes = await fetch('/api/players'); window.allPlayersRaw = await pRes.json(); setupMainSearch(); 
                const [sRes, dRes] = await Promise.all([fetch('/api/seasons'), fetch('/api/divisions')]);
                const seasons = await sRes.json(); const divisions = await dRes.json();
                
                // FIXED: It will only wait if there are 2 or fewer seasons (meaning it is still booting). 
                // Once it hits 3+ seasons (like your 8 seasons), it instantly loads.
                if (seasons.length <= 2) {
                    console.log(`Server syncing... Found ${seasons.length} seasons so far. Retrying in 2 seconds...`);
                    setTimeout(loadInitialData, 2000);
                    return;
                }

                const latestSeason = seasons.includes("Summer 2026") ? "Summer 2026" : (seasons[1] || "Career");
                currentSeason = latestSeason;

                const sSelect = document.getElementById('seasonSelect'); if (sSelect) { sSelect.innerHTML = ''; seasons.forEach(s => { let opt = document.createElement('option'); opt.value = s; opt.innerText = s; sSelect.appendChild(opt); }); sSelect.value = latestSeason; }
                const pDivSelect = document.getElementById('profileDivisionSelect'); if (pDivSelect) { pDivSelect.innerHTML = '<option value="All">All Divisions</option>'; divisions.forEach(d => { let opt = document.createElement('option'); opt.value = d; opt.innerText = d; pDivSelect.appendChild(opt); }); }
                
                const refreshProfile = () => { const pName = document.getElementById('playerName').innerText; if(pName && pName !== "Loading...") loadStats(pName); };
                document.getElementById('seasonSelect')?.addEventListener('change', refreshProfile); document.getElementById('profileDivisionSelect')?.addEventListener('change', refreshProfile);
                
                const boardDivSelect = document.getElementById('boardDiv'); const boardSeasonSelect = document.getElementById('boardSeason');
                if(boardDivSelect) { boardDivSelect.innerHTML = ''; divisions.forEach(d => { let opt = document.createElement('option'); opt.value = d; opt.innerText = d; boardDivSelect.appendChild(opt); }); }
                if(boardSeasonSelect) { boardSeasonSelect.innerHTML = ''; seasons.forEach(s => { let opt = document.createElement('option'); opt.value = s; opt.innerText = s; boardSeasonSelect.appendChild(opt); }); boardSeasonSelect.value = latestSeason; }
                
                const resultSeasonSelect = document.getElementById('resultsSeason'); if(resultSeasonSelect) { resultSeasonSelect.innerHTML = ''; seasons.forEach(s => { let opt = document.createElement('option'); opt.value = s; opt.innerText = s; resultSeasonSelect.appendChild(opt); }); resultSeasonSelect.value = latestSeason; }
                
                loadDivisionLeaderboard(); loadResults();
                loadTopDonors(); 
            } catch(e) { console.error("Init Error", e); }
        };

        loadInitialData(); 
    };

    function setupMainSearch() {
        const input = document.getElementById('playerSearch'); const list = document.getElementById('suggestions-list'); if (!input || !list) return;
        input.addEventListener('input', () => {
            const val = input.value.toLowerCase().trim(); list.innerHTML = ''; if (val.length < 2) { list.classList.add('hidden'); return; }
            if (!window.allPlayersRaw) return;
            const filtered = window.allPlayersRaw.filter(p => p.toLowerCase().includes(val)).slice(0, 8);
            list.classList.remove('hidden');
            if (filtered.length > 0) { filtered.forEach(player => { const div = document.createElement('div'); div.className = 'p-3 hover:bg-slate-700 cursor-pointer text-white border-b border-white/5 transition-colors flex justify-between items-center bg-slate-800'; div.innerHTML = `<span class="font-bold">${player}</span><i class="fa-solid fa-chevron-right text-xs text-slate-500"></i>`; div.onclick = () => { input.value = player; list.classList.add('hidden'); loadStats(player); }; list.appendChild(div); }); } else { list.innerHTML = `<div class="p-4 text-slate-500 text-center text-sm bg-slate-800">No player found</div>`; }
        });
        document.addEventListener('click', (e) => { if (!input.contains(e.target) && !list.contains(e.target)) list.classList.add('hidden'); });
    }

    window.currentLoadedMatches = [];
    window.currentPlayerName = "";

    window.renderHistory = function(matches, playerName, showAll = false) { 
        window.currentLoadedMatches = matches;
        window.currentPlayerName = playerName;
        
        const historyDiv = document.getElementById('matchHistory'); 
        historyDiv.innerHTML = ""; 
        
        if (window.liveMatchesRaw && window.liveMatchesRaw.length > 0) { 
            window.liveMatchesRaw.forEach(m => { 
                const isActuallyLive = m.match_status === "Live" || m.match_status === "Paused";
                if (!isActuallyLive) return;

                let isPlaying = false; let opponentName = "Unknown"; 
                if (m.home_players && m.home_players.includes(playerName)) { isPlaying = true; opponentName = m.away_players ? m.away_players.join("/") : m.away_team; } 
                else if (m.away_players && m.away_players.includes(playerName)) { isPlaying = true; opponentName = m.home_players ? m.home_players.join("/") : m.home_team; } 
                
                if (isPlaying) { 
                    const liveRow = document.createElement('div'); 
                    liveRow.className = "bg-red-500/10 border-l-4 border-red-500 p-4 mb-4 rounded-r-lg animate-pulse"; 
                    liveRow.innerHTML = `<div class="flex justify-between items-center"><div><div class="text-[10px] font-black text-red-400 uppercase tracking-widest mb-1">LIVE NOW • TABLE ${m.table}</div><div class="text-white font-bold text-lg">vs ${opponentName}</div></div><div class="text-right"><div class="text-2xl font-mono font-black text-white">${m.live_home_score}-${m.live_away_score}</div><div class="text-xs text-red-400 font-bold">SETS: ${m.live_home_sets}-${m.live_away_sets}</div></div></div>`; 
                    historyDiv.appendChild(liveRow); 
                } 
            }); 
        } 
        
        if (!matches || matches.length === 0) { 
            if (historyDiv.innerHTML === "") historyDiv.innerHTML = '<div class="p-6 text-center text-slate-500">No matches found.</div>'; 
            return; 
        } 
        
        const limit = showAll ? matches.length : 5;
        const matchesToShow = matches.slice(0, limit);

        matchesToShow.forEach(match => { 
            const row = document.createElement('div'); 
            const hasRichStats = match.rich_stats && match.rich_stats.total_duration; 
            const hoverClass = hasRichStats ? "hover:border-blue-500 cursor-pointer" : "hover:bg-white/10 cursor-pointer"; 
            const richBadge = hasRichStats ? `<span class="bg-blue-600/30 text-blue-400 text-[8px] px-1.5 py-0.5 rounded ml-2 uppercase font-bold">Deep Dive</span>` : ""; 
            
            row.className = `flex justify-between items-center p-4 border-b border-white/5 last:border-0 transition-colors ${hoverClass}`; 
            
            if(hasRichStats) { 
                row.dataset.matchData = JSON.stringify(match); 
                row.onclick = function() { window.openMatchDetails(JSON.parse(this.dataset.matchData), playerName); }; 
            } else { 
                row.onclick = () => window.openMatchDetailsFallback(match.id || '', playerName, match.opponent, match.score, match.division, match.season, match.date, match.details); 
            } 
            
            const resultColor = match.result === "Win" ? "text-green-400" : "text-red-400"; 
            const resultIcon = match.result === "Win" ? "W" : "L"; 
            
            row.innerHTML = `
            <div class="flex flex-col">
                <div class="flex items-center gap-3 mb-1">
                    <span class="${resultColor} font-black text-xl w-6">${resultIcon}</span>
                    <div class="flex items-center">
                        <span class="text-slate-500 mr-2 text-xs">VS</span>
                        <span class="text-white font-bold">${match.opponent}</span>
                        ${richBadge}
                    </div>
                </div>
                <div class="text-[9px] text-slate-500 font-mono ml-9 tracking-widest uppercase">ID: ${match.match_id || 'N/A'}</div>
            </div>
            <div class="text-right flex items-center gap-3">
                <div>
                    <div class="font-mono text-slate-300 font-bold bg-slate-800 px-2 py-1 rounded inline-block text-sm mb-1">${match.score}</div>
                    <div class="text-[10px] text-slate-600 font-bold uppercase tracking-wider">${match.date}</div>
                </div>
                ${!hasRichStats ? `<button onclick="event.stopPropagation(); window.openReportModal('${playerName}', '${match.opponent}', '${match.date}', '${match.match_id || ''}')" class="text-slate-500 hover:text-red-400 transition ml-2" title="Report Error"><i class="fa-solid fa-triangle-exclamation"></i></button>` : ''}
            </div>`; 
            
            historyDiv.appendChild(row); 
        }); 

        if (!showAll && matches.length > 5) {
            const btnDiv = document.createElement('div');
            btnDiv.className = "pt-4 pb-2";
            btnDiv.innerHTML = `<button onclick="renderHistory(window.currentLoadedMatches, window.currentPlayerName, true)" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-3 rounded-xl border border-white/5 transition shadow-lg text-sm">See all ${matches.length} matches</button>`;
            historyDiv.appendChild(btnDiv);
        }
    }

    window.loadStats = async function(player) { 
        window.switchTab('statsContainer', true); 
        document.getElementById('playerName').innerText = player; 
        document.getElementById('playerSearch').value = ""; 
        
        let pc = document.getElementById('petermanContainer');
        if (pc) pc.innerHTML = '';

        const seasonSelect = document.getElementById('seasonSelect'); 
        const selectedSeason = seasonSelect ? seasonSelect.value : currentSeason; 
        const divSelect = document.getElementById('profileDivisionSelect'); 
        const selectedDiv = divSelect ? divSelect.value : "All"; 
        const histDiv = document.getElementById('matchHistory'); 
        histDiv.innerHTML = '<div class="p-8 text-center text-slate-500"><i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i><br>Loading history...</div>'; 
        
        try { 
            const res = await fetch(`/api/stats/${encodeURIComponent(player)}?season=${encodeURIComponent(selectedSeason)}&division=${encodeURIComponent(selectedDiv)}`); 
            const data = await res.json(); 
            if (data.error) { alert("Player not found."); return; } 
            
            document.getElementById('playerRatingBadge').innerText = `Rating: ${data.rating}`; 
            document.getElementById('matchesPlayed').innerText = data.combined?.matches || 0; 
            document.getElementById('wins').innerText = data.combined?.wins || 0; 
            document.getElementById('losses').innerText = data.combined?.losses || 0; 
            document.getElementById("winRate").innerText = data.combined?.win_rate || "0%"; 
            
            if (!pc) {
                pc = document.createElement('div');
                pc.id = 'petermanContainer';
                pc.className = 'mt-3 flex justify-center w-full';
                const pNameEl = document.getElementById('playerName');
                if (pNameEl && pNameEl.parentElement) {
                    pNameEl.parentElement.appendChild(pc);
                }
            }
            if (data.peterman_id) {
                pc.innerHTML = `<a href="https://petermanratings.com/profile.php?profile-id=${data.peterman_id}" target="_blank" title="Peterman Ratings" class="bg-indigo-950/40 border border-indigo-500/20 text-indigo-300/70 hover:text-indigo-200 hover:bg-indigo-900/60 transition px-2 py-1 rounded text-[9px] font-medium flex items-center justify-center gap-1.5 w-max mx-auto opacity-60 hover:opacity-100 grayscale hover:grayscale-0">
                    <img src="/static/peterman.png" class="h-2.5 w-auto opacity-70" alt="Peterman">
                    Peterman Rating
                </a>`;
            } else {
                pc.innerHTML = '';
            }

            renderHistory(data.combined?.match_history || [], player); 
        } catch (err) { console.error("Error loading stats:", err); } 
    };

    window.activeDetailsMatch = null;
    window.openMatchDetails = function(match, playerName) {
        window.activeDetailsMatch = { p1: playerName, p2: match.opponent, date: match.date };
        history.pushState({ modal: 'matchDetails' }, "", "#matchDetails");
        const r = match.rich_stats || {};
        document.getElementById('md-date-div').innerText = `${match.date} • ${match.division}`;
        document.getElementById('md-p1').innerText = playerName; document.getElementById('md-p2').innerText = match.opponent; document.getElementById('md-score').innerText = match.score;
        document.getElementById('md-history-fallback').classList.add('hidden'); document.getElementById('md-durations-box').classList.remove('hidden');
        document.getElementById('md-total-time').innerText = r.total_duration || "00:00"; document.getElementById('md-active-time').innerText = r.play_duration || "00:00";

        if(r.momentum) { document.getElementById('md-momentum').innerText = r.momentum; document.getElementById('md-momentum-box').classList.remove('hidden'); } else { document.getElementById('md-momentum-box').classList.add('hidden'); }
        if(r.serve_stats && r.serve_stats.home && r.serve_stats.home.total > 0) { const homeWinPct = Math.round((r.serve_stats.home.won / r.serve_stats.home.total) * 100); const awayWinPct = Math.round((r.serve_stats.away.won / r.serve_stats.away.total) * 100); document.getElementById('md-serve-p1').innerText = `P1: ${homeWinPct}%`; document.getElementById('md-serve-p2').innerText = `P2: ${awayWinPct}%`; document.getElementById('md-serve-bar').style.width = `${homeWinPct}%`; document.getElementById('md-serve-box').classList.remove('hidden'); } else { document.getElementById('md-serve-box').classList.add('hidden'); }

        let pLogHtml = "";
        if (r.point_log && r.point_log.length > 0) {
            const sets = {}; r.point_log.forEach(pt => { if (!sets[pt.set]) sets[pt.set] = []; sets[pt.set].push(pt); });
            for (const [setNum, pts] of Object.entries(sets)) {
                pLogHtml += `<div class="bg-black/30 p-3 rounded-lg border border-white/5 mb-3"><div class="text-[10px] text-slate-500 font-bold mb-2 uppercase tracking-widest">Set ${setNum} Score Flow</div><div class="flex overflow-x-auto gap-1 pb-2 scrollbar-hide">`;
                pts.forEach(pt => { const colorClass = pt.winnerIsHome ? 'bg-blue-900/40 text-blue-400 border-blue-500/30' : 'bg-red-900/40 text-red-400 border-red-500/30'; pLogHtml += `<div class="flex-shrink-0 text-[10px] font-mono px-2 py-1 rounded border ${colorClass}">${pt.homeScore}-${pt.awayScore}</div>`; });
                pLogHtml += `</div></div>`;
            }
            document.getElementById('md-point-flow').innerHTML = pLogHtml; document.getElementById('md-point-flow').classList.remove('hidden');
        } else { document.getElementById('md-point-flow').classList.add('hidden'); }
        document.getElementById('matchDetailsModal').classList.remove('hidden');
    }
    
    window.openMatchDetailsFallback = function(matchId, p1, p2, score, division, season, date, details) {
        window.activeDetailsMatch = { p1: p1, p2: p2, date: date }; history.pushState({ modal: 'matchDetails' }, "", "#matchDetails");
        document.getElementById('md-p1').innerText = p1; document.getElementById('md-p2').innerText = p2; document.getElementById('md-score').innerText = score; document.getElementById('md-date-div').innerText = `${date} • ${division}`;
        document.getElementById('md-durations-box').classList.add('hidden'); document.getElementById('md-serve-box').classList.add('hidden'); document.getElementById('md-momentum-box').classList.add('hidden'); document.getElementById('md-point-flow').classList.add('hidden');
        const histDiv = document.getElementById('md-history'); histDiv.innerHTML = '';
        if (details && details.length > 2) { details.split(',').forEach(s => { const badge = document.createElement('span'); badge.className = "bg-slate-700 text-white font-mono font-bold px-3 py-1 rounded shadow"; badge.innerText = s.trim(); histDiv.appendChild(badge); }); } else { histDiv.innerHTML = '<span class="text-slate-500 text-xs italic">No set history available.</span>'; }
        document.getElementById('md-history-fallback').classList.remove('hidden'); document.getElementById('matchDetailsModal').classList.remove('hidden');
    }

    window.closeMatchDetails = function() { document.getElementById('matchDetailsModal').classList.add('hidden'); }
    window.openReportFromDetails = function() { if(window.activeDetailsMatch) { closeMatchDetails(); window.openReportModal(window.activeDetailsMatch.p1, window.activeDetailsMatch.p2, window.activeDetailsMatch.date, ""); } }
    
    window.openReportModal = function(p1, p2, date, matchId) { 
        history.pushState({ modal: 'reportModal' }, "", "#report"); 
        document.getElementById('rep-p1').value = p1; 
        document.getElementById('rep-p2').value = p2; 
        document.getElementById('rep-date').value = date; 
        
        let desc = `${p1} vs ${p2} on ${date}`;
        if (matchId) desc += ` (ID: ${matchId})`;
        
        document.getElementById('report-match-desc').innerText = desc; 
        document.getElementById('report-match-desc').dataset.matchId = matchId || "";
        
        document.getElementById('lbl-rep-p1').innerText = p1 + " Sets"; 
        document.getElementById('lbl-rep-p2').innerText = p2 + " Sets"; 
        document.getElementById('rep-s1').value = ''; 
        document.getElementById('rep-s2').value = ''; 
        document.getElementById('reportModal').classList.remove('hidden'); 
    }
    window.closeReportModal = function() { document.getElementById('reportModal').classList.add('hidden'); }

    window.submitReport = async function() { 
        const p1 = document.getElementById('rep-p1').value; 
        const p2 = document.getElementById('rep-p2').value; 
        const date = document.getElementById('rep-date').value; 
        const name = document.getElementById('repName').value; 
        const prob = document.getElementById('repDesc').value; 
        const h = document.getElementById('rep-s1').value; 
        const a = document.getElementById('rep-s2').value; 
        const matchId = document.getElementById('report-match-desc').dataset.matchId || "";
        
        if(!name || !prob || h==="" || a==="") return alert("Please fill all fields."); 
        
        try { 
            const res = await fetch('/api/report', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ match_id: matchId, p1: p1, p2: p2, date: date, reporter: name, problem: prob, suggested_home: h, suggested_away: a }) 
            }); 
            
            if(res.status === 200) { 
                alert("✅ SUCCESS (Code 200): Match report securely saved to database and sent to Admin Inbox!"); 
                closeReportModal(); 
            } else { 
                alert(`❌ ERROR (Code ${res.status}): Failed to save report to database.`); 
            } 
        } catch(e) {
            alert("❌ NETWORK ERROR: Could not connect to the server.");
        } 
    }

    window.submitFeedback = async function() { 
        const type = document.getElementById('fb-type').value; 
        const name = document.getElementById('fb-name').value; 
        const context = document.getElementById('fb-context').value || "Not specified"; 
        const msg = document.getElementById('fb-msg').value; 
        
        if(!name || !msg) return alert("Please provide your name and a description of the issue."); 
        
        try { 
            const res = await fetch('/api/feedback', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ type: type, contact: name, context: context, message: msg }) 
            }); 
            
            if(res.status === 200) { 
                alert("✅ SUCCESS (Code 200): Your feedback has been securely saved to the Database and sent to the Admin Inbox."); 
                document.getElementById('fb-msg').value = ''; 
                document.getElementById('fb-context').value = ''; 
                document.getElementById('feedbackModal').classList.add('hidden'); 
            } else {
                alert(`❌ ERROR (Code ${res.status}): Failed to save to database. Please try again.`);
            }
        } catch(e) { 
            alert("❌ NETWORK ERROR: Could not connect to the server.");
        } 
    }

    window.loadDivisionLeaderboard = async function() { const season = document.getElementById('boardSeason')?.value || currentSeason; const div = document.getElementById('boardDiv')?.value || "Division 1"; const week = document.getElementById('boardWeek')?.value || "Latest"; const sortMode = document.getElementById('boardSort')?.value || "wins"; const showFillIns = document.getElementById('toggleShowFillIns')?.checked; const combineFillIns = document.querySelector('input[name="fiMode"]:checked')?.value === 'combine'; const container = document.getElementById('leaderboardContent'); if(!container) return; container.innerHTML = '<div class="text-center py-10"><i class="fa-solid fa-spinner fa-spin text-4xl text-yellow-500"></i></div>'; try { const res = await fetch(`/api/rankings/${encodeURIComponent(season)}/${encodeURIComponent(div)}?week=${week}`); let data = await res.json(); if (!data || data.length === 0) { container.innerHTML = '<div class="text-center text-slate-500 py-10">No standings data found.</div>'; return; } data.sort((a, b) => { const aStats = showFillIns ? (combineFillIns ? a.regular : a.fillin) : a.regular; const bStats = showFillIns ? (combineFillIns ? b.regular : b.fillin) : b.regular; if(!aStats) return 1; if(!bStats) return -1; if (sortMode === 'rating') return b.rating_val - a.rating_val; if (sortMode === 'wins') return bStats.wins - aStats.wins; if (sortMode === 'percent') { const aPct = aStats.matches > 0 ? aStats.wins / aStats.matches : 0; const bPct = bStats.matches > 0 ? bStats.wins / bStats.matches : 0; return bPct - aPct; } return aStats.losses - bStats.losses; }); let html = ""; data.forEach((p, index) => { const stats = showFillIns ? (combineFillIns ? p.regular : p.fillin) : p.regular; if(!stats || stats.matches === 0) return; const winPct = Math.round((stats.wins / stats.matches) * 100); html += `<div class="grid grid-cols-7 gap-2 items-center p-3 bg-black/20 rounded-lg border border-white/5 hover:bg-white/5 transition-colors"><div class="col-span-2 flex items-center gap-3"><div class="text-slate-500 font-mono text-xs w-4">${index + 1}</div><div class="font-bold text-white truncate cursor-pointer hover:text-yellow-400" onclick="loadStats('${p.name}')">${p.name}</div></div><div class="text-center font-mono text-yellow-500 font-bold">${p.rating_val}</div><div class="text-center text-slate-300">${stats.matches}</div><div class="text-center text-green-400 font-bold">${stats.wins}</div><div class="text-center text-red-400">${stats.losses}</div><div class="text-center text-slate-300 font-mono">${winPct}%</div></div>`; }); container.innerHTML = html; } catch (e) { console.error(e); container.innerHTML = '<div class="text-center text-red-400 py-10">Error loading data.</div>'; } };
    window.loadResults = async function() { const season = document.getElementById('resultsSeason')?.value || currentSeason; const week = document.getElementById('resultsWeek')?.value || "1"; const search = document.getElementById('resultsSearch')?.value.toLowerCase() || ""; const container = document.getElementById('resultsContainer'); if(!container) return; container.innerHTML = '<div class="text-center py-10"><i class="fa-solid fa-spinner fa-spin text-4xl text-yellow-500"></i></div>'; try { const res = await fetch(`/api/week/${encodeURIComponent(season)}/${week}`); const matches = await res.json(); if (!matches || matches.length === 0) { container.innerHTML = '<div class="text-center text-slate-500 py-10">No matches found for this week.</div>'; return; } let html = ""; let filtered = matches; if (search) filtered = matches.filter(m => m.p1.toLowerCase().includes(search) || m.p2.toLowerCase().includes(search)); filtered.forEach(m => { html += `<div class="bg-slate-800/50 p-4 rounded-xl border border-white/5 flex flex-col md:flex-row justify-between items-center gap-4 hover:bg-slate-800 transition-colors"><div class="flex items-center gap-4 flex-1"><div class="text-xs font-bold text-slate-500 uppercase tracking-widest bg-black/20 px-2 py-1 rounded">${m.division}</div><div class="font-bold text-white text-lg">${m.p1} <span class="text-slate-500 text-sm mx-2">vs</span> ${m.p2}</div></div><div class="text-right"><div class="text-2xl font-mono font-black text-yellow-500 tracking-tight">${m.score}</div><div class="text-[10px] text-slate-500 font-bold uppercase">${m.date}</div></div></div>`; }); container.innerHTML = html || '<div class="text-center text-slate-500 py-10">No matches match your search.</div>'; } catch(e) { console.error(e); container.innerHTML = '<div class="text-center text-red-400 py-10">Error loading results.</div>'; } };
</script>
