<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDq05wFsKLHtt8G0Z5yLOG9pIk9UX24S4o", authDomain: "gctta-stats-live.firebaseapp.com", projectId: "gctta-stats-live", storageBucket: "gctta-stats-live.firebasestorage.app", messagingSenderId: "1070856258556", appId: "1:1070856258556:web:be438e04c1941abc3c6879" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Get Today's Date in dd/mm/yyyy format
    const today = new Date();
    const dateString = String(today.getDate()).padStart(2, '0') + '/' + String(today.getMonth() + 1).padStart(2, '0') + '/' + today.getFullYear();
    
    // Global Store for Live Matches (so Profile can see them)
    window.liveMatchesRaw = [];

    // Query 'fixture_schedule' for today's matches
    const q = query(collection(db, "fixture_schedule"), where("date", "==", dateString));
    
    let knownLiveMatches = new Set();

    onSnapshot(q, (snapshot) => {
        const navLive = document.getElementById("nav-live-center");
        const navMobileLive = document.getElementById("b-nav-live-center");
        const matchesContainer = document.getElementById("liveMatchesContainer");
        const scheduledContainer = document.getElementById("scheduledContainer");
        const scheduledList = document.getElementById("scheduledList");
        
        let liveHTML = "";
        let scheduledHTML = "";
        let hasLive = false;
        let hasScheduled = false;
        
        // Clear global list before rebuilding
        window.liveMatchesRaw = [];

        snapshot.forEach((doc) => {
            const m = doc.data();
            m.id = doc.id; // Save ID
            
            if (m.match_status === "Finished") return;
            
            // Store for Profile View
            window.liveMatchesRaw.push(m);

            // NAME LOGIC: Prefer Players over Teams (Home/Away Players from iPad)
            let homeDisplay = m.home_team;
            let awayDisplay = m.away_team;
            if(m.home_players && m.home_players.length > 0) homeDisplay = m.home_players.join(" / ");
            if(m.away_players && m.away_players.length > 0) awayDisplay = m.away_players.join(" / ");

            // LIVE CHECK
            const isLive = m.match_status === "Live" || (m.live_home_score !== undefined && (m.live_home_score > 0 || m.live_away_score > 0));

            if (isLive) {
                hasLive = true;
                if (!knownLiveMatches.has(doc.id)) {
                    knownLiveMatches.add(doc.id);
                    showNotification(homeDisplay, awayDisplay);
                }
                
                // HISTORY LINE (Previous Sets)
                let historyHTML = "";
                if (m.game_scores_history) {
                    const scores = m.game_scores_history.split(',');
                    historyHTML = `<div class="flex justify-center gap-3 mt-6 pt-4 border-t border-white/10 w-full">`;
                    scores.forEach(s => { 
                        if(s.trim()) historyHTML += `<span class="text-sm font-mono font-bold text-slate-400 bg-slate-800 px-3 py-1 rounded-md border border-white/5 shadow-sm">${s.trim()}</span>`; 
                    });
                    historyHTML += `</div>`;
                }

                // SERVER ICON
                const serverName = m.current_server || '';
                let homeServerIcon = serverName && homeDisplay.includes(serverName) ? `<i class="fa-solid fa-table-tennis-paddle-ball text-yellow-400 text-2xl animate-bounce ml-3"></i>` : '';
                let awayServerIcon = serverName && awayDisplay.includes(serverName) ? `<i class="fa-solid fa-table-tennis-paddle-ball text-yellow-400 text-2xl animate-bounce mr-3"></i>` : '';

                // TIMER BADGE
                let timerBadge = "";
                if (m.timer_label && m.timer_value > 0) {
                    let tColor = 'bg-yellow-500 text-black';
                    if (m.timer_label === 'WARMUP') tColor = 'bg-orange-600 text-white';
                    if (m.timer_label === 'TIMEOUT') tColor = 'bg-red-600 text-white';
                    if (m.timer_label === 'BREAK') tColor = 'bg-purple-600 text-white';
                    timerBadge = `<div class="${tColor} font-black uppercase text-xs md:text-sm px-3 py-1 rounded-full animate-pulse shadow-xl absolute -top-3 left-1/2 transform -translate-x-1/2 z-20 border-2 border-slate-900 flex items-center gap-2"><i class="fa-solid fa-clock"></i> ${m.timer_label}: ${m.timer_value}s</div>`;
                }

                liveHTML += `
                <div class="relative bg-slate-800/80 backdrop-blur-md border border-white/10 rounded-2xl p-6 md:p-8 mb-6 shadow-2xl mx-auto max-w-4xl" id="card-${doc.id}">
                    ${timerBadge}
                    <div class="flex justify-between items-center mb-6 border-b border-white/5 pb-2">
                        <div class="text-sm font-bold text-slate-500 uppercase tracking-[0.2em]">Table ${m.table}</div>
                        <div class="text-sm font-bold text-yellow-500/80 uppercase tracking-widest">${m.division}</div>
                    </div>
                    <div class="flex items-center justify-between">
                        <div class="flex-1 text-center">
                            <div class="text-xl md:text-3xl font-black text-white mb-2 leading-tight flex justify-center items-center">${homeDisplay} ${homeServerIcon}</div>
                            <div class="text-7xl md:text-9xl font-black text-white font-mono tracking-tighter shadow-text">${m.live_home_score || 0}</div>
                        </div>
                        <div class="w-24 md:w-32 flex flex-col items-center justify-center bg-black/20 rounded-xl py-4 mx-4 border border-white/5">
                            <div class="text-xs text-slate-500 font-bold uppercase mb-1 tracking-widest">SETS</div>
                            <div class="text-3xl md:text-5xl font-bold text-yellow-500 font-mono">${m.live_home_sets || 0}-${m.live_away_sets || 0}</div>
                        </div>
                        <div class="flex-1 text-center">
                            <div class="text-xl md:text-3xl font-black text-white mb-2 leading-tight flex justify-center items-center">${awayServerIcon} ${awayDisplay}</div>
                            <div class="text-7xl md:text-9xl font-black text-white font-mono tracking-tighter shadow-text">${m.live_away_score || 0}</div>
                        </div>
                    </div>
                    ${historyHTML}
                </div>`;
            } else {
                hasScheduled = true;
                scheduledHTML += `
                <div class="bg-slate-800/40 p-4 rounded-xl border border-white/5 flex justify-between items-center mb-3 hover:bg-slate-800/60 transition-colors">
                    <div class="flex flex-col gap-1">
                        <div class="flex items-center gap-2"><span class="text-xs font-bold bg-slate-700 text-slate-300 px-2 py-0.5 rounded">T${m.table}</span><span class="text-xs text-slate-500 font-bold uppercase tracking-wider">${m.division}</span></div>
                        <div class="text-lg font-bold text-white">${homeDisplay} <span class="text-slate-500 text-sm mx-1">vs</span> ${awayDisplay}</div>
                    </div>
                    <div class="text-xs font-bold text-slate-400 bg-black/30 px-3 py-1.5 rounded-full border border-white/5">UPCOMING</div>
                </div>`;
            }
        });

        if (hasLive) { 
            navLive.style.display = "block"; navMobileLive.style.display = "flex"; matchesContainer.innerHTML = liveHTML; scheduledContainer.style.display = "none"; 
        } else { 
            navLive.style.display = "none"; navMobileLive.style.display = "none"; matchesContainer.innerHTML = "<div class='text-center text-slate-500 py-20 text-lg'>No matches live right now.</div>"; 
            if(hasScheduled) { scheduledContainer.style.display = "block"; scheduledList.innerHTML = scheduledHTML; } 
        }
    });

    function showNotification(p1, p2) { const banner = document.getElementById("matchNotification"); const text = document.getElementById("notifText"); if(banner && text) { text.innerHTML = `<span class="text-white font-bold">${p1}</span> vs <span class="text-white font-bold">${p2}</span>`; banner.style.top = "0"; setTimeout(() => { banner.style.top = "-100px"; }, 6000); } }
    window.switchTab = (tabId) => { window.switchTabGlobal(tabId); };
</script>


<script>
    // GLOBAL VARIABLES
    window.allPlayersRaw = []; 
    let currentSeason = "Career", currentDivision = "All";
    let currentPlayerStats = null, currentMode = "regular";

    // --- VISUAL STARS ---
    function generateStars() { const container = document.getElementById('starContainer'); if(!container) return; container.innerHTML = ''; const starCount = 60; for (let i = 0; i < starCount; i++) { const star = document.createElement('div'); const sizeClass = Math.random() < 0.6 ? 's-small' : (Math.random() < 0.9 ? 's-medium' : 's-large'); star.className = `star ${sizeClass}`; star.style.top = `${Math.random() * 100}%`; star.style.left = `${Math.random() * 100}%`; star.style.setProperty('--duration', `${2 + Math.random() * 3}s`); star.style.setProperty('--delay', `${Math.random() * 2}s`); container.appendChild(star); } }

    window.onload = async () => {
        generateStars(); 
        
        try {
            // 1. Fetch Players
            const pRes = await fetch('/api/players');
            window.allPlayersRaw = await pRes.json();
            
            // 2. Setup Search
            setupMainSearch(); 
            
            // 3. Load Dropdowns
            const [sRes, dRes] = await Promise.all([fetch('/api/seasons'), fetch('/api/divisions')]);
            const seasons = await sRes.json();
            const divisions = await dRes.json();
            
            const sSelect = document.getElementById('seasonSelect');
            if (sSelect) { sSelect.innerHTML = ''; seasons.forEach(s => { let opt = document.createElement('option'); opt.value = s; opt.innerText = s; sSelect.appendChild(opt); }); }
            
            if(seasons.length > 0) { currentSeason = seasons[seasons.length - 1]; if(sSelect) sSelect.value = currentSeason; }

            document.getElementById('seasonSelect')?.addEventListener('change', (e) => { currentSeason = e.target.value; reloadStats(); });
            
        } catch(e) { console.error("Init Error", e); }
    };

    // --- FIXED SEARCH LOGIC ---
    function setupMainSearch() {
        const input = document.getElementById('playerSearch');
        const list = document.getElementById('suggestions-list');
        
        if (!input || !list) return;

        input.addEventListener('input', () => {
            const val = input.value.toLowerCase().trim();
            list.innerHTML = ''; 
            
            if (val.length < 2) { list.classList.add('hidden'); return; }
            if (!window.allPlayersRaw) return;

            const exact = window.allPlayersRaw.filter(p => p.toLowerCase().startsWith(val));
            const partial = window.allPlayersRaw.filter(p => p.toLowerCase().includes(val) && !p.toLowerCase().startsWith(val));
            const filtered = [...exact, ...partial].slice(0, 8);

            list.classList.remove('hidden');

            if (filtered.length > 0) {
                filtered.forEach(player => {
                    const div = document.createElement('div');
                    div.className = 'p-3 hover:bg-slate-700 cursor-pointer text-white border-b border-white/5 transition-colors flex justify-between items-center bg-slate-800';
                    div.innerHTML = `<span class="font-bold">${player}</span><i class="fa-solid fa-chevron-right text-xs text-slate-500"></i>`;
                    div.onclick = () => { 
                        input.value = player; 
                        list.classList.add('hidden'); 
                        loadStats(player); 
                    };
                    list.appendChild(div);
                });
            } else {
                list.innerHTML = `<div class="p-4 text-slate-500 text-center text-sm bg-slate-800">No player found</div>`;
            }
        });

        document.addEventListener('click', (e) => {
            if (!input.contains(e.target) && !list.contains(e.target)) {
                list.classList.add('hidden');
            }
        });
    }

    // --- TAB SWITCHER ---
    window.switchTabGlobal = (tabId) => { 
        ['home', 'week', 'sheets', 'global', 'live-center', 'rules'].forEach(t => { 
            const el = document.getElementById(`tab-${t}`); if(el) el.classList.add('hidden'); 
            const nav = document.getElementById(`nav-${t}`); if(nav) nav.classList.remove('active'); 
            const bnav = document.getElementById(`b-nav-${t}`); if(bnav) bnav.classList.remove('active'); 
        }); 
        const stats = document.getElementById('statsContainer');
        if(stats) stats.classList.add('hidden');

        if (tabId === 'statsContainer') {
            stats.classList.remove('hidden');
            stats.classList.add('animate-fade-in');
        } else {
            const target = document.getElementById(`tab-${tabId}`); 
            if(target) { target.classList.remove('hidden'); target.classList.add('animate-fade-in'); } 
            const targetNav = document.getElementById(`nav-${tabId}`); if(targetNav) targetNav.classList.add('active');
            const targetBNav = document.getElementById(`b-nav-${tabId}`); if(targetBNav) targetBNav.classList.add('active');
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };
    
    // --- PROFILE LOADING (WITH LIVE INJECTION) ---
    window.loadStats = async function(player) { 
        window.switchTabGlobal('statsContainer'); 
        document.getElementById('playerName').innerText = player; 
        document.getElementById('playerSearch').value = ""; 
        try { 
            const res = await fetch(`/api/stats/${encodeURIComponent(player)}?season=Career&division=All`); 
            const data = await res.json(); 
            if (data.error) { alert("Player not found."); return; } 
            
            currentPlayerStats = data; 
            document.getElementById('playerRatingBadge').innerText = `Rating: ${data.rating}`; 
            document.getElementById('matchesPlayed').innerText = data.combined?.matches || 0;
            document.getElementById('wins').innerText = data.combined?.wins || 0;
            document.getElementById('losses').innerText = data.combined?.losses || 0;
            document.getElementById("winRate").innerText = data.combined?.win_rate || "0%"; 
            
            // Render History (injecting Live Matches if any)
            renderHistory(data.combined?.match_history || [], player);
            
        } catch (err) { console.error("Error loading stats:", err); } 
    }

    window.closeProfile = () => { window.switchTabGlobal('home'); }
    
    function renderHistory(matches, playerName) { 
        const historyDiv = document.getElementById('matchHistory'); 
        historyDiv.innerHTML = ""; 
        
        // 1. CHECK FOR LIVE MATCHES
        if (window.liveMatchesRaw && window.liveMatchesRaw.length > 0) {
            window.liveMatchesRaw.forEach(m => {
                let isPlaying = false;
                let opponentName = "Unknown";
                
                // Check Home Players
                if (m.home_players && m.home_players.includes(playerName)) {
                    isPlaying = true;
                    opponentName = m.away_players ? m.away_players.join("/") : m.away_team;
                }
                // Check Away Players
                else if (m.away_players && m.away_players.includes(playerName)) {
                    isPlaying = true;
                    opponentName = m.home_players ? m.home_players.join("/") : m.home_team;
                }
                
                if (isPlaying) {
                    // Render "LIVE NOW" Card
                    const liveRow = document.createElement('div');
                    liveRow.className = "bg-red-500/10 border-l-4 border-red-500 p-4 mb-4 rounded-r-lg animate-pulse";
                    liveRow.innerHTML = `
                        <div class="flex justify-between items-center">
                            <div>
                                <div class="text-[10px] font-black text-red-400 uppercase tracking-widest mb-1">LIVE NOW • TABLE ${m.table}</div>
                                <div class="text-white font-bold text-lg">vs ${opponentName}</div>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-mono font-black text-white">${m.live_home_score}-${m.live_away_score}</div>
                                <div class="text-xs text-red-400 font-bold">SETS: ${m.live_home_sets}-${m.live_away_sets}</div>
                            </div>
                        </div>`;
                    historyDiv.appendChild(liveRow);
                }
            });
        }

        // 2. RENDER HISTORICAL MATCHES
        if (!matches || matches.length === 0) { 
            if (historyDiv.innerHTML === "") historyDiv.innerHTML = '<div class="p-6 text-center text-slate-500">No matches found.</div>'; 
            return; 
        } 
        
        matches.slice(0, 10).forEach(match => { 
            const row = document.createElement('div'); 
            row.className = "flex justify-between items-center p-4 border-b border-white/5 last:border-0 hover:bg-white/5 transition-colors"; 
            const resultColor = match.result === "Win" ? "text-green-400" : "text-red-400"; 
            const resultIcon = match.result === "Win" ? "W" : "L"; 
            
            row.innerHTML = `
            <div class="flex flex-col">
                <div class="flex items-center gap-3 mb-1">
                    <span class="${resultColor} font-black text-xl w-6">${resultIcon}</span>
                    <div class="flex items-center">
                        <span class="text-slate-500 mr-2 text-xs">VS</span>
                        <a href="#" onclick="loadStats('${match.opponent}'); return false;" class="text-white hover:text-yellow-400 font-bold transition-colors">${match.opponent}</a>
                    </div>
                </div>
            </div>
            <div class="text-right">
                <div class="font-mono text-slate-300 font-bold bg-slate-800 px-2 py-1 rounded inline-block text-sm mb-1">${match.score}</div>
                <div class="text-[10px] text-slate-600 font-bold uppercase tracking-wider">${match.date}</div>
            </div>`; 
            historyDiv.appendChild(row); 
        }); 
    }
</script>
