<div class="flex overflow-x-auto no-scrollbar border-b border-white/5 bg-slate-900/50 backdrop-blur-md sticky top-0 z-30">
    <button id="tab-btn-live" onclick="window.switchAdminTab('live')" class="px-6 py-4 font-bold text-sm text-yellow-500 border-b-2 border-yellow-500 transition-all flex items-center gap-2 cursor-pointer whitespace-nowrap">
        <i class="fa-solid fa-tower-broadcast"></i> Live Control <span id="liveMatchCount" class="bg-red-600 text-white text-[10px] px-1.5 py-0.5 rounded-full ml-1">0</span>
    </button>
    <button id="tab-btn-inbox-match" onclick="window.switchAdminTab('inbox-match')" class="px-6 py-4 font-bold text-sm text-slate-400 hover:text-white transition-all flex items-center gap-2 border-b-2 border-transparent cursor-pointer whitespace-nowrap relative">
        <i class="fa-solid fa-inbox"></i> Match Inbox <span id="match-badge" class="hidden bg-yellow-500 text-black text-[10px] font-black px-1.5 py-0.5 rounded-full">0</span>
    </button>
    <button id="tab-btn-inbox-feedback" onclick="window.switchAdminTab('inbox-feedback')" class="px-6 py-4 font-bold text-sm text-slate-400 hover:text-white transition-all flex items-center gap-2 border-b-2 border-transparent cursor-pointer whitespace-nowrap relative">
        <i class="fa-solid fa-comment-dots"></i> Feedback <span id="feedback-badge" class="hidden bg-blue-500 text-white text-[10px] font-black px-1.5 py-0.5 rounded-full">0</span>
    </button>
    <button id="tab-btn-date-errors" onclick="window.switchAdminTab('date-errors')" class="px-6 py-4 font-bold text-sm text-slate-400 hover:text-white transition-all flex items-center gap-2 border-b-2 border-transparent cursor-pointer whitespace-nowrap relative">
        <i class="fa-solid fa-calendar-exclamation"></i> Date Errors <span id="date-badge" class="hidden bg-orange-500 text-white text-[10px] font-black px-1.5 py-0.5 rounded-full">0</span>
    </button>
    <button id="tab-btn-broadcast" onclick="window.switchAdminTab('broadcast')" class="px-6 py-4 font-bold text-sm text-slate-400 hover:text-white transition-all flex items-center gap-2 border-b-2 border-transparent cursor-pointer whitespace-nowrap">
        <i class="fa-solid fa-bullhorn"></i> Broadcast
    </button>
    <button id="tab-btn-donations" onclick="window.switchAdminTab('donations')" class="px-6 py-4 font-bold text-sm text-slate-400 hover:text-white transition-all flex items-center gap-2 border-b-2 border-transparent cursor-pointer whitespace-nowrap">
        <i class="fa-solid fa-hand-holding-dollar"></i> Donations
    </button>
    <button id="tab-btn-players" onclick="window.switchAdminTab('players')" class="px-6 py-4 font-bold text-sm text-slate-400 hover:text-white transition-all flex items-center gap-2 border-b-2 border-transparent cursor-pointer whitespace-nowrap">
        <i class="fa-solid fa-users-gear"></i> Player Editor
    </button>
    <button id="tab-btn-history" onclick="window.switchAdminTab('history')" class="px-6 py-4 font-bold text-sm text-slate-400 hover:text-white transition-all flex items-center gap-2 border-b-2 border-transparent cursor-pointer whitespace-nowrap">
        <i class="fa-solid fa-clock-rotate-left"></i> Full History
    </button>
    <button id="tab-btn-notices" onclick="window.switchAdminTab('notices')" class="px-6 py-4 font-bold text-sm text-slate-400 hover:text-white transition-all flex items-center gap-2 border-b-2 border-transparent cursor-pointer whitespace-nowrap">
        <i class="fa-solid fa-clipboard-list"></i> Notices
    </button>
    <button id="tab-btn-chat" onclick="window.switchAdminTab('chat')" class="px-6 py-4 font-bold text-sm text-slate-400 hover:text-white transition-all flex items-center gap-2 border-b-2 border-transparent cursor-pointer whitespace-nowrap">
        <i class="fa-solid fa-message"></i> Admin Notes
    </button>
    <button id="tab-btn-diagnostics" onclick="window.switchAdminTab('diagnostics')" class="px-6 py-4 font-bold text-sm text-slate-400 hover:text-white transition-all flex items-center gap-2 border-b-2 border-transparent cursor-pointer whitespace-nowrap">
        <i class="fa-solid fa-microchip"></i> Diagnostics
    </button>
    <button id="tab-btn-audit" onclick="window.switchAdminTab('audit')" class="px-6 py-4 font-bold text-sm text-slate-400 hover:text-white transition-all flex items-center gap-2 border-b-2 border-transparent cursor-pointer whitespace-nowrap">
        <i class="fa-solid fa-shield-halved"></i> Security & Logs
    </button>
</div>
