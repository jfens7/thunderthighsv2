<div class="space-y-6 animate-fade-in w-full">
    <div class="flex justify-between items-center mb-4 border-b border-white/10 pb-4">
        <h2 class="text-purple-400 font-bold uppercase tracking-widest text-sm flex items-center gap-2">
            <i class="fa-solid fa-user-pen"></i> Player Editor
        </h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="bg-slate-800 p-6 rounded-lg border border-purple-500/30 shadow-lg relative overflow-hidden">
            <div class="absolute top-0 right-0 bg-purple-500 text-white text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded-bl-lg">Danger Zone</div>
            <h3 class="text-lg font-black text-white mb-2"><i class="fa-solid fa-wrench text-purple-400 mr-2"></i> Override Glicko-2</h3>
            <p class="text-xs text-slate-400 mb-6">Force a player to a specific rating. Select their exact Player ID to ensure duplicate names do not cross-contaminate.</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase block mb-1">Target Player</label>
                    <select id="override-id" class="w-full bg-black/40 border border-white/10 rounded px-4 py-3 text-white focus:ring-2 focus:ring-purple-500 outline-none text-sm font-mono cursor-pointer">
                        <option value="">Loading players...</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase block mb-1">New Rating Score</label>
                    <input type="number" id="override-score" placeholder="e.g. 1500" class="w-full bg-black/40 border border-white/10 rounded px-4 py-3 text-white focus:ring-2 focus:ring-purple-500 outline-none font-mono">
                </div>
                <button onclick="window.submitRatingOverride()" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 rounded-lg transition-transform hover:scale-[1.02] shadow-[0_0_15px_rgba(168,85,247,0.4)] mt-2">APPLY OVERRIDE</button>
            </div>
        </div>

        <div class="bg-slate-800 p-6 rounded-lg border border-white/10 shadow-lg">
            <h3 class="text-lg font-black text-white mb-2"><i class="fa-solid fa-link text-blue-400 mr-2"></i> Merge Profiles</h3>
            <p class="text-xs text-slate-400 mb-6">Fix typos (e.g. "Jimy" -> "Jimmy"). This permanently updates history and deletes the bad profile.</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase block mb-1">Incorrect Name (Source)</label>
                    <input type="text" id="merge-bad" placeholder="The typo to delete..." class="w-full bg-black/40 border border-white/10 rounded px-4 py-2 text-white focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="flex justify-center text-blue-500 animate-bounce -my-1"><i class="fa-solid fa-arrow-down"></i></div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase block mb-1">Correct Name (Target)</label>
                    <input type="text" id="merge-good" placeholder="The real profile..." class="w-full bg-black/40 border border-white/10 rounded px-4 py-2 text-white focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <button onclick="window.submitMerge()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition-transform hover:scale-[1.02] mt-2">MERGE DATA</button>
            </div>
        </div>

    </div>
</div>
