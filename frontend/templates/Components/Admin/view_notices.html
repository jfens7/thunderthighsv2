<div class="admin-view animate-fade-in max-w-4xl mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <div class="bg-blue-600/20 p-2 rounded-lg border border-blue-500/30">
            <i class="fa-solid fa-bullhorn text-blue-500 text-xl shadow-[0_0_10px_rgba(59,130,246,0.5)]"></i>
        </div>
        <div>
            <h2 class="text-2xl font-black text-white leading-none">Noticeboard Manager</h2>
            <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1">Post updates to the public site</p>
        </div>
    </div>

    <div class="glass-panel p-6 rounded-2xl mb-8 border border-blue-500/30 shadow-lg">
        <h3 class="text-sm font-bold text-white mb-4 uppercase tracking-widest border-b border-white/10 pb-2">Create New Notice</h3>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
            <div class="md:col-span-2">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Title</label>
                <input type="text" id="notice-title" placeholder="e.g. Upcoming Tournament Info" class="w-full bg-slate-900 border border-white/10 text-white font-bold rounded-lg px-4 py-3 focus:border-blue-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Category / Tag</label>
                <select id="notice-type" class="w-full bg-slate-900 border border-white/10 text-white font-bold rounded-lg px-4 py-3 focus:border-blue-500 focus:outline-none appearance-none">
                    <option value="Update">Update (Blue)</option>
                    <option value="Event">Event (Yellow)</option>
                    <option value="Alert">Alert (Red)</option>
                    <option value="General">General (Gray)</option>
                </select>
            </div>
        </div>
        
        <div class="mb-4">
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Message</label>
            <textarea id="notice-message" rows="3" placeholder="Write your announcement here..." class="w-full bg-slate-900 border border-white/10 text-slate-300 rounded-lg px-4 py-3 focus:border-blue-500 focus:outline-none"></textarea>
        </div>
        
        <button onclick="window.submitNotice()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-xl transition shadow-[0_0_15px_rgba(37,99,235,0.4)] w-full md:w-auto"><i class="fa-solid fa-paper-plane mr-2"></i> Post to Public Site</button>
    </div>

    <h3 class="text-sm font-bold text-white mb-4 uppercase tracking-widest pl-2">Active Notices</h3>
    <div id="adminNoticesList" class="space-y-3">
        <div class="text-center py-10 text-slate-500"><i class="fa-solid fa-spinner fa-spin text-2xl"></i></div>
    </div>
</div>
