<div class="admin-view animate-fade-in max-w-4xl mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <div class="bg-emerald-600/20 p-2 rounded-lg border border-emerald-500/30">
            <i class="fa-solid fa-calculator text-emerald-500 text-xl shadow-[0_0_10px_rgba(16,185,129,0.5)]"></i>
        </div>
        <div>
            <h2 class="text-2xl font-black text-white leading-none">Rating Diagnostics</h2>
            <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1">View the exact Glicko-2 mathematical calculations</p>
        </div>
    </div>

    <div class="bg-slate-800 p-6 rounded-xl border border-white/5 shadow-lg mb-6">
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4 items-end">
            <div class="md:col-span-2 relative">
                <label class="text-xs font-bold text-slate-500 uppercase block mb-1">Player 1</label>
                <div class="relative">
                    <input type="text" id="diag-p1-search" placeholder="Search Player 1..." class="w-full bg-black/40 border border-white/10 rounded px-4 py-3 text-white focus:ring-2 focus:ring-emerald-500 outline-none text-sm font-mono" autocomplete="off">
                    <div id="diag-p1-suggestions" class="absolute z-50 left-0 right-0 top-full mt-1 bg-slate-700 border border-white/10 rounded shadow-xl max-h-48 overflow-y-auto hidden"></div>
                </div>
            </div>
            
            <div class="md:col-span-1 text-center font-black text-slate-500 pb-3 uppercase text-xs tracking-widest hidden md:block">VS</div>
            
            <div class="md:col-span-2 relative">
                <label class="text-xs font-bold text-slate-500 uppercase block mb-1">Player 2</label>
                <div class="relative">
                    <input type="text" id="diag-p2-search" placeholder="Search Player 2..." class="w-full bg-black/40 border border-white/10 rounded px-4 py-3 text-white focus:ring-2 focus:ring-emerald-500 outline-none text-sm font-mono" autocomplete="off">
                    <div id="diag-p2-suggestions" class="absolute z-50 left-0 right-0 top-full mt-1 bg-slate-700 border border-white/10 rounded shadow-xl max-h-48 overflow-y-auto hidden"></div>
                </div>
            </div>
        </div>

        <div class="flex items-center justify-center gap-4 mt-6 bg-black/20 p-4 rounded-lg border border-white/5">
            <div class="flex flex-col items-center">
                <label class="text-[10px] font-bold text-slate-500 uppercase mb-1">P1 Sets</label>
                <input type="number" id="diag-s1" value="3" class="w-16 bg-slate-900 border border-white/10 text-white font-black text-center rounded py-2 outline-none focus:border-emerald-500">
            </div>
            <span class="text-slate-600 font-black text-xl">-</span>
            <div class="flex flex-col items-center">
                <label class="text-[10px] font-bold text-slate-500 uppercase mb-1">P2 Sets</label>
                <input type="number" id="diag-s2" value="0" class="w-16 bg-slate-900 border border-white/10 text-white font-black text-center rounded py-2 outline-none focus:border-emerald-500">
            </div>
        </div>
        
        <button onclick="window.runDiagnostics()" id="diag-btn" class="w-full mt-6 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-lg transition-transform hover:scale-[1.02] shadow-lg flex items-center justify-center gap-2">
            <i class="fa-solid fa-microchip"></i> Run Simulation
        </button>
    </div>

    <div id="diag-results" class="hidden space-y-4"></div>
</div>
