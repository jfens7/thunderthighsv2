<div class="space-y-6 animate-fade-in w-full max-w-4xl mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <div class="bg-indigo-600/20 p-2 rounded-lg border border-indigo-500/30">
            <i class="fa-solid fa-comments text-indigo-500 text-xl shadow-[0_0_10px_rgba(99,102,241,0.5)]"></i>
        </div>
        <div>
            <h2 class="text-2xl font-black text-white leading-none">Admin Notes & Chat</h2>
            <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1">Communicate issues and actions with other admins</p>
        </div>
    </div>

    <div class="bg-slate-800 p-6 rounded-xl border border-white/5 shadow-lg mb-6">
        <textarea id="admin-chat-input" rows="3" placeholder="Leave a note for the other admins..." class="w-full bg-slate-900 border border-white/10 rounded-lg px-4 py-3 text-white focus:border-indigo-500 outline-none mb-3"></textarea>
        <button onclick="window.postAdminMessage()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-6 rounded-lg transition-transform hover:scale-[1.02] shadow-[0_0_15px_rgba(99,102,241,0.4)] flex items-center gap-2"><i class="fa-solid fa-paper-plane"></i> Post Note</button>
    </div>

    <div class="bg-slate-800 p-6 rounded-xl border border-white/5 shadow-lg">
        <h3 class="font-bold text-white mb-4 border-b border-white/10 pb-2">Recent Notes</h3>
        <div id="adminChatList" class="space-y-4 max-h-[500px] overflow-y-auto pr-2">
            <div class="text-center py-10 text-slate-500"><i class="fa-solid fa-spinner fa-spin text-2xl"></i></div>
        </div>
    </div>
</div>
