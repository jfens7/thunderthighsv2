<script>
    console.log("✅ Admin UI Script Loaded");

    // --- FORCE REFRESH LOGIC ---
    window.forceRefresh = async function() {
        if(!confirm("Force the server to pull the latest data from the Master Google Sheet? This may take a few seconds.")) return;
        
        const btn = event.currentTarget || document.querySelector('button[onclick="window.forceRefresh()"]');
        const originalHtml = btn ? btn.innerHTML : "FORCE REFRESH";
        
        if(btn) {
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> SYNCING...';
            btn.disabled = true;
        }
        
        try {
            const res = await fetch('/api/refresh', { method: 'POST' });
            const data = await res.json();
            if(data.success || data.status === "Refreshed") {
                alert("✅ Data successfully synced with Google Sheets!");
                window.location.reload();
            } else {
                alert("❌ Sync failed.");
            }
        } catch(e) {
            alert("❌ Network Error connecting to server.");
        } finally {
            if(btn) {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        }
    };

    window.switchAdminTab = function(tabId) {
        ['live', 'approved', 'inbox-match', 'inbox-feedback', 'date-errors', 'players', 'history', 'migration', 'audit', 'notices', 'chat', 'diagnostics', 'broadcast'].forEach(t => {
            const section = document.getElementById(`admin-${t}`);
            if (section) section.classList.add('hidden');
            
            const btn = document.getElementById(`tab-btn-${t}`);
            if (btn) btn.className = "px-6 py-4 font-bold text-sm text-slate-400 hover:text-white transition-all flex items-center gap-2 border-b-2 border-transparent cursor-pointer whitespace-nowrap";
        });
        
        const targetSection = document.getElementById(`admin-${tabId}`);
        if (targetSection) targetSection.classList.remove('hidden');
        
        const targetBtn = document.getElementById(`tab-btn-${tabId}`);
        if (targetBtn) targetBtn.className = "px-6 py-4 font-bold text-sm text-yellow-500 border-b-2 border-yellow-500 transition-all flex items-center gap-2 cursor-pointer whitespace-nowrap";

        if (tabId === 'inbox-match' || tabId === 'inbox-feedback') window.loadPendingReports();
        if (tabId === 'date-errors') window.loadDateErrors();
        if (tabId === 'notices') window.loadAdminNotices();
        if (tabId === 'chat') window.loadAdminChat();
        
        // Auto-load player directory if opening the players or diagnostics tab
        if (['players', 'diagnostics'].includes(tabId) && playerDirectoryData.length === 0) {
            window.loadPlayerDirectory();
        }
        
        if (tabId === 'audit') { window.loadAuditLogs(); window.loadAdminUsers(); window.loadTrafficStats(); }
    };

    // --- SEARCHABLE DROPDOWNS (GENERALIZED) ---
    let playerDirectoryData = [];
    window.loadPlayerDirectory = async function() {
        try {
            const res = await fetch('/api/admin/player_directory');
            playerDirectoryData = await res.json();
        } catch(e) {}
    }

    function attachPlayerSearch(inputId, suggId, hiddenId = null) {
        const input = document.getElementById(inputId);
        const sugg = document.getElementById(suggId);
        if(!input || !sugg) return;
        
        input.addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            if(q.length < 1) { sugg.classList.add('hidden'); return; }
            
            const matches = playerDirectoryData.filter(p => p.name.toLowerCase().includes(q));
            if(matches.length === 0) { 
                sugg.innerHTML = '<div class="px-3 py-2 text-slate-400 text-xs italic">No players found</div>';
                sugg.classList.remove('hidden'); 
                return; 
            }

            sugg.innerHTML = matches.slice(0, 8).map(p => `
                <div class="px-4 py-2 hover:bg-blue-600/30 cursor-pointer text-sm text-white font-bold border-b border-white/5 last:border-0 transition-colors" 
                     onclick="
                        document.getElementById('${inputId}').value = '${p.name.replace(/'/g, "\\'")}';
                        ${hiddenId ? `document.getElementById('${hiddenId}').value = '${p.id}';` : ''}
                        document.getElementById('${suggId}').classList.add('hidden');
                     ">
                    ${p.name} <span class="text-[10px] text-slate-500 font-normal ml-2 font-mono">${p.id}</span>
                </div>
            `).join('');
            sugg.classList.remove('hidden');
        });
        
        document.addEventListener('click', (e) => {
            if(e.target !== input && e.target !== sugg) sugg.classList.add('hidden');
        });
    }

    // Attach search inputs to the correct tools
    document.addEventListener('DOMContentLoaded', () => {
        // Player Editor Overrides & Merge
        attachPlayerSearch('override-search', 'override-suggestions', 'override-id');
        attachPlayerSearch('merge-bad-search', 'merge-bad-suggestions');
        attachPlayerSearch('merge-good-search', 'merge-good-suggestions');
        
        // Diagnostics Tool Searches
        attachPlayerSearch('diag-p1-search', 'diag-p1-suggestions');
        attachPlayerSearch('diag-p2-search', 'diag-p2-suggestions');
    });

    window.submitRatingOverride = async function() {
        const id = document.getElementById('override-id').value;
        const rating = document.getElementById('override-score').value;
        const isRetro = document.getElementById('override-retro').checked;
        
        if(!id || !rating) return alert("Please select a player and provide a rating.");
        
        try {
            const res = await fetch('/api/admin/override_rating', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ player_id: id, rating: rating, retroactive: isRetro })
            });
            const data = await res.json();
            if(data.success) { 
                alert(`✅ Successfully applied rating override.`); 
                document.getElementById('override-id').value = '';
                document.getElementById('override-search').value = '';
                document.getElementById('override-score').value = '';
            } else { alert("❌ Error applying rating override."); }
        } catch(e) { alert("Network error."); }
    };

    window.submitPlayerMerge = async function() {
        const bad = document.getElementById('merge-bad-search').value;
        const good = document.getElementById('merge-good-search').value;
        
        if(!bad || !good) return alert("Please select both names.");
        if(bad.toLowerCase() === good.toLowerCase()) return alert("Names must be different.");
        
        if(!confirm(`⚠️ DANGER: You are about to PERMANENTLY merge "${bad}" into "${good}". \n\nAll history for "${bad}" will be transferred, and the original profile will be deleted. Are you sure?`)) return;
        
        try {
            const res = await fetch('/api/admin/merge', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bad_name: bad, good_name: good })
            });
            const data = await res.json();
            if(data.success) {
                alert(`✅ Successfully merged profiles!`);
                document.getElementById('merge-bad-search').value = '';
                document.getElementById('merge-good-search').value = '';
            } else alert("❌ Error merging players.");
        } catch(e) { alert("Network error."); }
    }

    // --- GLICKO DIAGNOSTICS LOGIC ---
    window.runDiagnostics = async function() {
        const p1 = document.getElementById('diag-p1-search').value;
        const p2 = document.getElementById('diag-p2-search').value;
        const s1 = document.getElementById('diag-s1').value;
        const s2 = document.getElementById('diag-s2').value;
        const resultsBox = document.getElementById('diag-results');
        const btn = document.getElementById('diag-btn');
        
        if(!p1 || !p2) return alert("Please select both players.");
        
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Calculating...';
        
        try {
            const res = await fetch('/api/admin/glicko_calc', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ p1: p1, p2: p2, s1: s1, s2: s2 })
            });
            const d = await res.json();
            
            if(d.success) {
                const math = d.data;
                const renderPlayerMath = (pData) => {
                    const deltaColor = pData.delta > 0 ? "text-emerald-400" : "text-red-400";
                    const deltaSign = pData.delta > 0 ? "+" : "";
                    return `
                    <div class="bg-slate-800 p-5 rounded-xl border border-white/5 relative">
                        <div class="font-black text-white text-lg mb-4 border-b border-white/10 pb-2">${pData.name}</div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <div class="text-[10px] uppercase font-bold text-slate-500 mb-1">Current Rating</div>
                                <div class="text-xl font-mono text-white">${pData.old_rating} <span class="text-xs text-slate-500">(±${pData.old_rd})</span></div>
                            </div>
                            <div>
                                <div class="text-[10px] uppercase font-bold text-slate-500 mb-1">Expected Win %</div>
                                <div class="text-xl font-mono text-sky-400">${pData.expected_win_pct}%</div>
                            </div>
                        </div>
                        <div class="mt-4 pt-4 border-t border-white/10 flex justify-between items-center bg-black/20 p-3 rounded-lg">
                            <div class="text-[10px] uppercase font-bold text-slate-500">Calculated Shift</div>
                            <div class="text-2xl font-black font-mono ${deltaColor}">${deltaSign}${pData.delta} pts</div>
                        </div>
                        <div class="text-center mt-3">
                            <span class="text-[10px] uppercase text-slate-500 font-bold">Resulting Rating: </span>
                            <span class="text-white font-mono font-bold">${pData.new_rating}</span>
                        </div>
                    </div>`;
                };

                resultsBox.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${renderPlayerMath(math.p1)}
                        ${renderPlayerMath(math.p2)}
                    </div>
                `;
                resultsBox.classList.remove('hidden');
            }
        } catch(e) { alert("Network Error"); } finally {
            btn.innerHTML = '<i class="fa-solid fa-microchip"></i> Run Simulation';
        }
    };

    // --- DATE ERROR & SMART BULK FIX LOGIC ---
    window.loadDateErrors = async function() {
        const dList = document.getElementById('dateErrorsList');
        const dBadge = document.getElementById('date-badge');
        if(!dList) return;
        dList.innerHTML = '<div class="text-center py-10 text-orange-500"><i class="fa-solid fa-spinner fa-spin text-2xl"></i></div>';
        
        try {
            const res = await fetch('/api/admin/date_errors');
            const errors = await res.json();
            
            if(dBadge) { dBadge.innerText = errors.length; errors.length > 0 ? dBadge.classList.remove('hidden') : dBadge.classList.add('hidden'); }
            
            if(errors.length === 0) {
                dList.innerHTML = '<div class="text-slate-600 text-center py-10 italic">Awesome! No missing dates found.</div>';
                return;
            }
            
            let html = "";
            errors.forEach(m => {
                html += `
                <div id="date-card-${m.id}" class="date-card bg-slate-800 p-4 rounded-xl border border-white/5 flex flex-col md:flex-row justify-between items-center gap-4 shadow-lg mb-3" data-season="${m.season}" data-div="${m.division}" data-week="${m.week}">
                    <div class="flex-1 w-full">
                        <div class="flex flex-wrap gap-2 items-center mb-2">
                            <span class="bg-red-900/30 text-red-400 border border-red-500/20 text-[10px] font-bold tracking-widest px-2 py-0.5 rounded">NO DATE</span>
                            <span class="bg-indigo-900/30 text-indigo-400 border border-indigo-500/20 text-[10px] font-bold tracking-widest px-2 py-0.5 rounded shadow-inner"><i class="fa-solid fa-file-excel mr-1"></i>${m.sheet_name} • ROW ${m.row_index}</span>
                            <span class="bg-yellow-900/30 text-yellow-400 border border-yellow-500/20 text-[10px] font-bold tracking-widest px-2 py-0.5 rounded shadow-inner uppercase">${m.division} • WK ${m.week}</span>
                        </div>
                        <div class="font-black text-white text-lg">${m.home_players[0]} <span class="text-slate-500 mx-2 text-sm">vs</span> ${m.away_players[0]}</div>
                    </div>
                    <div class="flex items-center gap-3 bg-black/30 p-3 rounded-xl border border-white/5 shrink-0">
                        <div class="flex flex-col">
                            <span class="text-[8px] text-slate-500 uppercase font-bold mb-1">Fix Date (DD/MM/YYYY)</span>
                            <input type="text" id="fix-date-${m.id}" placeholder="e.g. 14/02/2026" class="w-28 bg-slate-900 border border-white/10 text-white font-bold font-mono text-center rounded py-1 focus:border-orange-500 focus:outline-none text-xs">
                        </div>
                        <button onclick="window.adminBulkDateFix('${m.season}', '${m.division}', '${m.week}', '${m.id}', this)" class="bg-orange-600 hover:bg-orange-500 text-white font-bold py-2 px-4 rounded text-xs transition-transform hover:scale-105 shadow-[0_0_10px_rgba(249,115,22,0.4)] mt-3">FIX</button>
                    </div>
                </div>`;
            });
            dList.innerHTML = html;
        } catch(e) { dList.innerHTML = '<div class="text-red-400 text-center py-10">Error loading date errors.</div>'; }
    };

    window.adminBulkDateFix = async function(season, division, week, id, btnElement) {
        const newDate = document.getElementById(`fix-date-${id}`).value;
        if (!newDate) return alert("Please enter a valid date.");
        
        btnElement.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
        btnElement.disabled = true;
        
        try {
            const res = await fetch('/api/admin/bulk_fix_date', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ season: season, division: division, week: week, date: newDate })
            });
            const data = await res.json();
            
            if(data.success) {
                // Find all cards that share this exact season, division, and week combo
                const allCards = document.querySelectorAll('.date-card');
                let removedCount = 0;
                
                allCards.forEach(card => {
                    if (card.dataset.season === season && card.dataset.div === division && card.dataset.week === week) {
                        card.style.transition = "all 0.3s ease";
                        card.style.opacity = "0";
                        card.style.transform = "translateX(20px)";
                        setTimeout(() => card.remove(), 300);
                        removedCount++;
                    }
                });
                
                const dBadge = document.getElementById('date-badge');
                if(dBadge) {
                    let count = parseInt(dBadge.innerText) || 0;
                    count = Math.max(0, count - removedCount);
                    dBadge.innerText = count;
                    if(count === 0) {
                        dBadge.classList.add('hidden');
                        document.getElementById('dateErrorsList').innerHTML = '<div class="text-slate-600 text-center py-10 italic">Awesome! No missing dates found.</div>';
                    }
                }
            } else { 
                alert("❌ Failed to set bulk date fix."); 
                btnElement.innerHTML = 'FIX'; btnElement.disabled = false;
            }
        } catch(e) { 
            alert("Network Error"); 
            btnElement.innerHTML = 'FIX'; btnElement.disabled = false;
        }
    };

    // Keep regular history edit intact for other tabs
    window.adminSaveHistoryEdit = async function(p1, p2, oldDate, id) {
        const s1 = document.getElementById(`s1-${id}`).value;
        const s2 = document.getElementById(`s2-${id}`).value;
        const newDate = document.getElementById(`date-${id}`).value;
        
        if(!confirm(`OVERRIDE MATCH:\n\nPlayers: ${p1} vs ${p2}\nNew Score: ${s1}-${s2}\nNew Date: ${newDate}\n\nProceed?`)) return;
        
        try {
            const res = await fetch('/api/admin/update_match', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ p1: p1, p2: p2, date: oldDate, s1: s1, s2: s2, new_date: newDate })
            });
            const data = await res.json();
            if(data.success) alert("✅ Update locked in! Data will automatically re-sort into the correct chronological timeline.");
            else alert("❌ Failed to update match.");
        } catch(e) { alert("Network Error"); }
    };

    // --- OTHER ADMIN FUNCTIONS (Chat, Notices, Audit, etc) ---
    window.loadAdminChat = async function() {
        const list = document.getElementById('adminChatList');
        if(!list) return;
        try {
            const res = await fetch('/api/admin/messages');
            const messages = await res.json();
            if(messages.length === 0) { list.innerHTML = '<div class="text-slate-500 text-center py-8 italic">No notes yet.</div>'; return; }
            list.innerHTML = messages.map(m => `
                <div class="bg-slate-900/50 p-4 rounded-lg border border-white/5 relative">
                    <div class="flex justify-between items-center mb-2 border-b border-white/5 pb-2">
                        <span class="text-xs font-bold text-indigo-400"><i class="fa-solid fa-user-shield mr-1"></i>${m.author}</span>
                        <span class="text-[10px] text-slate-500 font-mono">${m.time_str}</span>
                    </div>
                    <div class="text-sm text-slate-300 whitespace-pre-wrap">${m.message}</div>
                </div>
            `).join('');
        } catch(e) { console.error(e); }
    };

    window.postAdminMessage = async function() {
        const input = document.getElementById('admin-chat-input');
        const msg = input.value.trim();
        if(!msg) return;
        
        try {
            const res = await fetch('/api/admin/add_message', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: msg }) });
            const data = await res.json();
            if(data.success) { input.value = ''; window.loadAdminChat(); } 
            else alert("Failed to post message.");
        } catch(e) { alert("Network Error"); }
    };

    window.loadAdminNotices = async function() {
        const list = document.getElementById('adminNoticesList');
        if(!list) return;
        try {
            const res = await fetch('/api/notices');
            const notices = await res.json();
            if(notices.length === 0) { list.innerHTML = '<div class="text-slate-600 text-center py-10 italic">No active notices.</div>'; return; }
            list.innerHTML = notices.map(n => {
                let badgeColor = 'bg-slate-700 text-slate-300';
                if(n.type === 'Update') badgeColor = 'bg-sky-500/20 text-sky-400 border border-sky-500/30';
                if(n.type === 'Event') badgeColor = 'bg-yellow-500/20 text-yellow-400 border border-yellow-500/30';
                if(n.type === 'Alert') badgeColor = 'bg-red-500/20 text-red-400 border border-red-500/30';
                return `
                <div class="bg-slate-800 p-4 rounded-xl border border-white/5 flex justify-between items-start gap-4">
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-widest ${badgeColor}">${n.type}</span>
                            <span class="text-xs text-slate-500 font-mono">${n.date_str}</span>
                        </div>
                        <h4 class="text-white font-bold text-lg leading-tight mb-2">${n.title}</h4>
                        <p class="text-sm text-slate-400 line-clamp-2">${n.message}</p>
                    </div>
                    <button onclick="window.deleteNotice('${n.id}')" class="bg-red-900/30 hover:bg-red-600 text-red-500 hover:text-white border border-red-500/20 px-3 py-2 rounded-lg transition-colors shrink-0"><i class="fa-solid fa-trash"></i></button>
                </div>`;
            }).join('');
        } catch(e) {}
    };

    window.submitNotice = async function() {
        const title = document.getElementById('notice-title').value;
        const type = document.getElementById('notice-type').value;
        const msg = document.getElementById('notice-message').value;
        if(!title || !msg) return alert("Title and Message are required.");
        
        try {
            const res = await fetch('/api/admin/add_notice', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title: title, type: type, message: msg }) });
            const data = await res.json();
            if(data.success) { document.getElementById('notice-title').value = ''; document.getElementById('notice-message').value = ''; window.loadAdminNotices(); alert("✅ Notice posted to public site!"); } 
            else alert("❌ Failed to post notice.");
        } catch(e) { alert("Network Error"); }
    };

    window.deleteNotice = async function(id) {
        if(!confirm("Remove this notice from the public site?")) return;
        try {
            const res = await fetch('/api/admin/delete_notice', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ notice_id: id }) });
            const data = await res.json();
            if(data.success) window.loadAdminNotices(); else alert("Failed to delete notice.");
        } catch(e) {}
    };

    window.loadTrafficStats = async function() {
        const viewsEl = document.getElementById('dash-traffic-views');
        const uniquesEl = document.getElementById('dash-traffic-uniques');
        if(!viewsEl || !uniquesEl) return;
        try {
            const res = await fetch('/api/admin/traffic');
            const data = await res.json();
            viewsEl.innerText = data.views; uniquesEl.innerText = data.uniques;
        } catch(e) {}
    };

    window.loadAuditLogs = async function() {
        const list = document.getElementById('auditLogList');
        if(!list) return;
        try {
            const res = await fetch('/api/admin/audit_logs');
            const logs = await res.json();
            if(logs.length === 0) { list.innerHTML = '<div class="text-slate-500 py-10 text-center italic">No actions recorded yet.</div>'; return; }
            let html = '';
            logs.forEach(l => {
                const isUndone = l.status === 'undone';
                const bgClass = isUndone ? 'bg-slate-800/30 border-dashed opacity-50' : 'bg-slate-800';
                const undoBtn = (!isUndone && !['MERGE_PLAYER', 'ADD_NOTICE', 'DELETE_NOTICE', 'SET_FORMAT', 'FORCE_REFRESH'].includes(l.action)) ? `<button onclick="window.undoAction('${l.id}')" class="text-[10px] bg-red-600 hover:bg-red-500 text-white font-bold px-2 py-1 rounded transition ml-auto shadow">UNDO</button>` : '';
                html += `
                <div class="${bgClass} border border-white/5 p-3 rounded-lg flex flex-col md:flex-row md:items-center gap-3">
                    <div class="flex flex-col gap-1">
                        <div class="flex items-center gap-2"><span class="text-[9px] bg-slate-700 text-white px-2 py-0.5 rounded uppercase font-bold tracking-widest">${l.action}</span><span class="text-[10px] text-slate-400 font-mono">${l.time_str}</span></div>
                        <div class="text-sm font-bold text-white">${l.description}</div>
                        <div class="text-[10px] text-slate-500">Authorized by: <span class="text-slate-300">${l.admin}</span></div>
                    </div>
                    ${undoBtn}
                    ${isUndone ? `<div class="ml-auto text-[10px] text-red-500 font-bold uppercase tracking-widest border border-red-500/30 px-2 py-1 rounded bg-red-900/20">REVERSED BY ${l.undone_by}</div>` : ''}
                </div>`;
            });
            list.innerHTML = html;
        } catch(e) {}
    };

    window.undoAction = async function(logId) {
        if(!confirm("Are you sure you want to completely reverse this action?")) return;
        try {
            const res = await fetch('/api/admin/undo_action', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({log_id: logId}) });
            const data = await res.json();
            if(data.success) { alert("✅ Action successfully undone!"); window.loadAuditLogs(); } else { alert("❌ Failed to undo action."); }
        } catch(e) {}
    };

    window.loadAdminUsers = async function() {
        const list = document.getElementById('adminUsersList');
        if(!list) return;
        try {
            const res = await fetch('/api/admin/users');
            const users = await res.json();
            let html = '';
            users.forEach(u => {
                const isPending = u.role === 'pending';
                const roleBadge = isPending ? '<span class="text-yellow-500 bg-yellow-900/30 border border-yellow-500/30 px-2 py-0.5 rounded text-[9px] uppercase font-bold">Pending</span>' : `<span class="text-blue-400 bg-blue-900/30 border border-blue-500/30 px-2 py-0.5 rounded text-[9px] uppercase font-bold">${u.role}</span>`;
                let actions = '';
                if(u.role !== 'super_admin') {
                    if(isPending) {
                        actions = `<button onclick="window.manageUser('${u.email}', 'approve')" class="text-green-500 hover:text-green-400 text-sm"><i class="fa-solid fa-check"></i></button>
                                   <button onclick="window.manageUser('${u.email}', 'delete')" class="text-red-500 hover:text-red-400 text-sm"><i class="fa-solid fa-trash"></i></button>`;
                    } else {
                        actions = `<button onclick="window.manageUser('${u.email}', 'revoke')" class="text-red-400 hover:text-red-300 text-[10px] font-bold uppercase border border-red-500/30 px-2 py-1 rounded">Revoke Access</button>`;
                    }
                }
                html += `<div class="bg-black/30 border border-white/5 p-3 rounded-lg flex items-center justify-between"><div><div class="text-sm font-bold text-white mb-1 truncate max-w-[150px] md:max-w-xs" title="${u.email}">${u.email}</div>${roleBadge}</div><div class="flex items-center gap-3">${actions}</div></div>`;
            });
            list.innerHTML = html;
        } catch(e) {}
    }

    window.manageUser = async function(email, action) {
        if(!confirm(`Are you sure you want to ${action} access for ${email}?`)) return;
        try {
            const res = await fetch('/api/admin/approve_user', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email: email, action: action}) });
            const data = await res.json();
            if(data.success) window.loadAdminUsers();
        } catch(e) {}
    }

</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, onSnapshot, doc, deleteDoc, updateDoc, getDoc, getDocs, setDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDq05wFsKLHtt8G0Z5yLOG9pIk9UX24S4o", authDomain: "gctta-stats-live.firebaseapp.com", projectId: "gctta-stats-live", storageBucket: "gctta-stats-live.firebasestorage.app", messagingSenderId: "1070856258556", appId: "1:1070856258556:web:be438e04c1941abc3c6879" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.setFormatOverride = async function(fixtureId, formatType) {
        try {
            const res = await fetch('/api/admin/set_fixture_format', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fixture_id: fixtureId, format_type: formatType })
            });
            const data = await res.json();
            if(!data.success) alert("Failed to save format override.");
        } catch(e) { console.error("Network error saving format."); }
    };

    try {
        onSnapshot(query(collection(db, "fixture_schedule")), (snapshot) => {
            const liveList = document.getElementById("live-list");
            const scheduledList = document.getElementById("scheduled-list");
            let liveCount = 0;
            let liveHtml = "";
            let schedHtml = "";
            
            snapshot.forEach((doc) => {
                const m = doc.data();
                const id = doc.id;
                
                const p1 = (m.home_players && m.home_players.length > 0) ? m.home_players[0] : m.home_team;
                const p2 = (m.away_players && m.away_players.length > 0) ? m.away_players[0] : m.away_team;
                
                if (m.match_status === "Live" || m.match_status === "Paused" || m.live_home_score > 0 || m.live_away_score > 0) {
                    liveCount++;
                    const s1 = m.live_home_sets || 0;
                    const s2 = m.live_away_sets || 0;
                    
                    liveHtml += `
                    <div class="bg-slate-800 p-5 rounded-xl border border-blue-500/30 shadow-lg relative overflow-hidden mb-4">
                        <div class="absolute top-0 right-0 bg-blue-500 text-white text-[9px] font-black uppercase tracking-widest px-3 py-1 rounded-bl-lg animate-pulse">ACTIVE NOW</div>
                        <div class="flex justify-between items-center mb-3 mt-1">
                            <span class="text-xs text-slate-400 font-mono">Table ${m.table} • ${m.division}</span>
                        </div>
                        <div class="text-xl font-black text-white mb-4">${p1} <span class="text-slate-500 mx-2 text-sm">vs</span> ${p2}</div>
                        
                        <div class="flex items-center gap-4 bg-black/40 p-4 rounded-xl border border-white/5 mb-4 shadow-inner">
                            <div class="text-xs text-slate-400 font-bold uppercase tracking-widest">Adjust Final Score:</div>
                            <input type="number" id="live-s1-${id}" value="${s1}" class="w-14 bg-slate-900 border border-white/10 text-white font-bold font-mono text-center rounded py-2 focus:border-blue-500 outline-none text-lg">
                            <span class="text-slate-500 font-black">-</span>
                            <input type="number" id="live-s2-${id}" value="${s2}" class="w-14 bg-slate-900 border border-white/10 text-white font-bold font-mono text-center rounded py-2 focus:border-blue-500 outline-none text-lg">
                        </div>
                        
                        <div class="flex gap-3">
                            <button onclick="window.forceFinishLive('${id}', '${p1.replace(/'/g, "\\'")}', '${p2.replace(/'/g, "\\'")}')" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 rounded-lg text-sm transition-transform hover:scale-[1.02] shadow-[0_0_15px_rgba(37,99,235,0.4)] flex items-center justify-center gap-2"><i class="fa-solid fa-flag-checkered"></i> Force Finish</button>
                            <button onclick="window.wipeLiveMatch('${id}')" class="bg-red-900/50 hover:bg-red-600 text-red-400 hover:text-white border border-red-500/30 font-bold py-2.5 px-4 rounded-lg text-sm transition-colors" title="Wipe Error"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>`;
                } 
                else if (m.match_status === "Scheduled" || !m.match_status) {
                    const formatVal = m.format_override || "Auto";
                    schedHtml += `
                    <div class="bg-slate-800/80 p-4 rounded-xl border border-white/5 shadow relative">
                        <div class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-1 border-b border-white/5 pb-1 flex justify-between">
                            <span>Table ${m.table}</span>
                            <span class="text-blue-400">${m.division}</span>
                        </div>
                        <div class="font-bold text-white text-sm mt-2">${m.home_team} <br><span class="text-slate-500 text-xs font-normal">vs</span><br> ${m.away_team}</div>
                        
                        <div class="mt-4 pt-3 border-t border-white/5">
                            <label class="block text-[9px] text-slate-500 uppercase font-bold mb-1">Match Format</label>
                            <select onchange="window.setFormatOverride('${id}', this.value)" class="w-full bg-slate-900 border border-white/10 text-slate-300 font-bold text-xs rounded py-2 px-2 focus:border-blue-500 outline-none">
                                <option value="Auto" ${formatVal === 'Auto' ? 'selected' : ''}>Auto-Detect</option>
                                <option value="2v2" ${formatVal === '2v2' ? 'selected' : ''}>Force 2v2 (5 Matches)</option>
                                <option value="3v3" ${formatVal === '3v3' ? 'selected' : ''}>Force 3v3 (11 Matches)</option>
                            </select>
                        </div>
                    </div>`;
                }
            });
            
            if(liveList) liveList.innerHTML = liveHtml || '<div class="col-span-1 md:col-span-2 text-slate-500 text-center py-10 italic border border-white/5 rounded-xl bg-slate-800/30">No matches currently active.</div>';
            if(scheduledList) scheduledList.innerHTML = schedHtml || '<div class="col-span-1 md:col-span-3 text-slate-500 text-center py-10 italic border border-white/5 rounded-xl bg-slate-800/30">No scheduled matches pending.</div>';
            
            const countDisplay = document.getElementById("liveMatchCount");
            if (countDisplay) countDisplay.innerText = liveCount;
        });
    } catch(e) {}

    window.forceFinishLive = async function(id, p1, p2) {
        const s1 = document.getElementById(`live-s1-${id}`).value;
        const s2 = document.getElementById(`live-s2-${id}`).value;
        if(!confirm(`FORCE FINISH MATCH:\n\n${p1} vs ${p2}\nFinal Score: ${s1} - ${s2}\n\nThis will submit the match to history and clear it from the iPad. Proceed?`)) return;
        
        try {
            const res = await fetch('/api/admin/force_finish_live', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id, s1: s1, s2: s2 })
            });
            const data = await res.json();
            if(data.success) alert("✅ Match forced finished and successfully submitted to history!");
            else alert("❌ Error finishing match.");
        } catch(e) { alert("Network Error"); }
    };

    window.wipeLiveMatch = async function(id) {
        if(!confirm(`WIPE MATCH:\n\nAre you sure you want to completely erase this match and reset the iPad to Scheduled?`)) return;
        try {
            const res = await fetch('/api/admin/wipe_live', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id })
            });
            const data = await res.json();
            if(data.success) alert("🗑️ Match wiped successfully!");
            else alert("❌ Error wiping match.");
        } catch(e) { alert("Network Error"); }
    };

    try {
        const migrationRef = collection(db, "Migration_Review");
        onSnapshot(migrationRef, (snapshot) => {
            const list = document.getElementById("migration-list");
            const countBadge = document.getElementById("review-count");
            if(!list) return;

            list.innerHTML = "";
            if(countBadge) countBadge.innerText = snapshot.size;

            if(snapshot.empty) {
                list.innerHTML = `<div class="text-center text-slate-500 py-10 italic border border-white/5 rounded-lg bg-slate-900/50">Queue Empty.</div>`;
                return;
            }

            snapshot.forEach(docSnap => {
                const m = docSnap.data();
                const id = docSnap.id;
                const p1 = m.home_players?.[0] || m.raw_p1 || "";
                const p2 = m.away_players?.[0] || m.raw_p2 || "";
                
                const card = document.createElement("div");
                card.className = "bg-slate-800 p-4 rounded-lg border border-white/10 flex flex-col md:flex-row gap-4 items-center animate-fade-in mb-3 shadow-lg";
                card.innerHTML = `
                    <div class="flex-1 w-full">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-xs font-bold text-red-400 bg-red-900/30 px-2 py-1 rounded border border-red-500/20 uppercase">${m.issues ? m.issues.join(", ") : "Issue"}</span>
                            <span class="text-xs text-slate-500 font-mono border border-white/10 px-2 py-1 rounded">${m.season}</span>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-2">
                            <input type="text" id="p1-${id}" value="${p1}" class="w-full bg-black/30 border border-white/10 rounded px-3 py-2 text-white text-sm">
                            <input type="text" id="p2-${id}" value="${p2}" class="w-full bg-black/30 border border-white/10 rounded px-3 py-2 text-white text-sm">
                        </div>
                        <div class="flex items-center gap-2">
                            <input type="number" id="s1-${id}" value="${m.live_home_sets}" class="w-16 bg-black/30 border border-white/10 rounded px-2 py-1 text-white text-sm text-center">
                            <span class="text-slate-500 font-bold">-</span>
                            <input type="number" id="s2-${id}" value="${m.live_away_sets}" class="w-16 bg-black/30 border border-white/10 rounded px-2 py-1 text-white text-sm text-center">
                        </div>
                    </div>
                    <div class="flex flex-row md:flex-col gap-2 w-full md:w-32 border-t md:border-t-0 md:border-l border-white/5 pt-3 md:pt-0 md:pl-3">
                        <button onclick="window.approveMigration('${id}')" class="bg-green-600 hover:bg-green-500 text-white font-bold py-2 px-4 rounded text-sm flex-1 transition-colors shadow-lg"><i class="fa-solid fa-check mr-1"></i> Fix</button>
                        <button onclick="window.denyMigration('${id}')" class="bg-red-600 hover:bg-red-500 text-white font-bold py-2 px-4 rounded text-sm flex-1 transition-colors shadow-lg"><i class="fa-solid fa-trash mr-1"></i> Drop</button>
                    </div>
                `;
                list.appendChild(card);
            });
        });
    } catch(e) {}
</script>
