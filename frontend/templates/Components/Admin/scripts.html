<script>
    console.log("✅ Admin UI Script Loaded");

    window.switchAdminTab = function(tabId) {
        // 1. Hide all Tabs
        ['pending', 'live', 'approved', 'migration'].forEach(t => {
            const section = document.getElementById(`admin-${t}`);
            if (section) section.classList.add('hidden');
            
            const btn = document.getElementById(`tab-btn-${t}`);
            if (btn) btn.className = "px-6 py-4 font-bold text-sm text-slate-400 hover:text-white transition-all flex items-center gap-2 border-b-2 border-transparent cursor-pointer";
        });
        
        // 2. Show Target Tab
        const targetSection = document.getElementById(`admin-${tabId}`);
        if (targetSection) targetSection.classList.remove('hidden');
        
        const targetBtn = document.getElementById(`tab-btn-${tabId}`);
        if (targetBtn) targetBtn.className = "px-6 py-4 font-bold text-sm text-yellow-500 border-b-2 border-yellow-500 transition-all flex items-center gap-2 cursor-pointer";

        // 3. Toggle Dashboard Stats (Hide on Migration Tab)
        const dashboard = document.getElementById('admin-dashboard-stats');
        if (dashboard) {
            if (tabId === 'migration') {
                dashboard.style.display = 'none';
            } else {
                dashboard.style.display = 'grid'; // Restore grid layout
            }
        }
    };

    window.refreshMigration = function() {
        const list = document.getElementById("migration-list");
        if(list) list.innerHTML = '<div class="text-center text-slate-500 py-10 animate-pulse">Refreshing data...</div>';
    };
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, onSnapshot, doc, deleteDoc, updateDoc, getDoc, setDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDq05wFsKLHtt8G0Z5yLOG9pIk9UX24S4o", authDomain: "gctta-stats-live.firebaseapp.com", projectId: "gctta-stats-live", storageBucket: "gctta-stats-live.firebasestorage.app", messagingSenderId: "1070856258556", appId: "1:1070856258556:web:be438e04c1941abc3c6879" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    console.log("✅ Admin Firebase Module Loaded");

    // --- LIVE CONTROL ---
    try {
        onSnapshot(query(collection(db, "fixture_schedule")), (snapshot) => {
            const liveList = document.getElementById("live-matches-list");
            let liveCount = 0;
            snapshot.forEach((doc) => {
                const m = doc.data();
                if (m.match_status === "Live" || (m.live_home_score > 0 || m.live_away_score > 0)) liveCount++;
            });
            const countDisplay = document.getElementById("liveMatchCount");
            if (countDisplay) countDisplay.innerText = liveCount;
        });
    } catch(e) { console.error("Live Control Error:", e); }

    // --- MIGRATION LOGIC ---
    try {
        onSnapshot(doc(db, "Admin_State", "terminal"), (docSnap) => {
            if(docSnap.exists()) {
                const data = docSnap.data();
                const term = document.getElementById("migration-terminal");
                if(term) {
                    const line = document.createElement("div");
                    line.className = "text-green-400 mb-1 border-b border-white/5 pb-1 font-mono text-xs break-all";
                    line.innerText = `> ${data.log_line}`;
                    term.appendChild(line);
                    term.scrollTop = term.scrollHeight;
                }
            }
        });
    } catch(e) {}

    try {
        const migrationRef = collection(db, "Migration_Review");
        onSnapshot(migrationRef, (snapshot) => {
            const list = document.getElementById("migration-list");
            const countBadge = document.getElementById("review-count");
            if(!list) return;

            list.innerHTML = "";
            if(countBadge) countBadge.innerText = snapshot.size;

            if(snapshot.empty) {
                list.innerHTML = `<div class="text-center text-slate-500 py-10 italic border border-white/5 rounded-lg bg-slate-900/50">Queue Empty.</div>`;
                return;
            }

            snapshot.forEach(docSnap => {
                const m = docSnap.data();
                const id = docSnap.id;
                const p1 = m.home_players?.[0] || m.raw_p1 || "";
                const p2 = m.away_players?.[0] || m.raw_p2 || "";
                
                const card = document.createElement("div");
                card.className = "bg-slate-800 p-4 rounded-lg border border-white/10 flex flex-col md:flex-row gap-4 items-center animate-fade-in mb-3 shadow-lg";
                card.innerHTML = `
                    <div class="flex-1 w-full">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-xs font-bold text-red-400 bg-red-900/30 px-2 py-1 rounded border border-red-500/20 uppercase">${m.issues ? m.issues.join(", ") : "Issue"}</span>
                            <span class="text-xs text-slate-500 font-mono border border-white/10 px-2 py-1 rounded">${m.season}</span>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-2">
                            <input type="text" id="p1-${id}" value="${p1}" class="w-full bg-black/30 border border-white/10 rounded px-3 py-2 text-white text-sm">
                            <input type="text" id="p2-${id}" value="${p2}" class="w-full bg-black/30 border border-white/10 rounded px-3 py-2 text-white text-sm">
                        </div>
                        <div class="flex items-center gap-2">
                            <input type="number" id="s1-${id}" value="${m.live_home_sets}" class="w-16 bg-black/30 border border-white/10 rounded px-2 py-1 text-white text-sm text-center">
                            <span class="text-slate-500 font-bold">-</span>
                            <input type="number" id="s2-${id}" value="${m.live_away_sets}" class="w-16 bg-black/30 border border-white/10 rounded px-2 py-1 text-white text-sm text-center">
                        </div>
                    </div>
                    <div class="flex flex-row md:flex-col gap-2 w-full md:w-32 border-t md:border-t-0 md:border-l border-white/5 pt-3 md:pt-0 md:pl-3">
                        <button onclick="window.approveMigration('${id}')" class="bg-green-600 hover:bg-green-500 text-white font-bold py-2 px-4 rounded text-sm flex-1 transition-colors shadow-lg"><i class="fa-solid fa-check mr-1"></i> Fix</button>
                        <button onclick="window.denyMigration('${id}')" class="bg-red-600 hover:bg-red-500 text-white font-bold py-2 px-4 rounded text-sm flex-1 transition-colors shadow-lg"><i class="fa-solid fa-trash mr-1"></i> Drop</button>
                    </div>
                `;
                list.appendChild(card);
            });
        });
    } catch(e) {}

    // ACTIONS
    window.stopMigration = async () => {
        if(confirm("STOP MIGRATION? This will halt the script immediately.")) {
            try {
                await setDoc(doc(db, "Admin_State", "migration_control"), { status: "STOP" });
                alert("🛑 STOP SIGNAL SENT. The script will terminate in a few seconds.");
            } catch(e) { alert("Error sending stop signal: " + e.message); }
        }
    };

    window.approveMigration = async (id) => {
        try {
            const p1 = document.getElementById(`p1-${id}`).value;
            const p2 = document.getElementById(`p2-${id}`).value;
            const s1 = parseInt(document.getElementById(`s1-${id}`).value);
            const s2 = parseInt(document.getElementById(`s2-${id}`).value);
            const docRef = doc(db, "Migration_Review", id);
            const snap = await getDoc(docRef);
            if (!snap.exists()) return;
            const data = snap.data();
            const players = [p1.toLowerCase(), p2.toLowerCase()].sort();
            const dateObj = data.timestamp ? data.timestamp.toDate() : new Date();
            const dateStr = dateObj.toISOString().split('T')[0].replace(/-/g,''); 
            const matchId = `${dateStr}_${players[0]}_${players[1]}`;
            await setDoc(doc(db, "Archived_Seasons", matchId), {
                ...data, home_players: [p1], away_players: [p2], live_home_sets: s1, live_away_sets: s2, match_status: "Finished", fixed_by_admin: true
            });
            await deleteDoc(docRef);
        } catch(e) { console.error(e); }
    };

    window.denyMigration = async (id) => {
        if(confirm("Delete row?")) await deleteDoc(doc(db, "Migration_Review", id));
    };
</script>
