<script>
    console.log("✅ Admin UI Script Loaded");

    window.forceRefresh = async function() {
        if(!confirm("Force the server to pull the latest data from the Master Google Sheet? This may take a few seconds.")) return;
        const btn = event.currentTarget || document.querySelector('button[onclick="window.forceRefresh()"]');
        const originalHtml = btn ? btn.innerHTML : "FORCE REFRESH";
        if(btn) { btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> SYNCING...'; btn.disabled = true; }
        
        try {
            const res = await fetch('/api/refresh', { method: 'POST' });
            const data = await res.json();
            if(data.success || data.status === "Refreshed") { alert("✅ Data successfully synced with Google Sheets!"); window.location.reload(); } 
            else { alert("❌ Sync failed."); }
        } catch(e) { alert("❌ Network Error connecting to server."); } 
        finally { if(btn) { btn.innerHTML = originalHtml; btn.disabled = false; } }
    };

    window.switchAdminTab = function(tabId) {
        ['live', 'approved', 'inbox-match', 'inbox-feedback', 'date-errors', 'players', 'history', 'migration', 'audit', 'notices', 'chat', 'diagnostics', 'broadcast', 'donations'].forEach(t => {
            const section = document.getElementById(`admin-${t}`);
            if (section) section.classList.add('hidden');
            const btn = document.getElementById(`tab-btn-${t}`);
            if (btn) btn.className = "px-6 py-4 font-bold text-sm text-slate-400 hover:text-white transition-all flex items-center gap-2 border-b-2 border-transparent cursor-pointer whitespace-nowrap";
        });
        
        const targetSection = document.getElementById(`admin-${tabId}`);
        if (targetSection) targetSection.classList.remove('hidden');
        
        const targetBtn = document.getElementById(`tab-btn-${tabId}`);
        if (targetBtn) {
            let activeColor = tabId === 'donations' ? 'text-emerald-500' : 'text-yellow-500';
            let activeBorder = tabId === 'donations' ? 'border-emerald-500' : 'border-yellow-500';
            targetBtn.className = `px-6 py-4 font-bold text-sm ${activeColor} border-b-2 ${activeBorder} transition-all flex items-center gap-2 cursor-pointer whitespace-nowrap`;
        }

        if (tabId === 'inbox-match' || tabId === 'inbox-feedback') window.loadPendingReports();
        if (tabId === 'date-errors') window.loadDateErrors();
        if (tabId === 'notices') window.loadAdminNotices();
        if (tabId === 'chat') window.loadAdminChat();
        if (tabId === 'donations') window.loadDonations();
        
        if (tabId === 'history') {
            const histDivFilter = document.getElementById('hist-div-filter');
            if (histDivFilter && histDivFilter.options.length <= 1) {
                fetch('/api/divisions').then(r=>r.json()).then(divs => {
                    divs.forEach(d => { histDivFilter.innerHTML += `<option value="${d}">${d}</option>`; });
                }).catch(e=>console.error(e));
            }
        }
        
        if (['players', 'diagnostics'].includes(tabId) && playerDirectoryData.length === 0) window.loadPlayerDirectory();
        if (tabId === 'players') window.loadChaosConfig();
        if (tabId === 'audit') { window.loadAuditLogs(); window.loadAdminUsers(); window.loadTrafficStats(); }
    };

    let playerDirectoryData = [];
    window.loadPlayerDirectory = async function() {
        try { const res = await fetch('/api/admin/player_directory'); playerDirectoryData = await res.json(); } catch(e) {}
    }

    // --- CHAOS MODE MULTI-SIG LOGIC ---
    window.loadChaosConfig = async function() {
        try {
            const res = await fetch('/api/admin/chaos_config');
            const data = await res.json();
            
            const req = data.req || 3;
            const current = data.approvals ? data.approvals.length : 0;
            const pct = Math.min(100, (current / req) * 100);
            
            document.getElementById('chaos-vote-count').innerText = `${current}/${req}`;
            document.getElementById('chaos-progress-bar').style.width = `${pct}%`;
            
            if (data.approvals && data.approvals.length > 0) {
                document.getElementById('chaos-voters-list').innerText = `Voters: ${data.approvals.join(', ')}`;
            } else {
                document.getElementById('chaos-voters-list').innerText = "Waiting for signatures...";
            }
            
            if (data.weeks && data.weeks.length > 0) {
                document.getElementById('chaos-weeks').value = data.weeks.join(', ');
            }
            
            const banner = document.getElementById('chaos-status-banner');
            if (data.active) {
                banner.className = "bg-red-900/30 border border-red-500/30 text-red-400 px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-2 mb-4 animate-pulse";
                banner.innerHTML = '<i class="fa-solid fa-fire"></i> CHAOS MODE ARMED & ACTIVE';
                document.getElementById('chaos-progress-bar').classList.remove('bg-red-500');
                document.getElementById('chaos-progress-bar').classList.add('bg-red-500', 'shadow-[0_0_10px_rgba(239,68,68,0.8)]');
            } else {
                banner.className = "bg-green-900/30 border border-green-500/30 text-green-400 px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-2 mb-4";
                banner.innerHTML = '<i class="fa-solid fa-lock"></i> Anti-Riot is ON (Default Safe Mode)';
            }
        } catch(e) { console.error("Error loading chaos config"); }
    }
    
    window.castChaosVote = async function() {
        const weeksRaw = document.getElementById('chaos-weeks').value;
        if (!weeksRaw) return alert("You must specify which weeks to apply Chaos Mode to.");
        
        const weeks = weeksRaw.split(',').map(w => w.trim()).filter(w => w.length > 0);
        
        if (!confirm(`Are you sure you want to authorize Chaos Mode for: ${weeks.join(', ')}?\n\nIf enough admins approve, players WILL be able to lose points for winning closely.`)) return;
        
        try {
            const res = await fetch('/api/admin/chaos_vote', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ weeks: weeks })
            });
            const data = await res.json();
            if(data.success) {
                window.loadChaosConfig();
            } else {
                alert("Failed to record signature.");
            }
        } catch(e) { alert("Network Error"); }
    };
    
    window.clearChaosVotes = async function() {
        if (!confirm("Are you sure you want to revoke all approvals and restore the Anti-Riot lock globally?")) return;
        try {
            const res = await fetch('/api/admin/chaos_clear', { method: 'POST' });
            const data = await res.json();
            if(data.success) {
                document.getElementById('chaos-weeks').value = '';
                window.loadChaosConfig();
            }
        } catch(e) { alert("Network Error"); }
    };

    function attachPlayerSearch(inputId, suggId, hiddenId = null) {
        const input = document.getElementById(inputId); const sugg = document.getElementById(suggId);
        if(!input || !sugg) return;
        input.addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            if(q.length < 1) { sugg.classList.add('hidden'); return; }
            const matches = playerDirectoryData.filter(p => p.name.toLowerCase().includes(q));
            if(matches.length === 0) { sugg.innerHTML = '<div class="px-3 py-2 text-slate-400 text-xs italic">No players found</div>'; sugg.classList.remove('hidden'); return; }
            sugg.innerHTML = matches.slice(0, 8).map(p => `<div class="px-4 py-2 hover:bg-blue-600/30 cursor-pointer text-sm text-white font-bold border-b border-white/5 last:border-0 transition-colors" onclick="document.getElementById('${inputId}').value = '${p.name.replace(/'/g, "\\'")}'; ${hiddenId ? `document.getElementById('${hiddenId}').value = '${p.id}';` : ''} document.getElementById('${suggId}').classList.add('hidden');">${p.name} <span class="text-[10px] text-slate-500 font-normal ml-2 font-mono">${p.id}</span></div>`).join('');
            sugg.classList.remove('hidden');
        });
        document.addEventListener('click', (e) => { if(e.target !== input && e.target !== sugg) sugg.classList.add('hidden'); });
    }

    document.addEventListener('DOMContentLoaded', () => {
        attachPlayerSearch('override-search', 'override-suggestions', 'override-id');
        attachPlayerSearch('merge-bad-search', 'merge-bad-suggestions');
        attachPlayerSearch('merge-good-search', 'merge-good-suggestions');
        attachPlayerSearch('diag-p1-search', 'diag-p1-suggestions');
        attachPlayerSearch('diag-p2-search', 'diag-p2-suggestions');
    });

    window.submitRatingOverride = async function() {
        const id = document.getElementById('override-id').value; const rating = document.getElementById('override-score').value; const isRetro = document.getElementById('override-retro').checked;
        if(!id || !rating) return alert("Please select a player and provide a rating.");
        try {
            const res = await fetch('/api/admin/override_rating', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ player_id: id, rating: rating, retroactive: isRetro }) });
            const data = await res.json();
            if(data.success) { alert(`✅ Successfully applied rating override.`); document.getElementById('override-id').value = ''; document.getElementById('override-search').value = ''; document.getElementById('override-score').value = ''; } 
            else { alert("❌ Error applying rating override."); }
        } catch(e) { alert("Network error."); }
    };
    
    window.bulkSetRatings = async function() {
        if(!confirm("⚠️ Are you sure you want to pull ALL ratings from the 'Ratings crap' sheet and apply them as of today? This will overwrite current ratings and set their RD to 140.")) return;
        
        const btn = document.querySelector('button[onclick="window.bulkSetRatings()"]');
        const originalHtml = btn ? btn.innerHTML : "SET RATINGS";
        if (btn) {
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> PULLING RATINGS...';
            btn.disabled = true;
        }

        try {
            const res = await fetch('/api/admin/bulk_pull_ratings', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({})
            });
            
            const text = await res.text();
            let data;
            try {
                data = JSON.parse(text);
            } catch(err) {
                alert("Server Crash or HTML Response! Response was: " + text.substring(0, 150));
                return;
            }
            
            if(data.success) {
                alert(`✅ Successfully imported ${data.count} ratings from the sheet!`);
                window.loadPlayerDirectory();
            } else {
                alert(`❌ Server Failed: ${data.error}`);
            }
        } catch(e) {
            alert("Network error: " + e.message);
        } finally {
            if (btn) {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        }
    };

    window.submitPlayerMerge = async function() {
        const bad = document.getElementById('merge-bad-search').value; const good = document.getElementById('merge-good-search').value;
        if(!bad || !good) return alert("Please select both names.");
        if(bad.toLowerCase() === good.toLowerCase()) return alert("Names must be different.");
        if(!confirm(`⚠️ DANGER: You are about to PERMANENTLY merge "${bad}" into "${good}". \n\nAll history for "${bad}" will be transferred, and the original profile will be deleted. Are you sure?`)) return;
        try {
            const res = await fetch('/api/admin/merge', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ bad_name: bad, good_name: good }) });
            const data = await res.json();
            if(data.success) { alert(`✅ Successfully merged profiles!`); document.getElementById('merge-bad-search').value = ''; document.getElementById('merge-good-search').value = ''; } 
            else alert("❌ Error merging players.");
        } catch(e) { alert("Network error."); }
    }

    window.searchHistory = async function() {
        const q = document.getElementById('history-search').value.trim();
        const divFilter = document.getElementById('hist-div-filter')?.value || 'All';
        const dateFilter = document.getElementById('hist-date-filter')?.value.trim() || '';
        
        const list = document.getElementById('historyList');
        if(!q && divFilter === 'All' && !dateFilter) return; 
        
        list.innerHTML = '<div class="text-center py-10 text-indigo-500"><i class="fa-solid fa-spinner fa-spin text-2xl"></i></div>';
        
        try {
            const res = await fetch(`/api/admin/history?q=${encodeURIComponent(q)}`);
            let matches = await res.json();
            
            if (divFilter !== 'All') {
                matches = matches.filter(m => m.division.toLowerCase() === divFilter.toLowerCase());
            }
            if (dateFilter) {
                matches = matches.filter(m => m.date.includes(dateFilter));
            }
            
            if(matches.length === 0) { 
                list.innerHTML = '<div class="text-slate-500 text-center py-10 italic">No matches found with those filters.</div>'; 
                return; 
            }
            
            let html = '';
            matches.forEach(m => {
                let gameHistoryHtml = '';
                if (m.game_history) {
                    gameHistoryHtml = `<div class="mt-3 bg-black/30 p-2 rounded border border-white/5 text-center text-xs font-mono text-slate-300">Set Scores: ${m.game_history}</div>`;
                } else if (m.rich_stats && m.rich_stats.total_duration) {
                    gameHistoryHtml = `<div class="mt-3 bg-blue-900/20 p-2 rounded border border-blue-500/20 text-center text-xs text-blue-300"><i class="fa-solid fa-tablet-screen-button"></i> iPad Match • Duration: ${m.rich_stats.total_duration} • Active Time: ${m.rich_stats.play_duration}</div>`;
                }

                html += `
                <div class="bg-black/30 p-4 rounded-xl border border-white/5 mb-3 flex flex-col hover:bg-slate-800 transition-colors">
                    <div class="flex flex-col md:flex-row justify-between items-center gap-4 w-full">
                        <div class="flex-1 w-full">
                            <div class="flex flex-wrap items-center gap-2 mb-1">
                                <span class="bg-slate-800 text-slate-300 px-2 py-0.5 rounded text-[10px] font-mono border border-white/10">ID: ${m.match_id || 'N/A'}</span>
                                <span class="bg-indigo-900/30 text-indigo-400 border border-indigo-500/20 text-[10px] px-2 py-0.5 rounded uppercase font-bold tracking-widest">${m.division}</span>
                            </div>
                            <div class="text-lg font-black text-white">${m.p1} <span class="text-slate-500 mx-2 text-sm">vs</span> ${m.p2}</div>
                        </div>
                        <div class="flex items-center gap-3 bg-slate-900/80 p-3 rounded-xl border border-white/10 w-full md:w-auto shrink-0">
                            <div class="flex flex-col w-14">
                                <span class="text-[8px] text-slate-500 uppercase font-bold mb-1 text-center">Score 1</span>
                                <input type="number" id="s1-${m.id}" value="${m.s1}" class="w-full bg-slate-800 border border-white/10 text-white font-bold font-mono text-center rounded py-1.5 focus:border-indigo-500 outline-none text-sm">
                            </div>
                            <span class="text-slate-600 font-black mt-3">-</span>
                            <div class="flex flex-col w-14">
                                <span class="text-[8px] text-slate-500 uppercase font-bold mb-1 text-center">Score 2</span>
                                <input type="number" id="s2-${m.id}" value="${m.s2}" class="w-full bg-slate-800 border border-white/10 text-white font-bold font-mono text-center rounded py-1.5 focus:border-indigo-500 outline-none text-sm">
                            </div>
                            <div class="flex flex-col w-28 ml-2">
                                <span class="text-[8px] text-slate-500 uppercase font-bold mb-1 text-center">Date</span>
                                <input type="text" id="date-${m.id}" value="${m.date}" class="w-full bg-slate-800 border border-white/10 text-white font-bold font-mono text-center rounded py-1.5 focus:border-indigo-500 outline-none text-sm">
                            </div>
                            <div class="flex flex-col gap-1 ml-2 mt-4">
                                <button onclick="window.adminSaveHistoryEdit('${m.p1.replace(/'/g, "\\'")}', '${m.p2.replace(/'/g, "\\'")}', '${m.date}', '${m.id}')" class="bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1.5 rounded-lg transition shadow-lg flex items-center justify-center"><i class="fa-solid fa-floppy-disk"></i></button>
                                <button onclick="document.getElementById('data-${m.match_id}').classList.toggle('hidden')" class="bg-slate-700 hover:bg-slate-600 text-white px-3 py-1.5 rounded-lg transition shadow-lg flex items-center justify-center" title="View Match Data"><i class="fa-solid fa-chart-simple"></i></button>
                            </div>
                        </div>
                    </div>

                    <div id="data-${m.match_id}" class="hidden w-full mt-4 bg-black/40 border border-white/5 rounded-xl p-4 flex-col gap-3">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="bg-slate-800 p-3 rounded-lg border border-white/5 relative overflow-hidden">
                                <div class="absolute left-0 top-0 bottom-0 w-1 ${m.p1_delta > 0 ? 'bg-green-500' : 'bg-red-500'}"></div>
                                <div class="text-sky-400 font-bold mb-1 border-b border-white/10 pb-1 pl-3">${m.p1}</div>
                                <div class="text-sm text-slate-300 font-mono mt-2 pl-3">Rating: ${Math.round(m.p1_before)} <i class="fa-solid fa-arrow-right text-slate-600 mx-1 text-[10px]"></i> ${Math.round(m.p1_after)} <span class="${m.p1_delta > 0 ? 'text-green-400' : 'text-red-400'} ml-1 text-xs">(${m.p1_delta > 0 ? '+' : ''}${Math.round(m.p1_delta)})</span></div>
                                <div class="text-xs text-slate-500 font-mono mt-1 pl-3">RD: ±${Math.round(m.p1_rd_before)} <i class="fa-solid fa-arrow-right mx-1 text-[10px]"></i> ±${Math.round(m.p1_rd_after)}</div>
                            </div>
                            <div class="bg-slate-800 p-3 rounded-lg border border-white/5 relative overflow-hidden">
                                <div class="absolute left-0 top-0 bottom-0 w-1 ${m.p2_delta > 0 ? 'bg-green-500' : 'bg-red-500'}"></div>
                                <div class="text-red-400 font-bold mb-1 border-b border-white/10 pb-1 pl-3">${m.p2}</div>
                                <div class="text-sm text-slate-300 font-mono mt-2 pl-3">Rating: ${Math.round(m.p2_before)} <i class="fa-solid fa-arrow-right text-slate-600 mx-1 text-[10px]"></i> ${Math.round(m.p2_after)} <span class="${m.p2_delta > 0 ? 'text-green-400' : 'text-red-400'} ml-1 text-xs">(${m.p2_delta > 0 ? '+' : ''}${Math.round(m.p2_delta)})</span></div>
                                <div class="text-xs text-slate-500 font-mono mt-1 pl-3">RD: ±${Math.round(m.p2_rd_before)} <i class="fa-solid fa-arrow-right mx-1 text-[10px]"></i> ±${Math.round(m.p2_rd_after)}</div>
                            </div>
                        </div>
                        ${gameHistoryHtml}
                        
                        <div class="mt-4 pt-3 border-t border-white/10 flex flex-col md:flex-row items-center justify-between gap-3">
                            <div class="text-[10px] text-yellow-500 font-bold uppercase tracking-widest"><i class="fa-solid fa-wrench mr-1"></i> Override Point Changes</div>
                            <div class="flex items-center gap-2">
                                <input type="number" step="0.1" id="override-p1-${m.match_id}" placeholder="${m.p1} pts (e.g. 50)" class="w-32 bg-black/40 border border-white/10 text-white text-center rounded py-1.5 text-xs focus:ring-1 focus:ring-yellow-500 outline-none" value="${m.p1_delta ? Math.round(m.p1_delta) : ''}">
                                <input type="number" step="0.1" id="override-p2-${m.match_id}" placeholder="${m.p2} pts (e.g. -80)" class="w-32 bg-black/40 border border-white/10 text-white text-center rounded py-1.5 text-xs focus:ring-1 focus:ring-yellow-500 outline-none" value="${m.p2_delta ? Math.round(m.p2_delta) : ''}">
                                <button onclick="window.saveDeltaOverride('${m.match_id}', '${m.p1.replace(/'/g, "\\'")}', '${m.p2.replace(/'/g, "\\'")}')" class="bg-yellow-600 hover:bg-yellow-500 text-black font-black px-3 py-1.5 rounded text-xs transition shadow-lg">SAVE</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
            list.innerHTML = html;
        } catch(e) { list.innerHTML = '<div class="text-red-400 text-center py-10">Error loading history.</div>'; }
    };

    window.saveDeltaOverride = async function(matchId, p1, p2) {
        const p1Delta = document.getElementById(`override-p1-${matchId}`).value;
        const p2Delta = document.getElementById(`override-p2-${matchId}`).value;
        if(p1Delta === "" || p2Delta === "") return alert("Please enter point changes for both players.");
        
        if(!confirm(`OVERRIDE MATH:\n\nForce ${p1} to get ${p1Delta} pts\nForce ${p2} to get ${p2Delta} pts\n\nThis will re-calculate history going forward. Proceed?`)) return;
        
        try {
            const res = await fetch('/api/admin/override_deltas', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ match_id: matchId, p1_delta: p1Delta, p2_delta: p2Delta })
            });
            const data = await res.json();
            if(data.success) {
                alert("✅ Point overrides saved and history is successfully recalculating!");
                window.searchHistory(); 
            } else {
                alert("❌ Failed to save point overrides.");
            }
        } catch(e) {
            alert("Network Error");
        }
    };

    window.adminSaveHistoryEdit = async function(p1, p2, oldDate, id) {
        const s1 = document.getElementById(`s1-${id}`).value; const s2 = document.getElementById(`s2-${id}`).value; const newDate = document.getElementById(`date-${id}`).value;
        if(!confirm(`OVERRIDE MATCH:\n\nPlayers: ${p1} vs ${p2}\nNew Score: ${s1}-${s2}\nNew Date: ${newDate}\n\nProceed?`)) return;
        try {
            const res = await fetch('/api/admin/update_match', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ p1: p1, p2: p2, date: oldDate, s1: s1, s2: s2, new_date: newDate }) });
            const data = await res.json();
            if(data.success) alert("✅ Update locked in! Data will automatically re-sort into the correct chronological timeline."); else alert("❌ Failed to update match.");
        } catch(e) { alert("Network Error"); }
    };

    window.loadPendingReports = async function() {
        const mList = document.getElementById('matchReportsList'); const fList = document.getElementById('feedbackList'); const mBadge = document.getElementById('match-badge'); const fBadge = document.getElementById('feedback-badge');
        if(mList) mList.innerHTML = '<div class="text-center py-10 text-slate-500"><i class="fa-solid fa-spinner fa-spin text-2xl"></i></div>';
        if(fList) fList.innerHTML = '<div class="text-center py-10 text-slate-500"><i class="fa-solid fa-spinner fa-spin text-2xl"></i></div>';
        try {
            const res = await fetch('/api/admin/reports'); const reports = await res.json();
            let mHtml = ""; let fHtml = ""; let mCount = 0; let fCount = 0;
            reports.forEach(r => {
                if (r.type === 'FEEDBACK') {
                    fCount++;
                    fHtml += `<div class="bg-slate-800 p-4 rounded-lg border border-blue-500/20 shadow-lg mb-3"><div class="flex justify-between items-start mb-2"><div><span class="text-xs font-bold text-blue-400 bg-blue-900/30 px-2 py-1 rounded border border-blue-500/20 mr-2">${r.title}</span><span class="text-xs text-slate-400 font-mono">${r.date}</span></div><div class="text-xs text-slate-500">From: <span class="text-slate-300 font-bold">${r.reporter}</span></div></div><div class="bg-black/30 border border-white/5 rounded p-3 mb-3 whitespace-pre-wrap text-sm text-slate-300">${r.problem}</div><div class="flex gap-2 border-t border-white/5 pt-3"><button onclick="window.resolveReport('${r.id}', 'approve')" class="flex-1 bg-green-600 hover:bg-green-500 text-white font-bold py-2 px-4 rounded text-sm transition-colors shadow-lg"><i class="fa-solid fa-check mr-1"></i> Mark Resolved</button><button onclick="window.resolveReport('${r.id}', 'reject')" class="flex-1 bg-red-600 hover:bg-red-500 text-white font-bold py-2 px-4 rounded text-sm transition-colors shadow-lg"><i class="fa-solid fa-trash mr-1"></i> Dismiss</button></div></div>`;
                } else {
                    mCount++;

    window.adminBulkDateFix = async function(season, division, week, id, btnElement) {

        btnElement.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>'; btnElement.disabled = true;
        try {
            const res = await fetch('/api/admin/bulk_fix_date', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ season: season, division: division, week: week, date: newDate }) });
            const data = await res.json();
            if(data.success) {
                const allCards = document.querySelectorAll('.date-card'); let removedCount = 0;
                allCards.forEach(card => {
                    if (card.dataset.season === season && card.dataset.div === division && card.dataset.week === week) {
                        card.style.transition = "all 0.3s ease"; card.style.opacity = "0"; card.style.transform = "translateX(20px)";
                        setTimeout(() => card.remove(), 300); removedCount++;
                    }
                });
                const dBadge = document.getElementById('date-badge');
                if(dBadge) {
                    let count = parseInt(dBadge.innerText) || 0; count = Math.max(0, count - removedCount); dBadge.innerText = count;
                    if(count === 0) { dBadge.classList.add('hidden'); document.getElementById('dateErrorsList').innerHTML = '<div class="text-slate-600 text-center py-10 italic">Awesome! No missing dates found.</div>'; }
                }
            } else { alert("❌ Failed to set bulk date fix."); btnElement.innerHTML = 'FIX'; btnElement.disabled = false; }

    };

            const res = await fetch('/api/admin/send_sms', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ message: msgText, phones: targetPhones }) 
            });
            const data = await res.json();
            if (data.success) {
                const succ = document.getElementById('sms-success-msg'); succ.innerText = `✅ SUCCESS! ${data.message}`; succ.classList.remove('hidden');
                document.getElementById('broadcast-input').value = ''; setTimeout(() => succ.classList.add('hidden'), 5000);
            } else { alert(`❌ API ERROR: ${data.error}`); }
        } catch(e) { alert("❌ FATAL ERROR: Could not connect to backend server."); } 
        finally { btn.innerHTML = originalText; btn.disabled = false; }
    }

    window.copyContactList = async function(type) {
        const btn = document.getElementById(`btn-copy-${type}`); 
        const originalText = btn.innerHTML; 
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Fetching...';
        
        try {
            const res = await fetch('/api/admin/contacts'); 
            const data = await res.json();
            
            if (!data || !data[type] || data[type] === "") { 
                alert(`Could not find any ${type} in the "Member info" tab.`); 
                btn.innerHTML = originalText; return; 
            }
            
            const textToCopy = data[type];
            
            if (navigator.clipboard && window.isSecureContext) {
                await navigator.clipboard.writeText(textToCopy);
            } else {
                let textArea = document.createElement("textarea");
                textArea.value = textToCopy;
                textArea.style.position = "fixed"; textArea.style.left = "-999999px"; textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus(); textArea.select();
                try { document.execCommand('copy'); } 
                catch (err) { alert("Copy failed. Please try on a secure HTTPS connection or localhost."); }
                textArea.remove();
            }

            const msg = document.getElementById('copy-success-msg'); 
            msg.innerText = `✅ Copied ${textToCopy.split(',').length} ${type} to clipboard!`;
            msg.classList.remove('hidden'); 
            setTimeout(() => msg.classList.add('hidden'), 4000); 
            btn.innerHTML = originalText;

        } catch(e) { alert(`Network error fetching contacts.`); btn.innerHTML = originalText; }
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDq05wFsKLHtt8G0Z5yLOG9pIk9UX24S4o", authDomain: "gctta-stats-live.firebaseapp.com", projectId: "gctta-stats-live", storageBucket: "gctta-stats-live.firebasestorage.app", messagingSenderId: "1070856258556", appId: "1:1070856258556:web:be438e04c1941abc3c6879" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.setFormatOverride = async function(fixtureId, formatType) {
        try { const res = await fetch('/api/admin/set_fixture_format', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ fixture_id: fixtureId, formatType: formatType }) }); } catch(e) {}
    };

    try {
        onSnapshot(query(collection(db, "fixture_schedule")), (snapshot) => {
            const liveList = document.getElementById("live-list"); const scheduledList = document.getElementById("scheduled-list");
            let liveCount = 0; let liveHtml = ""; let schedHtml = "";
            
            snapshot.forEach((doc) => {
                const m = doc.data(); const id = doc.id;
                const p1 = (m.home_players && m.home_players.length > 0) ? m.home_players[0] : m.home_team;
                const p2 = (m.away_players && m.away_players.length > 0) ? m.away_players[0] : m.away_team;
                
                if (m.match_status === "Live" || m.match_status === "Paused" || m.live_home_score > 0 || m.live_away_score > 0) {
                    liveCount++; const s1 = m.live_home_sets || 0; const s2 = m.live_away_sets || 0;
                    liveHtml += `<div class="bg-slate-800 p-5 rounded-xl border border-blue-500/30 shadow-lg relative overflow-hidden mb-4"><div class="absolute top-0 right-0 bg-blue-500 text-white text-[9px] font-black uppercase tracking-widest px-3 py-1 rounded-bl-lg animate-pulse">ACTIVE NOW</div><div class="flex justify-between items-center mb-3 mt-1"><span class="text-xs text-slate-400 font-mono">Table ${m.table} • ${m.division}</span></div><div class="text-xl font-black text-white mb-4">${p1} <span class="text-slate-500 mx-2 text-sm">vs</span> ${p2}</div><div class="flex items-center gap-4 bg-black/40 p-4 rounded-xl border border-white/5 mb-4 shadow-inner"><div class="text-xs text-slate-400 font-bold uppercase tracking-widest">Adjust Final Score:</div><input type="number" id="live-s1-${id}" value="${s1}" class="w-14 bg-slate-900 border border-white/10 text-white font-bold font-mono text-center rounded py-2 focus:border-blue-500 outline-none text-lg"><span class="text-slate-500 font-black">-</span><input type="number" id="live-s2-${id}" value="${s2}" class="w-14 bg-slate-900 border border-white/10 text-white font-bold font-mono text-center rounded py-2 focus:border-blue-500 outline-none text-lg"></div><div class="flex gap-3"><button onclick="window.forceFinishLive('${id}', '${p1.replace(/'/g, "\\'")}', '${p2.replace(/'/g, "\\'")}')" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 rounded-lg text-sm transition-transform hover:scale-[1.02] shadow-[0_0_15px_rgba(37,99,235,0.4)] flex items-center justify-center gap-2"><i class="fa-solid fa-flag-checkered"></i> Force Finish</button><button onclick="window.wipeLiveMatch('${id}')" class="bg-red-900/50 hover:bg-red-600 text-red-400 hover:text-white border border-red-500/30 font-bold py-2.5 px-4 rounded-lg text-sm transition-colors" title="Wipe Error"><i class="fa-solid fa-trash"></i></button></div></div>`;
                } 
                else if (m.match_status === "Scheduled" || !m.match_status) {
                    const formatVal = m.format_override || "Auto";
                    schedHtml += `<div class="bg-slate-800/80 p-4 rounded-xl border border-white/5 shadow relative"><div class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-1 border-b border-white/5 pb-1 flex justify-between"><span>Table ${m.table}</span><span class="text-blue-400">${m.division}</span></div><div class="font-bold text-white text-sm mt-2">${m.home_team} <br><span class="text-slate-500 text-xs font-normal">vs</span><br> ${m.away_team}</div><div class="mt-4 pt-3 border-t border-white/5"><label class="block text-[9px] text-slate-500 uppercase font-bold mb-1">Match Format</label><select onchange="window.setFormatOverride('${id}', this.value)" class="w-full bg-slate-900 border border-white/10 text-slate-300 font-bold text-xs rounded py-2 px-2 focus:border-blue-500 outline-none"><option value="Auto" ${formatVal === 'Auto' ? 'selected' : ''}>Auto-Detect</option><option value="2v2" ${formatVal === '2v2' ? 'selected' : ''}>Force 2v2 (5 Matches)</option><option value="3v3" ${formatVal === '3v3' ? 'selected' : ''}>Force 3v3 (11 Matches)</option></select></div></div>`;
                }
            });
            
            if(liveList) liveList.innerHTML = liveHtml || '<div class="col-span-1 md:col-span-2 text-slate-500 text-center py-10 italic border border-white/5 rounded-xl bg-slate-800/30">No matches currently active.</div>';
            if(scheduledList) scheduledList.innerHTML = schedHtml || '<div class="col-span-1 md:col-span-3 text-slate-500 text-center py-10 italic border border-white/5 rounded-xl bg-slate-800/30">No scheduled matches pending.</div>';
            const countDisplay = document.getElementById("liveMatchCount"); if (countDisplay) countDisplay.innerText = liveCount;
        });
    } catch(e) {}

    window.forceFinishLive = async function(id, p1, p2) {
        const s1 = document.getElementById(`live-s1-${id}`).value; const s2 = document.getElementById(`live-s2-${id}`).value;
        if(!confirm(`FORCE FINISH MATCH:\n\n${p1} vs ${p2}\nFinal Score: ${s1} - ${s2}\n\nThis will submit the match to history and clear it from the iPad. Proceed?`)) return;
        try {
            const res = await fetch('/api/admin/force_finish_live', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: id, s1: s1, s2: s2 }) });
            const data = await res.json();
            if(data.success) alert("✅ Match forced finished and successfully submitted to history!"); else alert("❌ Error finishing match.");
        } catch(e) { alert("Network Error"); }
    };

    window.wipeLiveMatch = async function(id) {
        if(!confirm(`WIPE MATCH:\n\nAre you sure you want to completely erase this match and reset the iPad to Scheduled?`)) return;
        try {
            const res = await fetch('/api/admin/wipe_live', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: id }) });
            const data = await res.json();
            if(data.success) alert("🗑️ Match wiped successfully!"); else alert("❌ Error wiping match.");
        } catch(e) { alert("Network Error"); }
    };
</script>
