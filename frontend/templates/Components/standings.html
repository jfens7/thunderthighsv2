<div id="tab-week" class="hidden w-full max-w-7xl mx-auto pt-24 px-4 pb-20 animate-fade-in">
    
    <div class="flex flex-col md:flex-row justify-between items-end mb-8 border-b border-white/10 pb-6 gap-6">
        <div>
            <h1 class="text-4xl md:text-5xl font-black text-white tracking-tight mb-2">DIVISION <span class="text-yellow-500">STANDINGS</span></h1>
            <p class="text-slate-400 font-medium">Live leaderboards and player ratings.</p>
        </div>

        <div class="flex flex-wrap gap-3 bg-black/20 p-2 rounded-xl border border-white/5 w-full md:w-auto items-center">
            
            <div class="relative flex-1 md:flex-none">
                <select id="boardSeason" class="w-full md:w-40 bg-slate-800 border border-white/10 text-white text-sm rounded-lg pl-3 pr-8 py-2.5 focus:ring-2 focus:ring-yellow-500 focus:outline-none appearance-none font-bold hover:bg-slate-700 transition-colors cursor-pointer" onchange="loadDivisionLeaderboard()">
                    </select>
                <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs pointer-events-none"></i>
            </div>

            <div class="relative flex-1 md:flex-none">
                <select id="boardDiv" class="w-full md:w-32 bg-slate-800 border border-white/10 text-white text-sm rounded-lg pl-3 pr-8 py-2.5 focus:ring-2 focus:ring-yellow-500 focus:outline-none appearance-none font-bold hover:bg-slate-700 transition-colors cursor-pointer" onchange="loadDivisionLeaderboard()">
                    </select>
                <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs pointer-events-none"></i>
            </div>

            <div class="relative flex-1 md:flex-none">
                <select id="boardSort" class="w-full md:w-32 bg-slate-800 border border-white/10 text-white text-sm rounded-lg pl-3 pr-8 py-2.5 focus:ring-2 focus:ring-yellow-500 focus:outline-none appearance-none font-bold hover:bg-slate-700 transition-colors cursor-pointer" onchange="loadDivisionLeaderboard()">
                    <option value="wins">Most Wins</option>
                    <option value="rating">Highest Rating</option>
                    <option value="percent">Win %</option>
                    <option value="losses">Least Losses</option>
                </select>
                <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs pointer-events-none"></i>
            </div>

            <div class="relative flex-1 md:flex-none">
                <select id="boardWeek" class="w-full md:w-24 bg-slate-800 border border-white/10 text-white text-sm rounded-lg pl-3 pr-8 py-2.5 focus:ring-2 focus:ring-yellow-500 focus:outline-none appearance-none font-bold hover:bg-slate-700 transition-colors cursor-pointer" onchange="loadDivisionLeaderboard()">
                    <option value="Latest">Latest</option>
                    <option value="1">Wk 1</option>
                    <option value="2">Wk 2</option>
                    <option value="3">Wk 3</option>
                    <option value="4">Wk 4</option>
                    <option value="5">Wk 5</option>
                    <option value="6">Wk 6</option>
                    <option value="7">Wk 7</option>
                    <option value="8">Wk 8</option>
                    <option value="9">Wk 9</option>
                    <option value="10">Wk 10</option>
                </select>
                <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs pointer-events-none"></i>
            </div>

            <div class="flex items-center bg-slate-800 rounded-lg px-3 py-2 border border-white/10 h-[42px]">
                <input type="checkbox" id="toggleShowFillIns" class="accent-yellow-500 w-4 h-4 cursor-pointer" onchange="loadDivisionLeaderboard()">
                <label for="toggleShowFillIns" class="ml-2 text-xs font-bold text-slate-300 cursor-pointer select-none">Fill-ins</label>
            </div>
            
            <div class="hidden">
                <input type="radio" name="fiMode" value="combine" checked>
            </div>

        </div>
    </div>

    <div class="grid grid-cols-7 gap-2 px-3 py-2 text-[10px] uppercase font-black text-slate-500 tracking-widest border-b border-white/5 mb-2">
        <div class="col-span-2">Player</div>
        <div class="text-center">Rating</div>
        <div class="text-center">Played</div>
        <div class="text-center">Wins</div>
        <div class="text-center">Losses</div>
        <div class="text-center">Win %</div>
    </div>

    <div id="leaderboardContent" class="flex flex-col gap-2">
        <div class="text-center py-20">
            <i class="fa-solid fa-spinner fa-spin text-4xl text-slate-600 mb-4"></i>
            <p class="text-slate-500 animate-pulse">Loading standings...</p>
        </div>
    </div>
</div>
